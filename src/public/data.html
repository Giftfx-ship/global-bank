<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Buy Data | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }
        
        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --input-bg: #0F1622;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --glass-bg: rgba(17, 24, 39, 0.8);
        }
        
        [data-theme="light"] {
            --bg-body: #F3F4F6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --input-bg: #F9FAFB;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            padding-bottom: 80px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        .logo-icon i { font-size: 22px; color: #0A0E1A; }
        .logo span {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-section { display: flex; align-items: center; gap: 20px; }
        
        .balance-pill {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.1));
            padding: 10px 24px;
            border-radius: 50px;
            border: 1px solid rgba(198,164,63,0.3);
            backdrop-filter: blur(10px);
        }
        .balance-pill i { color: var(--gold); margin-right: 10px; }
        .balance-pill span { color: var(--gold); font-weight: 700; font-size: 18px; }
        
        .theme-toggle {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            cursor: pointer;
        }
        .theme-option {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 8px; }
        
        .avatar {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .avatar:hover { transform: scale(1.1) rotate(5deg); }
        .avatar i { color: #0A0E1A; font-size: 20px; }
        
        .container { max-width: 550px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }
        
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid var(--border);
            animation: slideUp 0.6s ease;
        }
        
        .title {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .title h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .title p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 8px;
        }
        
        .info-box {
            background: linear-gradient(135deg, rgba(198,164,63,0.1), rgba(158,128,50,0.05));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 28px;
            border: 1px solid rgba(198,164,63,0.2);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .info-row:last-child { margin-bottom: 0; }
        
        .info-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        
        .info-value {
            color: var(--gold);
            font-size: 20px;
            font-weight: 800;
        }
        
        .form-group { margin-bottom: 24px; }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: var(--gold);
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
            transform: translateY(-2px);
        }
        
        .network-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .network-option {
            text-align: center;
            padding: 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .network-option:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        
        .network-option.selected {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.05));
        }
        
        .network-option i {
            font-size: 32px;
            display: block;
            margin-bottom: 8px;
        }
        
        .network-option .network-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .network-option .network-price {
            font-size: 11px;
            color: var(--gold);
            margin-top: 4px;
        }
        
        .plans-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .plan-card {
            text-align: center;
            padding: 16px 8px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .plan-card:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
        }
        
        .plan-card.selected {
            border-color: var(--gold);
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.05));
        }
        
        .plan-size {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .plan-price {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }
        
        .pin-inputs, .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .pin-inputs input, .code-inputs input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--gold);
            transition: all 0.2s;
        }
        
        .pin-inputs input:focus, .code-inputs input:focus {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 18px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }
        
        .security-step {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .step-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(198,164,63,0.15);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }
        
        .step-badge i { margin-right: 6px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            z-index: 99;
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 14px;
            transition: all 0.3s;
        }
        
        .nav-item i {
            font-size: 22px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
        }
        
        .nav-item span {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.05));
        }
        
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        .nav-item:hover { transform: translateY(-3px); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader {
            width: 60px; height: 60px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        .loader-text {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .bbc-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(198, 164, 63, 0.15);
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            color: var(--gold);
            margin-top: 8px;
        }
        
        @media (max-width: 500px) {
            .container { padding: 16px; }
            .card { padding: 24px; }
            .pin-inputs input, .code-inputs input { width: 48px; height: 48px; font-size: 20px; }
            .top-bar { padding: 12px 20px; }
            .logo span { font-size: 16px; }
            .balance-pill { display: none; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
            .network-grid { grid-template-columns: 1fr 1fr; }
            .plans-grid { grid-template-columns: 1fr; }
            .plan-card { padding: 12px; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="logo" onclick="location.href='/dashboard.html'">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage</span>
        </div>
        <div class="user-section">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i><span> Dark</span></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i><span> Light</span></div>
            </div>
            <div class="balance-pill">
                <i class="fas fa-wallet"></i>
                <span id="headerBalance">$0.00</span>
            </div>
            <div class="avatar" onclick="location.href='/profile.html'">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="title">
                <h2><i class="fas fa-wifi"></i> Buy Data Bundle</h2>
                <p>Stay connected with our data plans</p>
                <div class="bbc-badge"><i class="fas fa-shield-alt"></i> EASY TRANSACTION</div>
            </div>
            
            <div class="info-box">
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-wallet"></i> Available Balance</span>
                    <span class="info-value" id="userBalance">$0.00</span>
                </div>
            </div>
            
            <div id="step1Form">
                <div class="form-group">
                    <label><i class="fas fa-signal"></i> Select Network</label>
                    <div class="network-grid" id="networkGrid">
                        <div class="network-option" data-network="MTN" onclick="selectNetwork('MTN')">
                            <i class="fas fa-tower-broadcast"></i>
                            <div class="network-name">MTN</div>
                        </div>
                        <div class="network-option" data-network="Glo" onclick="selectNetwork('Glo')">
                            <i class="fas fa-globe"></i>
                            <div class="network-name">Glo</div>
                        </div>
                        <div class="network-option" data-network="Airtel" onclick="selectNetwork('Airtel')">
                            <i class="fas fa-broadcast-tower"></i>
                            <div class="network-name">Airtel</div>
                        </div>
                        <div class="network-option" data-network="9mobile" onclick="selectNetwork('9mobile')">
                            <i class="fas fa-mobile"></i>
                            <div class="network-name">9mobile</div>
                        </div>
                    </div>
                    <input type="hidden" id="network" value="MTN">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-database"></i> Data Plan</label>
                    <div class="plans-grid" id="plansGrid"></div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g., 08012345678">
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Transaction PIN</label>
                    <div class="pin-inputs">
                        <input type="password" maxlength="1" id="pin1" onkeyup="movePin(this,'pin2')">
                        <input type="password" maxlength="1" id="pin2" onkeyup="movePin(this,'pin3')">
                        <input type="password" maxlength="1" id="pin3" onkeyup="movePin(this,'pin4')">
                        <input type="password" maxlength="1" id="pin4">
                    </div>
                </div>
                
                <button class="btn" onclick="dataStep1()">
                    <i class="fas fa-arrow-right"></i> Continue
                </button>
            </div>
            
            <div id="codeForm" style="display: none;">
                <div id="codeStep1">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-shield-alt"></i> Authorization</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Enter BBC Authorization Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c1_1" onkeyup="moveCode(this,'c1_2')">
                            <input type="text" maxlength="1" id="c1_2" onkeyup="moveCode(this,'c1_3')">
                            <input type="text" maxlength="1" id="c1_3" onkeyup="moveCode(this,'c1_4')">
                            <input type="text" maxlength="1" id="c1_4" onkeyup="moveCode(this,'c1_5')">
                            <input type="text" maxlength="1" id="c1_5" onkeyup="moveCode(this,'c1_6')">
                            <input type="text" maxlength="1" id="c1_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode1()">
                        <i class="fas fa-check"></i> Verify Code
                    </button>
                </div>
                
                <div id="codeStep2" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-lock"></i> Security Check</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-virus"></i> Enter BBC Security Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c2_1" onkeyup="moveCode(this,'c2_2')">
                            <input type="text" maxlength="1" id="c2_2" onkeyup="moveCode(this,'c2_3')">
                            <input type="text" maxlength="1" id="c2_3" onkeyup="moveCode(this,'c2_4')">
                            <input type="text" maxlength="1" id="c2_4" onkeyup="moveCode(this,'c2_5')">
                            <input type="text" maxlength="1" id="c2_5" onkeyup="moveCode(this,'c2_6')">
                            <input type="text" maxlength="1" id="c2_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode2()">
                        <i class="fas fa-check-double"></i> Verify Code
                    </button>
                </div>
                
                <div id="codeStep3" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-crown"></i> Final Verification</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-gem"></i> Enter BBC Final Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c3_1" onkeyup="moveCode(this,'c3_2')">
                            <input type="text" maxlength="1" id="c3_2" onkeyup="moveCode(this,'c3_3')">
                            <input type="text" maxlength="1" id="c3_3" onkeyup="moveCode(this,'c3_4')">
                            <input type="text" maxlength="1" id="c3_4" onkeyup="moveCode(this,'c3_5')">
                            <input type="text" maxlength="1" id="c3_5" onkeyup="moveCode(this,'c3_6')">
                            <input type="text" maxlength="1" id="c3_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode3()">
                        <i class="fas fa-check-circle"></i> Complete Purchase
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="location.href='/cards.html'"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item active" onclick="location.href='/data.html'"><i class="fas fa-wifi"></i><span>Data</span></div>
        <div class="nav-item" onclick="location.href='/support.html'"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item" onclick="location.href='/profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loader-text">Processing Secure Transaction...</div>
    </div>

    <script>

            ],
            'Airtel': [
                { size: '500MB', price: 0.90, validity: '7 days' },
                { size: '1.5GB', price: 2.00, validity: '30 days' },
                { size: '3GB', price: 3.50, validity: '30 days' },
                { size: '6GB', price: 6.00, validity: '30 days' },
                { size: '11GB', price: 10.00, validity: '30 days' },
                { size: '25GB', price: 20.00, validity: '30 days' },
                { size: '60GB', price: 45.00, validity: '60 days' }
            ],
            '9mobile': [
                { size: '500MB', price: 1.20, validity: '7 days' },
                { size: '1GB', price: 2.00, validity: '30 days' },
                { size: '2.5GB', price: 4.00, validity: '30 days' },
                { size: '5GB', price: 7.00, validity: '30 days' },
                { size: '8GB', price: 10.00, validity: '30 days' },
                { size: '15GB', price: 18.00, validity: '30 days' },
                { size: '30GB', price: 32.00, validity: '60 days' }
            ]
        };
        
        function selectNetwork(network) {
            document.getElementById('network').value = network;
            document.querySelectorAll('.network-option').forEach(opt => {
                opt.classList.remove('selected');
                if (opt.getAttribute('data-network') === network) {
                    opt.classList.add('selected');
                }
            });
            loadPlans();
        }
        
        function loadPlans() {
            const network = document.getElementById('network').value;
            const plans = DATA_PLANS[network] || [];
            const container = document.getElementById('plansGrid');
            container.innerHTML = '';
            
            plans.forEach(plan => {
                container.innerHTML += `
                    <div class="plan-card" onclick="selectPlan(this, '${plan.size}', ${plan.price}, '${plan.validity}')">
                        <div class="plan-size">${plan.size}</div>
                        <div class="plan-price">$${plan.price.toFixed(2)}</div>
                        <div style="font-size: 9px; color: var(--text-secondary); margin-top: 4px;">${plan.validity}</div>
                    </div>
                `;
            });
        }
        
        function selectPlan(element, size, price, validity) {
            document.querySelectorAll('.plan-card').forEach(p => p.classList.remove('selected'));
            element.classList.add('selected');
            selectedPlan = { size, price, validity };
        }
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('darkOption').classList.remove('active');
            document.getElementById('lightOption').classList.remove('active');
            if (theme === 'dark') document.getElementById('darkOption').classList.add('active');
            else document.getElementById('lightOption').classList.add('active');
        }
        
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        function movePin(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }
        
        function moveCode(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        // ============================================================
        // STEP 1: SUBMIT DATA DETAILS (FAKE)
        // ============================================================
        async function dataStep1() {
            const network = document.getElementById('network').value;
            const phone = document.getElementById('phone').value;
            const pin = document.getElementById('pin1').value + document.getElementById('pin2').value + document.getElementById('pin3').value + document.getElementById('pin4').value;
            
            if (!phone || phone.length < 10) {
                Swal.fire('Error', 'Please enter a valid phone number', 'error');
                return;
            }
            if (!selectedPlan) {
                Swal.fire('Error', 'Please select a data plan', 'error');
                return;
            }
            if (pin.length !== 4) {
                Swal.fire('Error', 'Please enter your 4-digit transaction PIN', 'error');
                return;
            }
            
            showLoading(true);
            try {
                // ✅ FAKE - Generate random reference and codes
                const fakeRef = 'DAT-' + Date.now().toString(36).toUpperCase() + '-' + 
                               Math.random().toString(36).substring(2, 6).toUpperCase();
                currentRef = fakeRef;
                
                const codes = [];
                for (let i = 0; i < 3; i++) {
                    codes.push(Math.floor(100000 + Math.random() * 900000).toString());
                }
                
                localStorage.setItem('fakeDataRef', currentRef);
                localStorage.setItem('fakeDataCodes', JSON.stringify(codes));
                localStorage.setItem('fakeDataStep', '1');
                
                console.log('✅ FAKE Data Purchase Started - Reference:', currentRef);
                console.log('✅ BBC Codes:', codes);
                
                document.getElementById('step1Form').style.display = 'none';
                document.getElementById('codeForm').style.display = 'block';
                document.getElementById('codeStep1').style.display = 'block';
                document.getElementById('codeStep2').style.display = 'none';
                document.getElementById('codeStep3').style.display = 'none';
                document.getElementById('c1_1').focus();
                
                Swal.fire({
                    icon: 'info',
                    title: 'Authorization Required',
                    text: `Enter BBC Authorization Code: ${codes[0]}`,
                    confirmButtonColor: '#C6A43F'
                });
            } catch(e) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // ============================================================
        // STEP 2: SUBMIT BBC AUTHORIZATION CODE (FAKE CHECK)
        // ============================================================
        async function submitCode1() {
            const code = document.getElementById('c1_1').value + document.getElementById('c1_2').value + 
                        document.getElementById('c1_3').value + document.getElementById('c1_4').value + 
                        document.getElementById('c1_5').value + document.getElementById('c1_6').value;
            
            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit code', 'error');
                return;
            }
            
            showLoading(true);
            try {
                console.log('✅ Step 1 Code Entered:', code);
                
                const storedCodes = JSON.parse(localStorage.getItem('fakeDataCodes') || '[]');
                
                if (code.length === 6) {
                    localStorage.setItem('fakeDataStep', '2');
                    
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'block';
                    document.getElementById('c2_1').focus();
                    
                    Swal.fire({
                        icon: 'info',
                        title: 'Security Check',
                        text: `Enter BBC Security Code: ${storedCodes[1] || '789012'}`,
                        confirmButtonColor: '#C6A43F'
                    });
                } else {
                    Swal.fire('Error', 'Invalid authorization code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // ============================================================
        // STEP 3: SUBMIT BBC SECURITY CODE (FAKE CHECK)
        // ============================================================
        async function submitCode2() {
            const code = document.getElementById('c2_1').value + document.getElementById('c2_2').value + 
                        document.getElementById('c2_3').value + document.getElementById('c2_4').value + 
                        document.getElementById('c2_5').value + document.getElementById('c2_6').value;
            
            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit code', 'error');
                return;
            }
            
            showLoading(true);
            try {
                console.log('✅ Step 2 Code Entered:', code);
                
                const storedCodes = JSON.parse(localStorage.getItem('fakeDataCodes') || '[]');
                
                if (code.length === 6) {
                    localStorage.setItem('fakeDataStep', '3');
                    
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'block';
                    document.getElementById('c3_1').focus();
                    
                    Swal.fire({
                        icon: 'info',
                        title: 'Final Verification',
                        text: `Enter BBC Final Code: ${storedCodes[2] || '345678'}`,
                        confirmButtonColor: '#C6A43F'
                    });
                } else {
                    Swal.fire('Error', 'Invalid security code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        // ============================================================
        // STEP 4: SUBMIT BBC FINAL CODE & COMPLETE (FAKE SUCCESS)
        // ============================================================
        async function submitCode3() {
            const code = document.getElementById('c3_1').value + document.getElementById('c3_2').value + 
                        document.getElementById('c3_3').value + document.getElementById('c3_4').value + 
                        document.getElementById('c3_5').value + document.getElementById('c3_6').value;
            
            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit code', 'error');
                return;
            }
            
            showLoading(true);
            try {
                console.log('✅ Step 3 Code Entered:', code);
                
                if (code.length === 6) {
                    localStorage.setItem('fakeDataStep', 'completed');
                    
                    showLoading(false);
                    Swal.fire({
                        icon: 'success',
                        title: 'Data Purchased! 🎉',
                        html: `
                            <div style="text-align: left;">
                                <p><strong>Network:</strong> ${document.getElementById('network').value}</p>
                                <p><strong>Plan:</strong> ${selectedPlan.size}</p>
                                <p><strong>Price:</strong> $${selectedPlan.price.toFixed(2)}</p>
                                <p><strong>Phone:</strong> ${document.getElementById('phone').value}</p>
                                <p><strong>Validity:</strong> ${selectedPlan.validity}</p>
                                <p><strong>Reference:</strong> ${currentRef}</p>
                            </div>
                        `,
                        confirmButtonColor: '#C6A43F'
                    }).then(() => {
                        window.location.href = '/dashboard.html';
                    });
                } else {
                    Swal.fire('Error', 'Invalid final code', 'error');
                    showLoading(false);
                }
            } catch(e) {
                Swal.fire('Error', 'Transaction failed', 'error');
                showLoading(false);
            }
        }
        
        // ============================================================
        // LOAD BALANCE
        // ============================================================
        async function loadBalance() {
            try {
                const res = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                const user = data.user;
                const totalBalance = user.totalBalance || 0;
                const currency = user.currency || 'USD';
                document.getElementById('userBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
                document.getElementById('headerBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
            } catch(e) {
                console.error(e);
            }
        }

        // ============================================================
        // CHECK FOR EXISTING FAKE TRANSACTION ON LOAD
        // ============================================================
        function checkExistingTransaction() {
            const step = localStorage.getItem('fakeDataStep');
            const ref = localStorage.getItem('fakeDataRef');
            
            if (step && ref && step !== 'completed') {
                document.getElementById('step1Form').style.display = 'none';
                document.getElementById('codeForm').style.display = 'block';
                
                if (step === '1') {
                    document.getElementById('codeStep1').style.display = 'block';
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'none';
                } else if (step === '2') {
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'block';
                    document.getElementById('codeStep3').style.display = 'none';
                } else if (step === '3') {
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'block';
                }
                
                currentRef = ref;
                console.log('✅ Resuming fake data transaction:', currentRef);
            }
        }
        
        // Initialize
        selectNetwork('MTN');
        
        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') {
            window.location.href = '/';
        }
        
        loadBalance();
        checkExistingTransaction();
    </script>
