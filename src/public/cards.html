<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My Cards - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0E1A;
            padding-bottom: 80px;
        }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-card: #111827;
            --border: #1F2937;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --success: #10B981;
            --error: #EF4444;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .top-bar {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 20px; color: #0A0E1A; }
        .logo span { color: var(--text-primary); font-size: 18px; font-weight: 600; }
        .back-btn {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
        }
        
        .container { max-width: 600px; margin: 0 auto; padding: 24px; }
        .title {
            color: var(--gold);
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .credit-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(198,164,63,0.3);
            transition: transform 0.3s;
        }
        .credit-card:hover { transform: translateY(-4px); }
        .card-chip { margin-bottom: 30px; }
        .card-chip i { font-size: 40px; color: var(--gold); }
        .card-number {
            font-size: 22px;
            letter-spacing: 3px;
            color: white;
            font-family: monospace;
            margin: 20px 0;
        }
        .card-details {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-expiry, .card-name {
            color: rgba(255,255,255,0.6);
            font-size: 12px;
        }
        .card-name { text-transform: uppercase; font-weight: 600; }
        .card-network {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 40px;
            color: rgba(255,255,255,0.1);
        }
        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .card-btn {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .card-btn:hover { background: var(--gold); color: #0A0E1A; }
        .card-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .status-active { background: rgba(16,185,129,0.2); color: var(--success); }
        .status-frozen { background: rgba(239,68,68,0.2); color: var(--error); }
        
        .add-card {
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-card:hover { border-color: var(--gold); background: rgba(198,164,63,0.05); }
        .add-card i { font-size: 40px; color: var(--gold); margin-bottom: 12px; }
        .add-card p { color: var(--text-secondary); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
            border: 1px solid var(--border);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 { color: var(--gold); font-size: 20px; }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .pin-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .pin-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--gold);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
        }
        .nav-item { text-align: center; cursor: pointer; padding: 8px 16px; border-radius: 12px; }
        .nav-item i { font-size: 20px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; color: var(--text-secondary); }
        .nav-item.active { background: rgba(198,164,63,0.1); }
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="goToDashboard()">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage</span>
        </div>
        <div class="back-btn" onclick="goToDashboard()"><i class="fas fa-arrow-left"></i> Back</div>
    </div>

    <div class="container">
        <div class="title"><i class="fas fa-credit-card"></i> My Cards</div>
        <div id="cardsList"></div>
        <div class="add-card" onclick="requestNewCard()">
            <i class="fas fa-plus-circle"></i>
            <p>Request New Card</p>
            <small style="color: var(--text-secondary);">Virtual or Physical</small>
        </div>
    </div>

    <!-- Request Card Modal -->
    <div id="cardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Request New Card</h3>
                <button class="close-modal" onclick="closeModal('cardModal')">&times;</button>
            </div>
            <div class="form-group">
                <label>Card Type</label>
                <select id="cardType">
                    <option value="virtual">Virtual Card (Instant)</option>
                    <option value="physical">Physical Card (Delivered in 5-7 days)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Card Design</label>
                <select id="cardDesign">
                    <option value="Classic Heritage">Classic Heritage</option>
                    <option value="Premium Gold">Premium Gold</option>
                    <option value="Platinum Black">Platinum Black</option>
                </select>
            </div>
            <div class="form-group">
                <label>Daily Limit (USD)</label>
                <input type="number" id="cardLimit" value="5000">
            </div>
            <button class="btn" onclick="submitCardRequest()">Request Card</button>
        </div>
    </div>

    <!-- Freeze/Unfreeze Modal -->
    <div id="freezeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="freezeTitle">Freeze Card</h3>
                <button class="close-modal" onclick="closeModal('freezeModal')">&times;</button>
            </div>
            <p id="freezeMessage" style="color: var(--text-secondary); margin-bottom: 20px;">Are you sure you want to freeze this card?</p>
            <div class="form-group">
                <label>Confirm with Transaction PIN</label>
                <div class="pin-inputs">
                    <input type="password" maxlength="1" id="fPin1" onkeyup="movePin(this,'fPin2')">
                    <input type="password" maxlength="1" id="fPin2" onkeyup="movePin(this,'fPin3')">
                    <input type="password" maxlength="1" id="fPin3" onkeyup="movePin(this,'fPin4')">
                    <input type="password" maxlength="1" id="fPin4">
                </div>
            </div>
            <button class="btn" onclick="confirmFreeze()">Confirm</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goToDashboard()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item active" onclick="goToCards()"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item" onclick="goToLoans()"><i class="fas fa-hand-holding-usd"></i><span>Loans</span></div>
        <div class="nav-item" onclick="goToSupport()"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item" onclick="goToProfile()"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div><div class="loader-text">Processing</div></div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://global-bank-n6c3.onrender.com';
        let userData = null;
        let currentUser = null;
        let currentCardId = null;
        let currentAction = null;
        
        function goToDashboard() { window.location.href = '/dashboard.html'; }
        function goToCards() { window.location.href = '/cards.html'; }
        function goToLoans() { window.location.href = '/loans.html'; }
        function goToSupport() { window.location.href = '/support.html'; }
        function goToProfile() { window.location.href = '/profile.html'; }
        
        function movePin(current, nextId) { if(current.value.length === 1) document.getElementById(nextId).focus(); }
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        async function loadUserData() {
            try {
                const res = await fetch(`${apiUrl}/api/me`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if (res.status === 401) { window.location.href = '/'; return; }
                userData = await res.json();
                currentUser = userData.user;
                renderCards();
            } catch(e) { console.error(e); }
        }
        
        function renderCards() {
            const container = document.getElementById('cardsList');
            container.innerHTML = '';
            if (!userData.cards || userData.cards.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);">No cards yet. Request your first card.</div>';
                return;
            }
            for (let card of userData.cards) {
                const statusClass = card.status === 'active' ? 'status-active' : 'status-frozen';
                const statusText = card.status === 'active' ? 'Active' : 'Frozen';
                container.innerHTML += `
                    <div class="credit-card">
                        <div class="card-chip"><i class="fas fa-microchip"></i></div>
                        <div class="card-number">4532 ${card.last4.slice(0,4)} ${card.last4.slice(4,8)} ${card.last4.slice(8,12)}</div>
                        <div class="card-details">
                            <div class="card-expiry">VALID THRU<br>${card.expiryMonth}/${card.expiryYear}</div>
                            <div class="card-name">${currentUser.fullName.toUpperCase()}</div>
                        </div>
                        <div class="card-network"><i class="fab fa-cc-visa"></i></div>
                        <div class="card-actions">
                            <span class="card-status ${statusClass}">● ${statusText}</span>
                            <button class="card-btn" onclick="toggleCardStatus('${card._id}', '${card.status}')">${card.status === 'active' ? 'Freeze Card' : 'Unfreeze Card'}</button>
                            <button class="card-btn" onclick="viewCardDetails('${card._id}')">View Details</button>
                        </div>
                    </div>
                `;
            }
        }
        
        function requestNewCard() { openModal('cardModal'); }
        
        function submitCardRequest() {
            const type = document.getElementById('cardType').value;
            const design = document.getElementById('cardDesign').value;
            const limit = document.getElementById('cardLimit').value;
            Swal.fire({
                icon: 'success',
                title: 'Card Requested!',
                html: `Your ${design} ${type} card has been requested.<br>Daily limit: $${limit}<br>Processing time: ${type === 'virtual' ? 'Instant' : '5-7 business days'}`,
                confirmButtonColor: '#C6A43F'
            });
            closeModal('cardModal');
        }
        
        function toggleCardStatus(cardId, currentStatus) {
            currentCardId = cardId;
            currentAction = currentStatus === 'active' ? 'freeze' : 'unfreeze';
            document.getElementById('freezeTitle').innerHTML = currentStatus === 'active' ? 'Freeze Card' : 'Unfreeze Card';
            document.getElementById('freezeMessage').innerHTML = currentStatus === 'active' ? 'Are you sure you want to freeze this card? You can unfreeze anytime.' : 'Are you sure you want to unfreeze this card?';
            openModal('freezeModal');
        }
        
        async function confirmFreeze() {
            const pin = document.getElementById('fPin1').value + document.getElementById('fPin2').value + document.getElementById('fPin3').value + document.getElementById('fPin4').value;
            if (pin.length !== 4) { Swal.fire('Error', 'Enter your 4-digit PIN', 'error'); return; }
            
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/cards/toggle`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ cardId: currentCardId, transactionPin: pin })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success', `Card ${currentAction === 'freeze' ? 'frozen' : 'unfrozen'} successfully`, 'success');
                    closeModal('freezeModal');
                    loadUserData();
                    document.querySelectorAll('#freezeModal .pin-inputs input').forEach(i => i.value = '');
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Operation failed', 'error'); } finally { showLoading(false); }
        }
        
        function viewCardDetails(cardId) {
            const card = userData.cards.find(c => c._id === cardId);
            Swal.fire({
                title: 'Card Details',
                html: `
                    <div style="text-align: left;">
                        <p><strong>Card Number:</strong> 4532 **** **** ${card.last4}</p>
                        <p><strong>Expiry:</strong> ${card.expiryMonth}/${card.expiryYear}</p>
                        <p><strong>CVV:</strong> *** (Hidden for security)</p>
                        <p><strong>Type:</strong> ${card.type || 'Virtual'}</p>
                        <p><strong>Status:</strong> ${card.status}</p>
                    </div>
                `,
                confirmButtonColor: '#C6A43F',
                background: '#111827',
                color: '#FFFFFF'
            });
        }
        
        loadUserData();
    </script>
</body>
</html>
