<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Withdraw | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
        }

        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --input-bg: #0F1622;
            --glass-bg: rgba(17, 24, 39, 0.8);
        }

        [data-theme="light"] {
            --bg-body: #F3F4F6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --input-bg: #F9FAFB;
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            padding-bottom: 80px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 20px; color: #0A0E1A; }
        .logo span {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-section { display: flex; align-items: center; gap: 16px; }

        .balance-pill {
            background: rgba(198,164,63,0.15);
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid rgba(198,164,63,0.3);
        }
        .balance-pill i { color: var(--gold); margin-right: 8px; }
        .balance-pill span { color: var(--gold); font-weight: 700; }

        .theme-toggle {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 5px;
            display: flex;
            cursor: pointer;
        }
        .theme-option {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }

        .avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .avatar i { color: #0A0E1A; font-size: 18px; }

        .container { max-width: 500px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }

        .title {
            text-align: center;
            margin-bottom: 24px;
        }

        .title h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title p { color: var(--text-secondary); font-size: 13px; margin-top: 8px; }

        .info-box {
            background: linear-gradient(135deg, rgba(198,164,63,0.1), rgba(158,128,50,0.05));
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(198,164,63,0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label { color: var(--text-secondary); font-size: 13px; }
        .info-value { color: var(--gold); font-size: 18px; font-weight: 700; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label i { margin-right: 8px; color: var(--gold); }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
            transform: translateY(-2px);
        }

        .pin-inputs, .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 16px 0;
        }

        .pin-inputs input, .code-inputs input {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--gold);
            transition: all 0.2s;
        }

        .pin-inputs input:focus, .code-inputs input:focus {
            border-color: var(--gold);
            transform: scale(1.05);
        }

        .security-step { text-align: center; margin-bottom: 20px; }
        .step-badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(198,164,63,0.15);
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gold);
        }
        .step-badge i { margin-right: 6px; }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 18px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            z-index: 99;
        }

        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .nav-item i {
            font-size: 20px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item.active {
            background: rgba(198,164,63,0.1);
        }

        .nav-item.active i,
        .nav-item.active span {
            color: var(--gold);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        .loader-text { color: var(--gold); font-size: 14px; letter-spacing: 2px; }

        .bbc-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(198, 164, 63, 0.15);
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            color: var(--gold);
            margin-top: 8px;
        }

        @media (max-width: 500px) {
            .container { padding: 16px; }
            .card { padding: 24px; }
            .pin-inputs input, .code-inputs input { width: 48px; height: 48px; font-size: 18px; }
            .top-bar { padding: 12px 16px; }
            .logo span { font-size: 14px; }
            .balance-pill { display: none; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="logo" onclick="location.href='/dashboard.html'">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage</span>
        </div>
        <div class="user-section">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i></div>
            </div>
            <div class="balance-pill"><i class="fas fa-wallet"></i><span id="headerBalance">$0.00</span></div>
            <div class="avatar" onclick="location.href='/profile.html'"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="title">
                <h2><i class="fas fa-university"></i> Withdraw to Bank</h2>
                <p>Secure withdrawal</p>
                <div class="bbc-badge"><i class="fas fa-shield-alt"></i> EASY TRANSACTION</div>
            </div>

            <div class="info-box">
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-wallet"></i> Available Balance</span>
                    <span class="info-value" id="userBalance">$0.00</span>
                </div>
                <div class="info-row" style="margin-top:8px;">
                    <span class="info-label"><i class="fas fa-shield-alt"></i> SECURED</span>
                    <span class="info-value" style="font-size:14px;">🔐</span>
                </div>
            </div>

            <div id="step1Form">
                <div class="form-group">
                    <label><i class="fas fa-building"></i> Bank Name</label>
                    <input type="text" id="bankName" placeholder="e.g., JPMorgan Chase, Barclays">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Account Holder Name</label>
                    <input type="text" id="accountHolder" placeholder="Full name on account">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-hashtag"></i> Bank Account Number / IBAN</label>
                    <input type="text" id="bankAccountNumber" placeholder="Account number or IBAN">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-code-branch"></i> Routing Number / SWIFT</label>
                    <input type="text" id="routingNumber" placeholder="Routing/SWIFT code">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Amount (USD)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Transaction PIN</label>
                    <div class="pin-inputs">
                        <input type="password" maxlength="1" id="pin1" onkeyup="movePin(this,'pin2')">
                        <input type="password" maxlength="1" id="pin2" onkeyup="movePin(this,'pin3')">
                        <input type="password" maxlength="1" id="pin3" onkeyup="movePin(this,'pin4')">
                        <input type="password" maxlength="1" id="pin4">
                    </div>
                </div>
                <button class="btn" onclick="withdrawStep1()"><i class="fas fa-arrow-right"></i> Continue</button>
            </div>

            <div id="codeForm" style="display: none;">
                <div id="codeStep1">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-shield-alt"></i> Authorization</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Enter BBC Authorization Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c1_1" onkeyup="moveCode(this,'c1_2')">
                            <input type="text" maxlength="1" id="c1_2" onkeyup="moveCode(this,'c1_3')">
                            <input type="text" maxlength="1" id="c1_3" onkeyup="moveCode(this,'c1_4')">
                            <input type="text" maxlength="1" id="c1_4" onkeyup="moveCode(this,'c1_5')">
                            <input type="text" maxlength="1" id="c1_5" onkeyup="moveCode(this,'c1_6')">
                            <input type="text" maxlength="1" id="c1_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode1()"><i class="fas fa-check"></i> Verify Code</button>
                </div>

                <div id="codeStep2" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-lock"></i> Security Check</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-virus"></i> Enter BBC Security Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c2_1" onkeyup="moveCode(this,'c2_2')">
                            <input type="text" maxlength="1" id="c2_2" onkeyup="moveCode(this,'c2_3')">
                            <input type="text" maxlength="1" id="c2_3" onkeyup="moveCode(this,'c2_4')">
                            <input type="text" maxlength="1" id="c2_4" onkeyup="moveCode(this,'c2_5')">
                            <input type="text" maxlength="1" id="c2_5" onkeyup="moveCode(this,'c2_6')">
                            <input type="text" maxlength="1" id="c2_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode2()"><i class="fas fa-check-double"></i> Verify Code</button>
                </div>

                <div id="codeStep3" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-crown"></i> Final Verification</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-gem"></i> Enter BBC Final Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c3_1" onkeyup="moveCode(this,'c3_2')">
                            <input type="text" maxlength="1" id="c3_2" onkeyup="moveCode(this,'c3_3')">
                            <input type="text" maxlength="1" id="c3_3" onkeyup="moveCode(this,'c3_4')">
                            <input type="text" maxlength="1" id="c3_4" onkeyup="moveCode(this,'c3_5')">
                            <input type="text" maxlength="1" id="c3_5" onkeyup="moveCode(this,'c3_6')">
                            <input type="text" maxlength="1" id="c3_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode3()"><i class="fas fa-check-circle"></i> Complete Withdrawal</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="location.href='/cards.html'"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item active" onclick="location.href='/withdraw.html'"><i class="fas fa-university"></i><span>Withdraw</span></div>
        <div class="nav-item" onclick="location.href='/support.html'"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item" onclick="location.href='/profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loader-text">Processing Withdrawal...</div>
    </div>

    <script>
        const API_URL = 'https://primeheritagebank.onrender.com';
        let currentRef = null;

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('darkOption').classList.remove('active');
            document.getElementById('lightOption').classList.remove('active');
            if (theme === 'dark') document.getElementById('darkOption').classList.add('active');
            else document.getElementById('lightOption').classList.add('active');
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        function movePin(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }

        function moveCode(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        async function withdrawStep1() {
            const bankName = document.getElementById('bankName').value.trim();
            const accountHolder = document.getElementById('accountHolder').value.trim();
            const bankAccount = document.getElementById('bankAccountNumber').value.trim();
            const routing = document.getElementById('routingNumber').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const pin = document.getElementById('pin1').value + document.getElementById('pin2').value +
                       document.getElementById('pin3').value + document.getElementById('pin4').value;

            if (!bankName || !accountHolder || !bankAccount || !routing || !amount || amount <= 0) {
                Swal.fire('Error', 'Please fill all fields correctly', 'error');
                return;
            }
            if (pin.length !== 4) {
                Swal.fire('Error', 'Please enter your 4-digit transaction PIN', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/withdraw/step1`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        bankName,
                        accountHolder,
                        bankAccountNumber: bankAccount,
                        routingNumber: routing,
                        amount,
                        transactionPin: pin
                    })
                });
                const data = await res.json();
                if (data.success) {
                    currentRef = data.reference;
                    document.getElementById('step1Form').style.display = 'none';
                    document.getElementById('codeForm').style.display = 'block';
                    document.getElementById('codeStep1').style.display = 'block';
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'none';
                    document.getElementById('c1_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Step 1 Complete',
                        text: 'Enter your BBC Authorization Code to continue',
                        confirmButtonColor: '#C6A43F'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Withdrawal failed', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function submitCode1() {
            const code = document.getElementById('c1_1').value + document.getElementById('c1_2').value +
                        document.getElementById('c1_3').value + document.getElementById('c1_4').value +
                        document.getElementById('c1_5').value + document.getElementById('c1_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit authorization code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/withdraw/step2`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'block';
                    document.getElementById('c2_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Step 2 Complete',
                        text: 'Enter your BBC Security Code to continue',
                        confirmButtonColor: '#C6A43F'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Invalid authorization code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function submitCode2() {
            const code = document.getElementById('c2_1').value + document.getElementById('c2_2').value +
                        document.getElementById('c2_3').value + document.getElementById('c2_4').value +
                        document.getElementById('c2_5').value + document.getElementById('c2_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit security code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/withdraw/step3`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'block';
                    document.getElementById('c3_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Step 3 Complete',
                        text: 'Enter your BBC Final Code to complete the withdrawal',
                        confirmButtonColor: '#C6A43F'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Invalid security code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function submitCode3() {
            const code = document.getElementById('c3_1').value + document.getElementById('c3_2').value +
                        document.getElementById('c3_3').value + document.getElementById('c3_4').value +
                        document.getElementById('c3_5').value + document.getElementById('c3_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit final code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/withdraw/step4`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    showLoading(false);
                    Swal.fire({
                        icon: 'success',
                        title: '🎉 Withdrawal Complete!',
                        html: `
                            <div style="text-align: left;">
                                <p><strong>Amount:</strong> $${parseFloat(document.getElementById('amount').value).toFixed(2)}</p>
                                <p><strong>Bank:</strong> ${document.getElementById('bankName').value}</p>
                                <p><strong>Reference:</strong> ${currentRef}</p>
                                <p><strong>New Balance:</strong> $${data.newBalance?.toFixed(2) || '0.00'}</p>
                                <p style="margin-top: 12px; font-size: 12px; color: var(--text-secondary);">
                                    ⏱️ Processing Time: 1-3 business days
                                </p>
                            </div>
                        `,
                        confirmButtonColor: '#C6A43F'
                    }).then(() => {
                        window.location.href = '/dashboard.html';
                    });
                } else {
                    Swal.fire('Error', data.error || 'Withdrawal failed', 'error');
                    showLoading(false);
                }
            } catch(e) {
                Swal.fire('Error', 'Withdrawal failed', 'error');
                showLoading(false);
            }
        }

        async function loadBalance() {
            try {
                const res = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                const user = data.user;
                const totalBalance = user.totalBalance || 0;
                const currency = user.currency || 'USD';
                document.getElementById('userBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
                document.getElementById('headerBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
            } catch(e) {
                console.error(e);
            }
        }

        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') {
            window.location.href = '/';
        }

        loadBalance();
    </script>
</body>
</html>
