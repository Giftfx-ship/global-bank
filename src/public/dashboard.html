<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dashboard | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --gold-glow: rgba(198,164,63,0.25);
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --gradient-gold: linear-gradient(135deg, #C6A43F, #9E8032);
            --gradient-dark: linear-gradient(145deg, #0a1628, #1a2a4a);
        }

        [data-theme="dark"] {
            --bg-body: #05080f;
            --bg-card: rgba(13, 20, 35, 0.92);
            --bg-card-hover: rgba(20, 30, 50, 0.95);
            --border: rgba(198,164,63,0.12);
            --border-hover: rgba(198,164,63,0.3);
            --text-primary: #F0F2F8;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --input-bg: rgba(255,255,255,0.04);
            --shadow: 0 25px 60px -15px rgba(0,0,0,0.8);
            --glass-bg: rgba(13, 20, 35, 0.85);
            --hover-bg: rgba(198,164,63,0.04);
            --card-gradient: linear-gradient(145deg, #0d1a2b, #16213e);
            --balance-card-bg: linear-gradient(145deg, #0a1628, #1a2a4a);
        }

        [data-theme="light"] {
            --bg-body: #F0F2F8;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-card-hover: rgba(255, 255, 255, 1);
            --border: rgba(198,164,63,0.15);
            --border-hover: rgba(198,164,63,0.4);
            --text-primary: #0A1628;
            --text-secondary: #5A6B7D;
            --text-muted: #8A9BAE;
            --input-bg: rgba(0,0,0,0.03);
            --shadow: 0 25px 60px -15px rgba(0,0,0,0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --hover-bg: rgba(198,164,63,0.06);
            --card-gradient: linear-gradient(145deg, #f8fafc, #e2e8f0);
            --balance-card-bg: linear-gradient(145deg, #0a1628, #1a2a4a);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            padding-bottom: 80px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(198,164,63,0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(198,164,63,0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(198,164,63,0.35);
        }
        .logo-icon i { font-size: 18px; color: #0A0E1A; }
        .logo-text {
            font-size: 18px;
            font-weight: 800;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            font-weight: 300;
            opacity: 0.5;
            -webkit-text-fill-color: var(--text-secondary);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: rgba(198,164,63,0.08);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px;
            display: flex;
            cursor: pointer;
            transition: all 0.3s;
        }
        .theme-toggle:hover { border-color: var(--gold); }
        .theme-option {
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.3s;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .theme-option.active {
            background: var(--gradient-gold);
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 4px; }

        .avatar-top {
            width: 40px;
            height: 40px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(198,164,63,0.35);
            flex-shrink: 0;
        }
        .avatar-top:hover { transform: scale(1.08); }
        .avatar-top i { color: #0A0E1A; font-size: 16px; }

        /* ===== CONTAINER ===== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 16px 80px;
            position: relative;
            z-index: 1;
        }

        /* ===== GREETING ===== */
        .greeting-section {
            padding: 4px 0 16px;
            animation: slideUp 0.5s ease;
        }
        .greeting-text {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .greeting-name {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            margin-top: 2px;
            letter-spacing: -0.5px;
        }
        .greeting-name .highlight {
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ===== BALANCE CARD ===== */
        .balance-card {
            background: var(--balance-card-bg);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.5s ease 0.05s backwards;
            box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            border: 1px solid rgba(198,164,63,0.12);
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(198,164,63,0.08) 0%, transparent 70%);
            border-radius: 50%;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(198,164,63,0.05) 0%, transparent 70%);
            border-radius: 50%;
        }
        .balance-card .label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        .balance-card .amount {
            font-size: 42px;
            font-weight: 800;
            color: #FFFFFF;
            margin-top: 4px;
            position: relative;
            z-index: 1;
            letter-spacing: -0.5px;
        }
        .balance-card .amount .currency {
            font-size: 22px;
            font-weight: 600;
            opacity: 0.6;
            margin-right: 4px;
        }
        .balance-card .balance-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            position: relative;
            z-index: 1;
        }
        .balance-card .balance-actions .btn-action {
            padding: 10px 16px;
            border-radius: 50px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        .balance-card .balance-actions .btn-action:hover {
            transform: translateY(-2px);
        }
        .btn-send {
            background: #FFFFFF;
            color: #0A0E1A;
        }
        .btn-send:hover {
            box-shadow: 0 8px 30px rgba(255,255,255,0.2);
        }
        .btn-withdraw {
            background: rgba(255,255,255,0.08);
            color: #FFFFFF;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-withdraw:hover {
            background: rgba(255,255,255,0.15);
        }
        .btn-topup {
            background: rgba(255,255,255,0.08);
            color: #FFFFFF;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-topup:hover {
            background: rgba(255,255,255,0.15);
        }

        /* ===== QUICK ACTIONS ===== */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 24px;
            animation: slideUp 0.5s ease 0.1s backwards;
        }
        .action-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .action-item:hover {
            border-color: var(--gold);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(198,164,63,0.1);
        }
        .action-item .icon-wrap {
            width: 40px;
            height: 40px;
            background: rgba(198,164,63,0.08);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            transition: all 0.3s;
        }
        .action-item:hover .icon-wrap {
            background: rgba(198,164,63,0.18);
            transform: scale(1.05);
        }
        .action-item .icon-wrap i {
            font-size: 18px;
            color: var(--gold);
        }
        .action-item span {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            display: block;
        }

        /* ===== SECTION ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .section-header a {
            font-size: 12px;
            color: var(--gold);
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        .section-header a:hover { opacity: 0.7; }

        /* ===== TRANSACTIONS ===== */
        .transaction-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--glass-bg);
            border-radius: 14px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }
        .transaction-item:hover {
            border-color: var(--border-hover);
            transform: translateX(4px);
        }
        .transaction-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .transaction-icon.incoming { background: rgba(16,185,129,0.12); color: var(--success); }
        .transaction-icon.outgoing { background: rgba(239,68,68,0.12); color: var(--error); }
        .transaction-icon i { font-size: 16px; }
        .transaction-info .tx-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .transaction-info .tx-date {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .transaction-amount {
            font-weight: 700;
            font-size: 14px;
            text-align: right;
        }
        .transaction-amount.incoming { color: var(--success); }
        .transaction-amount.outgoing { color: var(--error); }
        .transaction-amount .tx-status {
            font-size: 10px;
            font-weight: 500;
            display: block;
            color: var(--text-muted);
        }
        .receipt-btn {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 3px 10px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 8px;
        }
        .receipt-btn:hover {
            background: var(--gradient-gold);
            color: #0A0E1A;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.3;
        }

        /* ===== MODAL ===== */
        .transactions-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(16px);
            z-index: 1500;
            align-items: center;
            justify-content: center;
        }
        .transactions-modal .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 24px;
            max-width: 600px;
            width: 92%;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .transactions-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
            flex-shrink: 0;
        }
        .transactions-modal .modal-header h3 {
            color: var(--gold);
            font-size: 20px;
            font-weight: 700;
        }
        .transactions-modal .modal-header h3 i { margin-right: 10px; }
        .transactions-modal .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .transactions-modal .close-modal:hover { color: var(--error); transform: rotate(90deg); }
        .transactions-modal .modal-body {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }
        .modal-tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid var(--border);
            transition: all 0.3s;
            border-radius: 8px;
        }
        .modal-tx-item:hover { background: var(--hover-bg); }
        .modal-tx-item .tx-info { flex: 1; }
        .modal-tx-item .tx-type { font-weight: 600; color: var(--text-primary); font-size: 13px; }
        .modal-tx-item .tx-date { color: var(--text-secondary); font-size: 11px; }
        .modal-tx-item .tx-ref { font-size: 10px; color: var(--text-muted); font-family: monospace; }
        .modal-tx-item .tx-amount { font-weight: 700; font-size: 14px; }
        .modal-tx-item .tx-amount.incoming { color: var(--success); }
        .modal-tx-item .tx-amount.outgoing { color: var(--error); }
        .modal-tx-item .view-receipt-btn {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 4px 12px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
            margin-left: 10px;
        }
        .modal-tx-item .view-receipt-btn:hover {
            background: var(--gradient-gold);
            color: #0A0E1A;
        }

        /* ===== LOADING ===== */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(16px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(198,164,63,0.15);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            color: var(--gold);
            font-size: 13px;
            letter-spacing: 2px;
        }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 10px;
            border-top: 1px solid var(--border);
            z-index: 99;
        }
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
        }
        .nav-item i {
            font-size: 18px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 2px;
            transition: all 0.3s;
        }
        .nav-item span {
            font-size: 9px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .nav-item.active i,
        .nav-item.active span { color: var(--gold); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--gradient-gold);
            border-radius: 0 0 3px 3px;
        }
        .nav-item:hover { transform: translateY(-2px); }

        @media (max-width: 500px) {
            .container { padding: 10px 12px 80px; }
            .balance-card { padding: 22px 18px; }
            .balance-card .amount { font-size: 32px; }
            .balance-card .balance-actions .btn-action { font-size: 12px; padding: 8px 12px; }
            .quick-actions { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .action-item { padding: 10px 6px; }
            .action-item .icon-wrap { width: 32px; height: 32px; }
            .action-item .icon-wrap i { font-size: 14px; }
            .bottom-nav { padding: 6px 12px; }
            .nav-item { padding: 4px 8px; }
            .nav-item i { font-size: 16px; }
            .nav-item span { font-size: 8px; }
        }
    </style>
</head>

        <div class="logo" onclick="location.reload()">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>

                <button class="theme-option" id="darkOption"><i class="fas fa-moon"></i></button>
                <button class="theme-option" id="lightOption"><i class="fas fa-sun"></i></button>
            </div>
            <div class="avatar-top" onclick="window.location.href='/profile.html'">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">

        <!-- GREETING -->
        <div class="greeting-section">
            <div class="greeting-text" id="greetingText">👋 Good Morning</div>

        </div>

        <!-- BALANCE CARD -->
        <div class="balance-card">
            <div class="label">Available Balance</div>
            <div class="amount">

                <span id="balanceAmount">0.00</span>
            </div>
            <div class="balance-actions">
                <button class="btn-action btn-send" onclick="window.location.href='/send.html'">
                    <i class="fas fa-arrow-up"></i> Send
                </button>
                <button class="btn-action btn-withdraw" onclick="window.location.href='/withdraw.html'">
                    <i class="fas fa-arrow-down"></i> Withdraw
                </button>
                <button class="btn-action btn-topup" onclick="window.location.href='/support.html'">
                    <i class="fas fa-plus"></i> support
                </button>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="quick-actions">
            <a class="action-item" href="/send.html">
                <div class="icon-wrap"><i class="fas fa-paper-plane"></i></div>
                <span>Send</span>
            </a>
            <a class="action-item" href="/withdraw.html">
                <div class="icon-wrap"><i class="fas fa-university"></i></div>
                <span>Withdraw</span>
            </a>
            <a class="action-item" href="/airtime.html">
                <div class="icon-wrap"><i class="fas fa-mobile-alt"></i></div>
                <span>Airtime</span>
            </a>
            <a class="action-item" href="/bills.html">
                <div class="icon-wrap"><i class="fas fa-bolt"></i></div>
                <span>Bills</span>
            </a>
            <a class="action-item" href="/data.html">
                <div class="icon-wrap"><i class="fas fa-wifi"></i></div>
                <span>Data</span>
            </a>
            <a class="action-item" href="/cards.html">
                <div class="icon-wrap"><i class="fas fa-credit-card"></i></div>
                <span>Cards</span>
            </a>
        </div>

        <!-- RECENT TRANSACTIONS -->
        <div class="section-header">
            <h3>Recent Transactions</h3>
            
        </div>
        <div id="recentTransactions">
            <div class="empty-state">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>Loading transactions...</p>
            </div>
        </div>

    </div>

    <!-- ===== BOTTOM NAV ===== -->
    <div class="bottom-nav">
        <a class="nav-item active" href="/dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a class="nav-item" href="/cards.html"><i class="fas fa-credit-card"></i><span>Cards</span></a>
        <a class="nav-item" href="/send.html"><i class="fas fa-paper-plane"></i><span>Send</span></a>
        <a class="nav-item" href="/support.html"><i class="fas fa-headset"></i><span>Support</span></a>
        <a class="nav-item" href="/profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <!-- ===== TRANSACTIONS MODAL ===== -->
    <div id="transactionsModal" class="transactions-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-list"></i> All Transactions</h3>
                <button class="close-modal" onclick="closeAllTransactions()">&times;</button>
            </div>
            <div class="modal-body" id="allTransactionsList">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-pulse"></i>
                    <p>Loading transactions...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== LOADING ===== -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loader-text">Loading...</div>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================
        const API_URL = 'https://primeheritage-bank-intl.onrender.com';
        let currentUser = null;

        // ============================================================
        // THEME
        // ============================================================
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('darkOption').classList.toggle('active', theme === 'dark');
            document.getElementById('lightOption').classList.toggle('active', theme === 'light');
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // ============================================================
        // VIEW RECEIPT
        // ============================================================
        function viewReceipt(reference) {
            if (!reference) return;
            window.open(`/receipt.html?ref=${reference}`, '_blank');
        }

        // ============================================================
        // ALL TRANSACTIONS MODAL
        // ============================================================
        function openAllTransactions() {
            document.getElementById('transactionsModal').style.display = 'flex';
            loadAllTransactions();
        }

        function closeAllTransactions() {
            document.getElementById('transactionsModal').style.display = 'none';
        }

        async function loadAllTransactions() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch(`${API_URL}/api/transactions/all`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) { window.location.href = '/'; return; }

                const data = await res.json();
                const transactions = data.transactions || [];

                const list = document.getElementById('allTransactionsList');
                
                if (transactions.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox" style="font-size:40px;opacity:0.3;"></i>
                            <p>No transactions found</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = transactions.map(tx => {
                    const isIncoming = tx.to_user_id === currentUser?.id;
                    const amount = tx.amount || 0;
                    const currency = tx.currency || 'USD';
                    const date = tx.created_at ? new Date(tx.created_at).toLocaleDateString() : 'Recent';
                    const ref = tx.reference || tx.id;
                    const hasReceipt = tx.status === 'completed';

                    return `
                        <div class="modal-tx-item">
                            <div class="tx-info">
                                <div class="tx-type">${isIncoming ? '📥 Received' : '📤 Sent'} ${tx.type ? `- ${tx.type}` : ''}</div>
                                <div class="tx-date">${date}</div>
                                <div class="tx-ref">${ref}</div>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px;">
                                <div class="tx-amount ${isIncoming ? 'incoming' : 'outgoing'}">
                                    ${isIncoming ? '+' : '-'} ${currency} ${amount.toLocaleString()}
                                </div>
                                ${hasReceipt ? `<button class="view-receipt-btn" onclick="event.stopPropagation();viewReceipt('${ref}')"><i class="fas fa-receipt"></i></button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (e) {
                console.error('Load all transactions error:', e);
                document.getElementById('allTransactionsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color:var(--error);"></i>
                        <p>Failed to load transactions.</p>
                        <button onclick="loadAllTransactions()" style="margin-top:12px;padding:8px 20px;background:var(--gold);border:none;border-radius:10px;color:#0A0E1A;font-weight:600;cursor:pointer;">Retry</button>
                    </div>
                `;
            }
        }

        // ============================================================
        // LOAD USER DATA
        // ============================================================
        async function loadUserData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) { window.location.href = '/'; return; }

                const res = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) { logout(); return; }

                const data = await res.json();
                currentUser = data.user || data;

                renderDashboard();
            } catch (e) {
                console.error('Load error:', e);
            }
        }

        // ============================================================
        // RENDER DASHBOARD
        // ============================================================
        function renderDashboard() {
            // Greeting
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'Good Morning' : hour < 17 ? 'Good Afternoon' : 'Good Evening';
            document.getElementById('greetingText').textContent = `👋 ${greeting}`;
            
            const firstName = currentUser.first_name || currentUser.full_name?.split(' ')[0] || 'User';
            document.getElementById('userName').textContent = firstName;

            // Balance
            const totalBalance = currentUser.totalBalance || 0;
            const currency = currentUser.currency || 'USD';
            document.getElementById('balanceCurrency').textContent = currency;
            document.getElementById('balanceAmount').textContent = totalBalance.toLocaleString('en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

            // Recent Transactions
            const transactions = currentUser.transactions || [];
            const txDiv = document.getElementById('recentTransactions');

            if (transactions.length === 0) {
                txDiv.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>No transactions yet</p>
                    </div>
                `;
            } else {
                txDiv.innerHTML = transactions.slice(0, 5).map(tx => {
                    const isIncoming = tx.to_user_id === currentUser.id;
                    const amount = tx.amount || 0;
                    const currency = tx.currency || 'USD';
                    const reference = tx.reference || tx.id;
                    const hasReceipt = tx.status === 'completed';
                    const date = tx.created_at ? new Date(tx.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : 'Recent';
                    const txType = tx.type || 'transfer';

                    let icon = 'fa-arrow-right';
                    let name = 'Transfer';
                    if (isIncoming) { icon = 'fa-arrow-down'; name = 'Received'; }
                    else if (txType === 'withdrawal') { icon = 'fa-university'; name = 'Withdrawal'; }
                    else if (txType === 'airtime') { icon = 'fa-mobile-alt'; name = 'Airtime'; }
                    else if (txType === 'bill_payment') { icon = 'fa-bolt'; name = 'Bill Payment'; }
                    else if (txType === 'data_bundle') { icon = 'fa-wifi'; name = 'Data Bundle'; }

                    return `
                        <div class="transaction-item" onclick="viewReceipt('${reference}')">
                            <div class="transaction-left">
                                <div class="transaction-icon ${isIncoming ? 'incoming' : 'outgoing'}">
                                    <i class="fas ${icon}"></i>
                                </div>
                                <div class="transaction-info">
                                    <div class="tx-name">${name}</div>
                                    <div class="tx-date">${date}</div>
                                </div>
                            </div>
                            <div>
                                <div class="transaction-amount ${isIncoming ? 'incoming' : 'outgoing'}">
                                    ${isIncoming ? '+' : '-'} ${currency} ${amount.toLocaleString()}
                                </div>
                                <div class="tx-status">${hasReceipt ? '✅ Completed' : '⏳ Pending'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // ============================================================
        // LOGOUT
        // ============================================================
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        // ============================================================
        // CHECK PENDING TRANSACTION
        // ============================================================
        async function checkPendingTransaction() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                const res = await fetch(`${API_URL}/api/transactions/pending`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await res.json();
                if (data.success && data.transaction) {
                    const tx = data.transaction;
                    const step = tx.step;
                    
                    setTimeout(() => {
                        Swal.fire({
                            icon: 'info',
                            title: '⏳ Pending Transaction',
                            text: `You have a pending ${tx.type || 'transaction'} (Step ${step}/3). Continue from where you stopped.`,
                            confirmButtonColor: '#C6A43F',
                            confirmButtonText: 'Continue →',
                            showCancelButton: true,
                            cancelButtonText: 'Later',
                            background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                            color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                        }).then((result) => {
                            if (result.isConfirmed) {
                                if (tx.type === 'withdrawal') window.location.href = '/withdraw.html';
                                else if (tx.type === 'airtime') window.location.href = '/airtime.html';
                                else if (tx.type === 'bill_payment') window.location.href = '/bills.html';
                                else if (tx.type === 'data_bundle') window.location.href = '/data.html';
                                else if (tx.type === 'transfer') window.location.href = '/send.html';
                            }
                        });
                    }, 1500);
                }
            } catch (e) {
                console.error('Check pending transaction error:', e);
            }
        }

        // ============================================================
        // INIT
        // ============================================================
        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') {
            window.location.href = '/';
        } else {
            loadUserData();
            checkPendingTransaction();
        }

        // Auto-refresh every 30 seconds
        setInterval(loadUserData, 30000);
    </script>
</body>
</html>
