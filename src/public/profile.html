<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profile Settings - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0E1A; padding-bottom: 80px; }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-card: #111827;
            --border: #1F2937;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .top-bar {
            background: var(--bg-card); padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 20px; color: #0A0E1A; }
        .logo span { color: var(--text-primary); font-size: 18px; font-weight: 600; }
        .avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .container { max-width: 600px; margin: 0 auto; padding: 24px; }
        .profile-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            animation: slideUp 0.5s;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        .profile-avatar i { font-size: 40px; color: #0A0E1A; }
        .profile-name { color: var(--text-primary); font-size: 22px; font-weight: 600; }
        .profile-email { color: var(--text-secondary); font-size: 13px; margin-top: 4px; }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        .info-label { color: var(--text-secondary); font-size: 14px; }
        .info-value { color: var(--text-primary); font-weight: 500; }
        
        .section-title {
            color: var(--gold);
            font-size: 18px;
            font-weight: 600;
            margin: 25px 0 15px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .pin-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .pin-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
        }
        .nav-item { text-align: center; cursor: pointer; padding: 8px 16px; border-radius: 12px; }
        .nav-item i { font-size: 20px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; color: var(--text-secondary); }
        .nav-item.active { background: rgba(198,164,63,0.1); }
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="goToDashboard()">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage</span>
        </div>
        <div class="avatar" onclick="goToDashboard()"><i class="fas fa-arrow-left"></i></div>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-email" id="profileEmail">loading@email.com</div>
            </div>
            <div class="info-row"><span class="info-label">Account Number</span><span class="info-value" id="accountNumber">-</span></div>
            <div class="info-row"><span class="info-label">Phone Number</span><span class="info-value" id="phoneNumber">-</span></div>
            <div class="info-row"><span class="info-label">Member Since</span><span class="info-value" id="memberSince">-</span></div>
        </div>

        <div class="profile-card">
            <div class="section-title"><i class="fas fa-lock"></i> Change Password</div>
            <div class="form-group"><label>Current Password</label><input type="password" id="currentPassword" placeholder="Enter current password"></div>
            <div class="form-group"><label>New Password</label><input type="password" id="newPassword" placeholder="Enter new password"></div>
            <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword" placeholder="Confirm new password"></div>
            <button class="btn" onclick="updatePassword()">Update Password</button>
        </div>

        <div class="profile-card">
            <div class="section-title"><i class="fas fa-key"></i> Change Transaction PIN</div>
            <div class="form-group"><label>Current PIN</label><div class="pin-inputs"><input type="password" maxlength="1" id="curPin1" onkeyup="movePin(this,'curPin2')"><input type="password" maxlength="1" id="curPin2" onkeyup="movePin(this,'curPin3')"><input type="password" maxlength="1" id="curPin3" onkeyup="movePin(this,'curPin4')"><input type="password" maxlength="1" id="curPin4"></div></div>
            <div class="form-group"><label>New PIN</label><div class="pin-inputs"><input type="password" maxlength="1" id="newPin1" onkeyup="movePin(this,'newPin2')"><input type="password" maxlength="1" id="newPin2" onkeyup="movePin(this,'newPin3')"><input type="password" maxlength="1" id="newPin3" onkeyup="movePin(this,'newPin4')"><input type="password" maxlength="1" id="newPin4"></div></div>
            <button class="btn" onclick="updatePin()">Update PIN</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goToDashboard()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="goToCards()"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item" onclick="goToDashboard()"><i class="fas fa-paper-plane"></i><span>Send</span></div>
        <div class="nav-item" onclick="goToSupport()"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item active" onclick="goToProfile()"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div></div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://global-bank-n6c3.onrender.com';
        let userData = null;
        
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function movePin(current, nextId) { if(current.value.length === 1) document.getElementById(nextId).focus(); }
        function goToDashboard() { window.location.href = '/dashboard.html'; }
        function goToCards() { window.location.href = '/cards.html'; }
        function goToSupport() { window.location.href = '/support.html'; }
        function goToProfile() { window.location.href = '/profile.html'; }
        
        async function loadProfile() {
            try {
                const res = await fetch(`${apiUrl}/api/me`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if (res.status === 401) { logout(); return; }
                userData = await res.json();
                const user = userData.user;
                document.getElementById('profileName').innerHTML = user.fullName;
                document.getElementById('profileEmail').innerHTML = user.email;
                document.getElementById('accountNumber').innerHTML = user.accountNumber;
                document.getElementById('phoneNumber').innerHTML = user.phone;
                document.getElementById('memberSince').innerHTML = new Date(user.createdAt).toLocaleDateString();
            } catch(e) { console.error(e); }
        }
        
        async function updatePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (!current || !newPass) { Swal.fire('Error', 'Fill all fields', 'error'); return; }
            if (newPass !== confirm) { Swal.fire('Error', 'New passwords do not match', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/update-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ currentPassword: current, newPassword: newPass })
                });
                const data = await res.json();
                if (data.success) { Swal.fire('Success', 'Password updated!', 'success'); document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
                else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Update failed', 'error'); } finally { showLoading(false); }
        }
        
        async function updatePin() {
            const curPin = document.getElementById('curPin1').value + document.getElementById('curPin2').value + document.getElementById('curPin3').value + document.getElementById('curPin4').value;
            const newPin = document.getElementById('newPin1').value + document.getElementById('newPin2').value + document.getElementById('newPin3').value + document.getElementById('newPin4').value;
            if (curPin.length !== 4 || newPin.length !== 4) { Swal.fire('Error', 'Enter valid 4-digit PINs', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/update-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ currentPin: curPin, newPin: newPin })
                });
                const data = await res.json();
                if (data.success) { Swal.fire('Success', 'PIN updated!', 'success'); document.querySelectorAll('.pin-inputs input').forEach(i => i.value = ''); }
                else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Update failed', 'error'); } finally { showLoading(false); }
        }
        
        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/'; }
        loadProfile();
    </script>
</body>
</html>
