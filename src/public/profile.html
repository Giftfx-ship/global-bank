<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Profile | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }
        
        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --input-bg: #0F1622;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --glass-bg: rgba(17, 24, 39, 0.8);
        }
        
        [data-theme="light"] {
            --bg-body: #F3F4F6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --input-bg: #F9FAFB;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            padding-bottom: 80px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        @keyframes fadeIn { 
            from { opacity: 0; } 
            to { opacity: 1; } 
        }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        
        .logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }
        .logo-icon i { font-size: 22px; color: #0A0E1A; }
        .logo span {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .user-section { display: flex; align-items: center; gap: 20px; }
        
        .theme-toggle {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            cursor: pointer;
        }
        .theme-option {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 8px; }
        
        .avatar {
            width: 46px; height: 46px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .avatar:hover { transform: scale(1.1) rotate(5deg); }
        .avatar i { color: #0A0E1A; font-size: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }
        
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            animation: slideUp 0.6s ease;
            transition: all 0.3s;
        }
        
        .profile-card:hover { border-color: var(--gold); }
        
        .profile-header {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(198,164,63,0.3);
            transition: all 0.3s;
        }
        
        .profile-avatar i { font-size: 48px; color: #0A0E1A; }
        
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .profile-email {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 6px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .info-row:last-child { border-bottom: none; }
        
        .info-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-label i { color: var(--gold); width: 20px; }
        
        .info-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 14px;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border);
        }
        
        .section-title i { color: var(--gold); font-size: 20px; }
        
        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group label i {
            margin-right: 8px;
            color: var(--gold);
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
            transform: translateY(-2px);
        }
        
        .pin-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .pin-inputs input {
            width: 60px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--gold);
            transition: all 0.2s;
        }
        
        .pin-inputs input:focus {
            border-color: var(--gold);
            transform: scale(1.05);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 18px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }
        
        .btn-logout {
            background: linear-gradient(135deg, #EF4444, #DC2626);
            color: white;
        }
        
        .btn-logout:hover {
            box-shadow: 0 10px 25px rgba(239,68,68,0.3);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #4B5563, #374151);
            color: white;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 24px;
            border-top: 1px solid var(--border);
            z-index: 99;
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 14px;
            transition: all 0.3s;
        }
        
        .nav-item i {
            font-size: 22px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 6px;
        }
        
        .nav-item span {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .nav-item.active {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.05));
        }
        
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        .nav-item:hover { transform: translateY(-3px); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader {
            width: 60px; height: 60px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 500px) {
            .container { padding: 16px; }
            .profile-card { padding: 24px; }
            .pin-inputs input { width: 50px; height: 50px; font-size: 20px; }
            .top-bar { padding: 12px 20px; }
            .logo span { font-size: 16px; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
            .info-row { flex-direction: column; gap: 8px; }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="logo" onclick="location.href='/dashboard.html'">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage Bank</span>
        </div>
        <div class="user-section">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i><span> Dark</span></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i><span> Light</span></div>
            </div>
            <div class="avatar" onclick="location.href='/profile.html'">
                <i class="fas fa-user"></i>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Profile Information Card -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-astronaut"></i>
                </div>
                <div class="profile-name" id="profileName">Loading...</div>
                <div class="profile-email" id="profileEmail">Loading...</div>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-credit-card"></i> Account Number</span>
                <span class="info-value" id="accountNumber">—</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-phone-alt"></i> Phone Number</span>
                <span class="info-value" id="phoneNumber">—</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-globe"></i> Currency</span>
                <span class="info-value" id="currency">—</span>
            </div>
            <div class="info-row">
                <span class="info-label"><i class="fas fa-calendar-alt"></i> Member Since</span>
                <span class="info-value" id="memberSince">—</span>
            </div>
        </div>

        <!-- Change Password Card -->
        <div class="profile-card">
            <div class="section-title">
                <i class="fas fa-lock"></i> Change Password
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Current Password</label>
                <input type="password" id="currentPassword" placeholder="Enter your current password">
            </div>
            <div class="form-group">
                <label><i class="fas fa-shield-alt"></i> New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label><i class="fas fa-check-circle"></i> Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <button class="btn" onclick="updatePassword()">
                <i class="fas fa-save"></i> Update Password
            </button>
        </div>

        <!-- Change PIN Card -->
        <div class="profile-card">
            <div class="section-title">
                <i class="fas fa-key"></i> Change Transaction PIN
            </div>
            <div class="form-group">
                <label><i class="fas fa-old-key"></i> Current PIN</label>
                <div class="pin-inputs">
                    <input type="password" maxlength="1" id="curPin1" onkeyup="movePin(this,'curPin2')">
                    <input type="password" maxlength="1" id="curPin2" onkeyup="movePin(this,'curPin3')">
                    <input type="password" maxlength="1" id="curPin3" onkeyup="movePin(this,'curPin4')">
                    <input type="password" maxlength="1" id="curPin4">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-fingerprint"></i> New PIN</label>
                <div class="pin-inputs">
                    <input type="password" maxlength="1" id="newPin1" onkeyup="movePin(this,'newPin2')">
                    <input type="password" maxlength="1" id="newPin2" onkeyup="movePin(this,'newPin3')">
                    <input type="password" maxlength="1" id="newPin3" onkeyup="movePin(this,'newPin4')">
                    <input type="password" maxlength="1" id="newPin4">
                </div>
            </div>
            <button class="btn" onclick="updatePin()">
                <i class="fas fa-sync-alt"></i> Change PIN
            </button>
        </div>

        <!-- Danger Zone Card -->
        <div class="profile-card">
            <div class="section-title">
                <i class="fas fa-exclamation-triangle" style="color: #EF4444;"></i> Danger Zone
            </div>
            <button class="btn btn-logout" onclick="confirmLogout()">
                <i class="fas fa-sign-out-alt"></i> Logout Account
            </button>
            <button class="btn btn-secondary" onclick="deleteAccount()" style="margin-top: 12px; background: linear-gradient(135deg, #DC2626, #991B1B);">
                <i class="fas fa-trash-alt"></i> Delete Account
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="location.href='/cards.html'"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item" onclick="location.href='/loans.html'"><i class="fas fa-hand-holding-usd"></i><span>Loans</span></div>
        <div class="nav-item" onclick="location.href='/support.html'"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item active" onclick="location.href='/profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loader-text">Processing...</div>
    </div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://prime-heritage-bank.onrender.com';
        let userData = null;
        
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('darkOption').classList.remove('active');
            document.getElementById('lightOption').classList.remove('active');
            if (theme === 'dark') document.getElementById('darkOption').classList.add('active');
            else document.getElementById('lightOption').classList.add('active');
        }
        
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function movePin(current, nextId) {
            if (current.value.length === 1 && nextId) {
                document.getElementById(nextId).focus();
            }
        }
        
        async function loadProfile() {
            try {
                const token = localStorage.getItem('token');
                if (!token) {
                    window.location.href = '/';
                    return;
                }
                const res = await fetch(`${apiUrl}/api/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.status === 401) {
                    logout();
                    return;
                }
                userData = await res.json();
                const user = userData.user;
                document.getElementById('profileName').innerHTML = user.fullName || user.firstName + ' ' + user.lastName;
                document.getElementById('profileEmail').innerHTML = user.email;
                document.getElementById('accountNumber').innerHTML = user.accountNumber || '—';
                document.getElementById('phoneNumber').innerHTML = user.phone || '—';
                document.getElementById('currency').innerHTML = user.currency || 'USD';
                document.getElementById('memberSince').innerHTML = user.createdAt ? new Date(user.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '—';
            } catch(e) {
                console.error(e);
            }
        }
        
        async function updatePassword() {
            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (!current || !newPass) {
                Swal.fire('Error', 'Please fill all fields', 'error');
                return;
            }
            if (newPass !== confirm) {
                Swal.fire('Error', 'New passwords do not match', 'error');
                return;
            }
            if (newPass.length < 6) {
                Swal.fire('Error', 'Password must be at least 6 characters', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/update-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ currentPassword: current, newPassword: newPass })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success!', 'Your password has been updated.', 'success');
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                } else {
                    Swal.fire('Error', data.error || 'Invalid current password', 'error');
                }
            } catch(err) {
                Swal.fire('Error', 'Could not connect to server', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        async function updatePin() {
            const curPin = document.getElementById('curPin1').value + document.getElementById('curPin2').value + 
                          document.getElementById('curPin3').value + document.getElementById('curPin4').value;
            const newPin = document.getElementById('newPin1').value + document.getElementById('newPin2').value + 
                          document.getElementById('newPin3').value + document.getElementById('newPin4').value;
            
            if (curPin.length !== 4 || newPin.length !== 4) {
                Swal.fire('Error', 'Please enter valid 4-digit PINs', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/update-pin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ currentPin: curPin, newPin: newPin })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success!', 'Your transaction PIN has been updated.', 'success');
                    document.querySelectorAll('.pin-inputs input').forEach(i => i.value = '');
                } else {
                    Swal.fire('Error', data.error || 'Invalid current PIN', 'error');
                }
            } catch(err) {
                Swal.fire('Error', 'Could not connect to server', 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function confirmLogout() {
            Swal.fire({
                title: 'Logout?',
                text: 'You will be redirected to the login screen.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                cancelButtonColor: '#6B7280',
                confirmButtonText: 'Yes, Logout',
                background: document.body.getAttribute('data-theme') === 'dark' ? '#111827' : '#fff',
                color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
            }).then((result) => {
                if (result.isConfirmed) {
                    logout();
                }
            });
        }
        
        function deleteAccount() {
            Swal.fire({
                title: 'Delete Account?',
                html: 'This action is <strong>permanent</strong> and cannot be undone.<br>All your data will be lost.',
                icon: 'error',
                showCancelButton: true,
                confirmButtonColor: '#DC2626',
                cancelButtonColor: '#6B7280',
                confirmButtonText: 'Yes, Delete My Account',
                background: document.body.getAttribute('data-theme') === 'dark' ? '#111827' : '#fff',
                color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire('Account Deleted', 'Your account has been removed.', 'info');
                    logout();
                }
            });
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }
        
        // Check authentication on load
        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') {
            window.location.href = '/';
        }
        
        loadProfile();
    </script>
</body>
</html>
