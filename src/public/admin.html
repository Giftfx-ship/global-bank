<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Portal - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0E1A;
            overflow-x: auto;
        }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-card: #111827;
            --border: #1F2937;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .admin-header {
            background: var(--bg-card);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .admin-header h1 { color: var(--gold); font-size: 22px; }
        .admin-header h1 i { margin-right: 10px; }
        .logout-btn {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 8px 20px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: var(--gold); color: #0A0E1A; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stat-card .value { font-size: 32px; font-weight: 700; color: var(--gold); }
        .stat-card .label { color: var(--text-secondary); margin-top: 8px; font-size: 13px; }
        
        .section-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h3 { color: var(--text-primary); font-size: 18px; }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            color: #0A0E1A;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-gold:hover { transform: translateY(-1px); filter: brightness(1.05); }
        
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-primary); }
        th { color: var(--gold); font-weight: 600; }
        .btn-sm {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--gold);
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
            transition: all 0.3s;
        }
        .btn-sm:hover { background: var(--gold); color: #0A0E1A; }
        .btn-danger { border-color: var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }
        
        .status-active { color: var(--success); }
        .status-inactive { color: var(--error); }
        
        /* BBC Codes Grid */
        .bbc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .bbc-code-item {
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .bbc-code-item:hover { border-color: var(--gold); transform: translateY(-2px); }
        .bbc-code-number {
            font-family: monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: 2px;
        }
        .bbc-step {
            font-size: 10px;
            background: rgba(198,164,63,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            color: var(--gold);
        }
        .bbc-expiry {
            font-size: 10px;
            color: var(--text-secondary);
        }
        .bbc-status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 20px;
        }
        .status-used { background: rgba(239,68,68,0.2); color: var(--error); }
        .status-unused { background: rgba(16,185,129,0.2); color: var(--success); }
        .bbc-actions {
            display: flex;
            gap: 5px;
            margin-left: auto;
        }
        .bbc-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            transition: all 0.3s;
        }
        .bbc-action-btn.edit { color: var(--warning); }
        .bbc-action-btn.delete { color: var(--error); }
        .bbc-action-btn.copy { color: var(--success); }
        .bbc-action-btn:hover { background: rgba(255,255,255,0.1); }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 { color: var(--gold); font-size: 20px; }
        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            table { font-size: 12px; }
            .bbc-code-number { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> Prime Heritage Bank - Admin Portal</h1>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    
    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>
        
        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-users"></i> User Management</h3>
                <button class="btn-gold" onclick="openGenerateBBCModal()"><i class="fas fa-key"></i> Generate BBC Codes</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, or account number..." onkeyup="filterUsers()">
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr><th>Name</th><th>Account</th><th>Currency</th><th>Balance</th><th>Status</th><th>Actions</th><th>BBC Codes</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Send Money to User</h3><button class="close-modal" onclick="closeModal('sendModal')">&times;</button></div>
            <input type="hidden" id="sendUserId">
            <div class="form-group"><label>User</label><input type="text" id="sendUserDisplay" readonly></div>
            <div class="form-group"><label>Sender Name (What user sees)</label><input type="text" id="senderName" placeholder="e.g., Michael Thompson"></div>
            <div class="form-group"><label>Amount</label><input type="number" id="sendAmount"></div>
            <div class="form-group"><label>Currency</label><select id="sendCurrency"><option>USD</option><option>EUR</option><option>GBP</option></select></div>
            <div class="form-group"><label>Note</label><input type="text" id="sendNote" placeholder="Optional"></div>
            <button class="btn" onclick="sendMoney()">Send Money</button>
            <button class="btn" style="margin-top:10px; background:#333;" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <!-- View BBC Modal -->
    <div id="bbcModal" class="modal">
        <div class="modal-content" style="max-width: 750px;">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> BBC Codes Management - <span id="bbcUserName">User</span></h3>
                <button class="close-modal" onclick="closeModal('bbcModal')">&times;</button>
            </div>
            <div style="margin-bottom: 20px;">
                <div class="form-group">
                    <label>Filter by Step:</label>
                    <select id="bbcStepFilter" onchange="filterBBCodes()" style="width: 100%; padding: 10px; background: #0F1622; border: 1px solid var(--border); border-radius: 12px; color: white;">
                        <option value="all">All Steps (1, 2, 3)</option>
                        <option value="1">Step 1 - Currency Exchange / Initial Verification</option>
                        <option value="2">Step 2 - Transfer Authorization / Second Check</option>
                        <option value="3">Step 3 - Final Security / Completion Code</option>
                    </select>
                </div>
            </div>
            <div id="bbcCodesList" class="bbc-grid"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn-gold" style="flex:1;" onclick="openGenerateForUser()"><i class="fas fa-plus"></i> Generate New Codes</button>
                <button class="btn" style="flex:1; background:#333;" onclick="closeModal('bbcModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Generate BBC Modal -->
    <div id="generateBBCModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Generate BBC Codes</h3><button class="close-modal" onclick="closeModal('generateBBCModal')">&times;</button></div>
            <div class="form-group"><label>Select User</label><select id="bbcUserId" style="width:100%; padding:12px;"></select></div>
            <div class="form-group"><label>BBC Step</label><select id="bbcStep">
                <option value="1">Step 1 - Currency Exchange / Initial</option>
                <option value="2">Step 2 - Transfer Authorization</option>
                <option value="3">Step 3 - Final Security</option>
            </select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="bbcQuantity" value="10" min="1" max="100"></div>
            <div class="form-group"><label>Expiry (days)</label><input type="number" id="bbcExpiryDays" value="30" min="1" max="365"></div>
            <button class="btn" onclick="generateBBCodes()">Generate Codes</button>
        </div>
    </div>

    <!-- Edit BBC Modal -->
    <div id="editBBCModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Edit BBC Code</h3><button class="close-modal" onclick="closeModal('editBBCModal')">&times;</button></div>
            <input type="hidden" id="editBbcId">
            <div class="form-group"><label>BBC Code</label><input type="text" id="editBbcCode" placeholder="6-digit code" maxlength="6"></div>
            <div class="form-group"><label>Step</label><select id="editBbcStep">
                <option value="1">Step 1 - Currency Exchange</option>
                <option value="2">Step 2 - Transfer Authorization</option>
                <option value="3">Step 3 - Final Security</option>
            </select></div>
            <div class="form-group"><label>Status</label><select id="editBbcStatus">
                <option value="false">Active (Unused)</option>
                <option value="true">Used (Inactive)</option>
            </select></div>
            <button class="btn" onclick="updateBBCode()">Update Code</button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div></div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://prime-heritage-bank.onrender.com';
        let users = [];
        let currentBbcUserId = null;
        let allBbcCodes = [];
        
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = users.filter(u => 
                u.fullName.toLowerCase().includes(search) || 
                u.email.toLowerCase().includes(search) || 
                u.accountNumber.toLowerCase().includes(search)
            );
            renderUsers(filtered);
        }
        
        function renderUsers(userList = users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            for (let u of userList) {
                tbody.innerHTML += `
                    <tr>
                        <td>${u.firstName} ${u.lastName}<br><small style="color:var(--text-secondary)">${u.email}</small></td>
                        <td>${u.accountNumber}</td>
                        <td>${u.currency}</td>
                        <td>${u.currency} ${(u.totalBalance || 0).toLocaleString()}</td>
                        <td class="${u.isActive ? 'status-active' : 'status-inactive'}">${u.isActive ? 'Active' : 'Frozen'}</td>
                        <td>
                            <button class="btn-sm" onclick="openSendModal('${u._id}', '${u.fullName}', '${u.accountNumber}')">Send $</button>
                            <button class="btn-sm ${u.isActive ? 'btn-danger' : ''}" onclick="toggleUserStatus('${u._id}')">${u.isActive ? 'Freeze' : 'Activate'}</button>
                         </td>
                        <td>
                            <button class="btn-sm" onclick="viewBBCodes('${u._id}', '${u.fullName}')"><i class="fas fa-key"></i> Manage (${u.bbcCount || 0})</button>
                         </td>
                     </tr>
                `;
            }
        }
        
        function updateStats() {
            const total = users.reduce((s,u) => s + (u.totalBalance || 0), 0);
            const totalBbc = users.reduce((s,u) => s + (u.bbcCount || 0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="value">${users.length}</div><div class="label">Total Users</div></div>
                <div class="stat-card"><div class="value">$${total.toLocaleString()}</div><div class="label">Total Balance</div></div>
                <div class="stat-card"><div class="value">${totalBbc}</div><div class="label">Total BBC Codes</div></div>
                <div class="stat-card"><div class="value">24/7</div><div class="label">Active Support</div></div>
            `;
        }
        
        function populateUserSelect() {
            const select = document.getElementById('bbcUserId');
            select.innerHTML = '';
            for (let u of users) {
                select.innerHTML += `<option value="${u._id}">${u.fullName} (${u.accountNumber})</option>`;
            }
        }
        
        function openSendModal(id, name, acc) {
            document.getElementById('sendUserId').value = id;
            document.getElementById('sendUserDisplay').value = `${name} (${acc})`;
            openModal('sendModal');
        }
        
        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            const user = users.find(u => u._id === userId);
            if (!senderName || !amount) { Swal.fire('Error', 'Fill all fields', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/send`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ toAccountNumber: user.accountNumber, amount, currency, senderName, note })
                });
                const data = await res.json();
                if (data.success) { Swal.fire('Success', data.message, 'success'); closeModal('sendModal'); loadUsers(); }
                else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Failed', 'error'); } finally { showLoading(false); }
        }
        
        async function toggleUserStatus(userId) {
            const user = users.find(u => u._id === userId);
            if (!confirm(`Toggle status for ${user.fullName}?`)) return;
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/toggle-status`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ userId })
                });
                if (res.ok) loadUsers();
            } catch(e) { Swal.fire('Error', 'Failed', 'error'); } finally { showLoading(false); }
        }
        
        async function viewBBCodes(userId, userName) {
            currentBbcUserId = userId;
            document.getElementById('bbcUserName').innerHTML = userName;
            await loadBBCodes(userId);
            openModal('bbcModal');
        }
        
        async function loadBBCodes(userId) {
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/bbc/${userId}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                allBbcCodes = await res.json();
                filterBBCodes();
            } catch(e) { console.error(e); } finally { showLoading(false); }
        }
        
        function filterBBCodes() {
            const stepFilter = document.getElementById('bbcStepFilter').value;
            let filtered = allBbcCodes;
            if (stepFilter !== 'all') filtered = allBbcCodes.filter(c => c.step == stepFilter);
            
            const container = document.getElementById('bbcCodesList');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-secondary);">No BBC codes found. Generate some.</div>';
                return;
            }
            container.innerHTML = '';
            for (let code of filtered) {
                const expiryDate = code.expiresAt ? new Date(code.expiresAt).toLocaleDateString() : 'No expiry';
                const stepName = code.step == 1 ? 'Currency Exchange' : code.step == 2 ? 'Transfer Auth' : 'Final Security';
                const statusClass = code.isUsed ? 'status-used' : 'status-unused';
                const statusText = code.isUsed ? 'USED' : 'ACTIVE';
                container.innerHTML += `
                    <div class="bbc-code-item">
                        <div class="bbc-code-number">${code.code}</div>
                        <div class="bbc-step">Step ${code.step} - ${stepName}</div>
                        <div class="bbc-expiry">Exp: ${expiryDate}</div>
                        <div class="bbc-status ${statusClass}">${statusText}</div>
                        <div class="bbc-actions">
                            <button class="bbc-action-btn copy" onclick="copyCode('${code.code}')" title="Copy"><i class="fas fa-copy"></i></button>
                            <button class="bbc-action-btn edit" onclick="editBBCode('${code._id}', '${code.code}', ${code.step}, ${code.isUsed})" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="bbc-action-btn delete" onclick="deleteBBCode('${code._id}')" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }
        }
        
        function copyCode(code) {
            navigator.clipboard.writeText(code);
            Swal.fire('Copied!', `BBC Code ${code} copied to clipboard`, 'success');
        }
        
        function editBBCode(id, code, step, isUsed) {
            document.getElementById('editBbcId').value = id;
            document.getElementById('editBbcCode').value = code;
            document.getElementById('editBbcStep').value = step;
            document.getElementById('editBbcStatus').value = isUsed ? 'true' : 'false';
            closeModal('bbcModal');
            openModal('editBBCModal');
        }
        
        async function updateBBCode() {
            const id = document.getElementById('editBbcId').value;
            const newCode = document.getElementById('editBbcCode').value;
            const step = document.getElementById('editBbcStep').value;
            const isUsed = document.getElementById('editBbcStatus').value === 'true';
            
            if (!newCode || newCode.length !== 6) {
                Swal.fire('Error', 'BBC code must be 6 digits', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/bbc/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ id, code: newCode, step, isUsed })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success', 'BBC code updated', 'success');
                    closeModal('editBBCModal');
                    await loadBBCodes(currentBbcUserId);
                    openModal('bbcModal');
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Update failed', 'error'); } finally { showLoading(false); }
        }
        
        async function deleteBBCode(id) {
            Swal.fire({
                title: 'Delete BBC Code?',
                text: 'This action cannot be undone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                confirmButtonText: 'Delete'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoading(true);
                    try {
                        const res = await fetch(`${apiUrl}/api/admin/bbc/delete`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                            body: JSON.stringify({ id })
                        });
                        const data = await res.json();
                        if (data.success) {
                            Swal.fire('Deleted!', 'BBC code removed', 'success');
                            await loadBBCodes(currentBbcUserId);
                        } else { Swal.fire('Error', data.error, 'error'); }
                    } catch(e) { Swal.fire('Error', 'Delete failed', 'error'); } finally { showLoading(false); }
                }
            });
        }
        
        function openGenerateBBCModal() {
            populateUserSelect();
            openModal('generateBBCModal');
        }
        
        function openGenerateForUser() {
            const select = document.getElementById('bbcUserId');
            select.innerHTML = `<option value="${currentBbcUserId}">Current User (${document.getElementById('bbcUserName').innerText})</option>`;
            closeModal('bbcModal');
            openModal('generateBBCModal');
        }
        
        async function generateBBCodes() {
            const userId = document.getElementById('bbcUserId').value;
            const step = document.getElementById('bbcStep').value;
            const quantity = parseInt(document.getElementById('bbcQuantity').value);
            const expiryDays = parseInt(document.getElementById('bbcExpiryDays').value);
            
            if (!userId) { Swal.fire('Error', 'Select a user', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/generate-bbc`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ userId, step, quantity, expiryDays })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success', `${data.codes.length} BBC codes generated for Step ${step}`, 'success');
                    closeModal('generateBBCModal');
                    if (currentBbcUserId === userId) await loadBBCodes(userId);
                    loadUsers();
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Failed', 'error'); } finally { showLoading(false); }
        }
        
        async function loadUsers() {
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/users`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if (res.status === 403) { Swal.fire('Error', 'Admin only', 'error'); logout(); return; }
                users = await res.json();
                // Get BBC counts for each user
                for (let u of users) {
                    try {
                        const bbcRes = await fetch(`${apiUrl}/api/admin/bbc/${u._id}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                        const bbcCodes = await bbcRes.json();
                        u.bbcCount = bbcCodes.length;
                    } catch(e) { u.bbcCount = 0; }
                }
                renderUsers();
                updateStats();
                populateUserSelect();
            } catch(e) { console.error(e); } finally { showLoading(false); }
        }
        
        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/'; }
        
        loadUsers();
    </script>
</body>
</html>
