<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Bank - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A2540;
            overflow-x: hidden;
        }
        .admin-header {
            background: #0A2540;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { display: flex; align-items: center; gap: 10px; color: white; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #00D4AA, #0066FF);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-title { color: white; font-size: 14px; opacity: 0.8; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: 700; color: #0066FF; }
        .stat-label { font-size: 14px; color: #64748B; margin-top: 8px; }
        .section-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #E2E8F0;
        }
        th { background: #F8FAFC; font-weight: 600; }
        .btn-sm {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin: 2px;
        }
        .btn-primary { background: #0066FF; color: white; }
        .btn-success { background: #00D4AA; color: white; }
        .btn-warning { background: #FF5A5F; color: white; }
        .status-active { color: #00D4AA; }
        .status-inactive { color: #FF5A5F; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        @media (max-width: 768px) {
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-globe-americas"></i></div>
            <div><strong>Global Bank</strong><br><span class="admin-title">Admin Control Panel</span></div>
        </div>
        <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:white; padding:10px 20px; border-radius:12px; cursor:pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
            <div class="stat-card"><div class="stat-value" id="totalBalance">$0</div><div class="stat-label">Total Bank Balance</div></div>
            <div class="stat-card"><div class="stat-value" id="bbcAvailable">0</div><div class="stat-label">BBC Codes Available</div></div>
            <div class="stat-card"><div class="stat-value" id="bbcUsed">0</div><div class="stat-label">BBC Codes Used</div></div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <span><i class="fas fa-users"></i> User Management</span>
                <button class="btn-sm btn-primary" onclick="generateBBCodes()">Generate BBC Codes</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr><th>Name</th><th>Account</th><th>Currency</th><th>Balance</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">
                <span><i class="fas fa-history"></i> Recent Transactions</span>
                <button class="btn-sm btn-primary" onclick="refreshTransactions()">Refresh</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="transactionsTable">
                    <thead><tr><th>Date</th><th>From</th><th>To</th><th>Amount</th><th>Reference</th></tr></thead>
                    <tbody id="transactionsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px;">Send Money to User</h3>
            <input type="hidden" id="sendUserId">
            <input type="text" id="sendUserDisplay" class="form-input" placeholder="User" readonly>
            <input type="text" id="senderName" class="form-input" placeholder="Sender Name (What user sees)">
            <input type="number" id="sendAmount" class="form-input" placeholder="Amount">
            <select id="sendCurrency" class="form-input">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
            </select>
            <input type="text" id="sendNote" class="form-input" placeholder="Note (Optional)">
            <button class="btn" onclick="sendMoney()">Send Money</button>
            <button class="btn" style="background:#E2E8F0; color:#1E293B; margin-top:10px;" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <script>
        const apiUrl = 'http://localhost:3000';
        let users = [];

        async function init() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            await loadUsers();
            await loadTransactions();
            await loadBBCStats();
        }

        async function loadUsers() {
            try {
                const response = await fetch(`${apiUrl}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (response.status === 403) {
                    alert('Admin access required');
                    logout();
                    return;
                }
                users = await response.json();
                renderUsers();
                updateStats();
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function renderUsers() {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            for (const user of users) {
                tbody.innerHTML += `
                    <tr>
                        <td>${user.firstName} ${user.lastName}<br><small style="color:#94A3B8">${user.email}</small></td>
                        <td>${user.accountNumber}</td>
                        <td>${user.currency}</td>
                        <td>${user.currency} ${(user.totalBalance || 0).toLocaleString()}</td>
                        <td class="${user.isActive ? 'status-active' : 'status-inactive'}">${user.isActive ? 'Active' : 'Frozen'}</td>
                        <td>
                            <button class="btn-sm btn-primary" onclick="openSendModal('${user._id}', '${user.fullName}', '${user.accountNumber}')">Send $</button>
                            <button class="btn-sm ${user.isActive ? 'btn-warning' : 'btn-success'}" onclick="toggleUserStatus('${user._id}')">${user.isActive ? 'Freeze' : 'Activate'}</button>
                        </td>
                    </tr>
                `;
            }
            document.getElementById('totalUsers').innerHTML = users.length;
        }

        function updateStats() {
            const total = users.reduce((sum, u) => sum + (u.totalBalance || 0), 0);
            document.getElementById('totalBalance').innerHTML = `$${total.toLocaleString()}`;
        }

        async function loadTransactions() {
            try {
                const response = await fetch(`${apiUrl}/api/admin/transactions`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const transactions = await response.json();
                const tbody = document.getElementById('transactionsBody');
                tbody.innerHTML = '';
                for (const tx of transactions.slice(0, 20)) {
                    tbody.innerHTML += `
                        <tr>
                            <td>${new Date(tx.createdAt).toLocaleDateString()}</td>
                            <td>${tx.fromName || 'Admin'}</td>
                            <td>${tx.toName || '-'}</td>
                            <td>${tx.currency} ${tx.amount?.toLocaleString()}</td>
                            <td><small>${tx.reference}</small></td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        async function loadBBCStats() {
            try {
                const response = await fetch(`${apiUrl}/api/admin/bbc-stats`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const stats = await response.json();
                document.getElementById('bbcAvailable').innerHTML = stats.unused || 0;
                document.getElementById('bbcUsed').innerHTML = stats.used || 0;
            } catch (error) {
                console.error('Error loading BBC stats:', error);
            }
        }

        function openSendModal(userId, userName, accountNumber) {
            document.getElementById('sendUserId').value = userId;
            document.getElementById('sendUserDisplay').value = `${userName} (${accountNumber})`;
            document.getElementById('sendModal').style.display = 'flex';
        }

        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            
            if (!senderName || !amount) {
                alert('Please fill all fields');
                return;
            }
            
            const user = users.find(u => u._id === userId);
            if (!user) return;
            
            try {
                const response = await fetch(`${apiUrl}/api/admin/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        toAccountNumber: user.accountNumber,
                        amount,
                        currency,
                        senderName,
                        note
                    })
                });
                const data = await response.json();
                if (data.success) {
                    alert(data.message);
                    closeModal('sendModal');
                    loadUsers();
                    loadTransactions();
                } else {
                    alert(data.error);
                }
            } catch (error) {
                alert('Failed to send money');
            }
        }

        async function toggleUserStatus(userId) {
            if (!confirm('Toggle user status?')) return;
            try {
                const response = await fetch(`${apiUrl}/api/admin/toggle-status`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ userId })
                });
                const data = await response.json();
                if (data.success) {
                    loadUsers();
                }
            } catch (error) {
                alert('Failed to update status');
            }
        }

        async function generateBBCodes() {
            const quantity = prompt('How many BBC codes to generate?', '50');
            if (!quantity) return;
            try {
                const response = await fetch(`${apiUrl}/api/admin/generate-codes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ quantity: parseInt(quantity) })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`${data.count} BBC codes generated!`);
                    loadBBCStats();
                }
            } catch (error) {
                alert('Failed to generate codes');
            }
        }

        function refreshTransactions() {
            loadTransactions();
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            document.getElementById('senderName').value = '';
            document.getElementById('sendAmount').value = '';
            document.getElementById('sendNote').value = '';
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        init();
    </script>
</body>
</html>
