<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Portal | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }

        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --input-bg: #0F1622;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --glass-bg: rgba(17, 24, 39, 0.8);
            --table-hover: rgba(198,164,63,0.05);
        }

        [data-theme="light"] {
            --bg-body: #F3F4F6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --input-bg: #F9FAFB;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --table-hover: rgba(198,164,63,0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            overflow-x: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .admin-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-header h1 i { -webkit-text-fill-color: var(--gold); margin-right: 10px; }

        .theme-toggle {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            cursor: pointer;
            margin-right: 15px;
        }
        .theme-option {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 8px; }

        .logout-btn {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.1));
            border: 1px solid var(--gold);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
            transform: translateY(-2px);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
            animation: fadeIn 0.6s ease;
        }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(198,164,63,0.1), transparent);
            transition: left 0.5s;
        }
        .stat-card:hover::before { left: 100%; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .stat-card i { font-size: 40px; color: var(--gold); margin-bottom: 12px; display: block; }
        .stat-card .value { font-size: 36px; font-weight: 800; color: var(--gold); }
        .stat-card .label { color: var(--text-secondary); margin-top: 8px; font-size: 13px; font-weight: 500; }

        .section-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 28px;
            animation: fadeIn 0.6s ease 0.2s backwards;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h3 {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
        }
        .section-header h3 i { color: var(--gold); margin-right: 10px; }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }
        .btn-gold i { font-size: 14px; }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        th {
            color: var(--gold);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover { background: var(--table-hover); transition: background 0.3s; }

        .btn-sm {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.1));
            border: 1px solid var(--gold);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-sm:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
            transform: scale(1.05);
        }
        .btn-danger { border-color: var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }

        .status-active { color: var(--success); font-weight: 600; }
        .status-inactive { color: var(--error); font-weight: 600; }

        .bbc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 5px;
        }
        .bbc-code-item {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            width: calc(33.33% - 12px);
            min-width: 280px;
        }
        .bbc-code-item:hover {
            border-color: var(--gold);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.1);
        }
        .bbc-code-number {
            font-family: monospace;
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 3px;
        }
        .bbc-step {
            font-size: 10px;
            background: linear-gradient(135deg, rgba(198,164,63,0.2), rgba(158,128,50,0.1));
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--gold);
            font-weight: 600;
        }
        .bbc-expiry { font-size: 10px; color: var(--text-secondary); }
        .bbc-status { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .status-used { background: rgba(239,68,68,0.2); color: var(--error); }
        .status-unused { background: rgba(16,185,129,0.2); color: var(--success); }
        .bbc-actions { display: flex; gap: 6px; margin-left: auto; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 {
            color: var(--gold);
            font-size: 24px;
            font-weight: 700;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .close-modal:hover { color: var(--error); transform: rotate(90deg); }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 16px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 60px; height: 60px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        .badge {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            color: #0A0E1A;
            margin-left: 8px;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
            .bbc-code-item { width: calc(50% - 12px); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .bbc-code-item { width: 100%; }
            table { font-size: 12px; }
            th, td { padding: 10px 8px; }
            .btn-sm { padding: 4px 8px; font-size: 10px; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
            .section-header h3 { font-size: 16px; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> Prime Heritage Bank | Admin Portal</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i><span> Dark</span></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i><span> Light</span></div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-users"></i> User Management</h3>
                <button class="btn-gold" onclick="openGenerateBBCModal()"><i class="fas fa-key"></i> Generate BBC Codes</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, account number, or IBAN..." onkeyup="filterUsers()">
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Account Details</th>
                            <th>Balance</th>
                            <th>Status</th>
                            <th>Actions</th>
                            <th>BBC Codes</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> Send Money to User</h3>
                <button class="close-modal" onclick="closeModal('sendModal')">&times;</button>
            </div>
            <input type="hidden" id="sendUserId">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Recipient</label>
                <input type="text" id="sendUserDisplay" readonly>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tie"></i> Sender Name</label>
                <input type="text" id="senderName" placeholder="e.g., Admin - Prime Heritage Bank" value="System Administrator">
            </div>
            <div class="form-group">
                <label><i class="fas fa-dollar-sign"></i> Amount</label>
                <input type="number" id="sendAmount" placeholder="0.00">
            </div>
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Currency</label>
                <select id="sendCurrency">
                    <option value="USD">💵 USD - US Dollar</option>
                    <option value="EUR">💶 EUR - Euro</option>
                    <option value="GBP">💷 GBP - British Pound</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen"></i> Note (Optional)</label>
                <input type="text" id="sendNote" placeholder="Payment for...">
            </div>
            <button class="btn" onclick="sendMoney()"><i class="fas fa-paper-plane"></i> Send Money</button>
            <button class="btn" style="margin-top: 12px; background: rgba(100,100,100,0.3);" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <!-- View BBC Modal -->
    <div id="bbcModal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> BBC Codes Management - <span id="bbcUserName">User</span></h3>
                <button class="close-modal" onclick="closeModal('bbcModal')">&times;</button>
            </div>
            <div class="form-group">
                <label><i class="fas fa-filter"></i> Filter by Step:</label>
                <select id="bbcStepFilter" onchange="filterBBCodes()" style="width: 100%;">
                    <option value="all">📋 All Steps (1, 2, 3)</option>
                    <option value="1">🔑 Step 1 - Currency Exchange / Initial Verification</option>
                    <option value="2">🔒 Step 2 - Transfer Authorization / Second Check</option>
                    <option value="3">🛡️ Step 3 - Final Security / Completion Code</option>
                </select>
            </div>
            <div id="bbcCodesList" class="bbc-grid"></div>
            <div style="margin-top: 24px; display: flex; gap: 12px;">
                <button class="btn-gold" style="flex:1;" onclick="openGenerateForUser()"><i class="fas fa-plus"></i> Generate New Codes</button>
                <button class="btn" style="flex:1; background: rgba(100,100,100,0.3);" onclick="closeModal('bbcModal')">Close</button>
            </div>
        </div>
    </div>

    <!-- Generate BBC Modal -->
    <div id="generateBBCModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-key"></i> Generate BBC Codes</h3>
                <button class="close-modal" onclick="closeModal('generateBBCModal')">&times;</button>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Select User</label>
                <select id="bbcUserId" style="width:100%;"></select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-layer-group"></i> BBC Step</label>
                <select id="bbcStep">
                    <option value="1">🔑 Step 1 - Currency Exchange / Initial</option>
                    <option value="2">🔒 Step 2 - Transfer Authorization</option>
                    <option value="3">🛡️ Step 3 - Final Security</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-hashtag"></i> Quantity</label>
                <input type="number" id="bbcQuantity" value="10" min="1" max="100">
            </div>
            <div class="form-group">
                <label><i class="fas fa-calendar"></i> Expiry (days)</label>
                <input type="number" id="bbcExpiryDays" value="30" min="1" max="365">
            </div>
            <button class="btn" onclick="generateBBCodes()"><i class="fas fa-dice-d6"></i> Generate Codes</button>
        </div>
    </div>

    <!-- Edit BBC Modal -->
    <div id="editBBCModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit BBC Code</h3>
                <button class="close-modal" onclick="closeModal('editBBCModal')">&times;</button>
            </div>
            <input type="hidden" id="editBbcId">
            <div class="form-group">
                <label><i class="fas fa-code"></i> BBC Code</label>
                <input type="text" id="editBbcCode" placeholder="6-digit code" maxlength="6">
            </div>
            <div class="form-group">
                <label><i class="fas fa-layer-group"></i> Step</label>
                <select id="editBbcStep">
                    <option value="1">Step 1 - Currency Exchange</option>
                    <option value="2">Step 2 - Transfer Authorization</option>
                    <option value="3">Step 3 - Final Security</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-toggle-on"></i> Status</label>
                <select id="editBbcStatus">
                    <option value="false">✅ Active (Unused)</option>
                    <option value="true">❌ Used (Inactive)</option>
                </select>
            </div>
            <button class="btn" onclick="updateBBCode()"><i class="fas fa-save"></i> Update Code</button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div style="color: var(--gold); margin-top: 20px;">Processing...</div>
    </div>

    <script>
        const API_URL = 'https://global-bank-i4cd.onrender.com';
        let users = [];
        let currentBbcUserId = null;
        let allBbcCodes = [];

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('adminTheme', theme);
            document.getElementById('darkOption').classList.remove('active');
            document.getElementById('lightOption').classList.remove('active');
            if (theme === 'dark') document.getElementById('darkOption').classList.add('active');
            else document.getElementById('lightOption').classList.add('active');
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('adminTheme') || 'dark';
        setTheme(savedTheme);

        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = users.filter(u => 
                u.full_name?.toLowerCase().includes(search) || 
                u.email?.toLowerCase().includes(search) || 
                u.account_number?.toLowerCase().includes(search) ||
                u.iban?.toLowerCase().includes(search)
            );
            renderUsers(filtered);
        }

        function renderUsers(userList = users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            for (let u of userList) {
                const isAdmin = u.is_admin;
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${u.full_name}</strong><br>
                            <small style="color:var(--text-secondary)">${u.email}</small>
                            ${isAdmin ? '<span class="badge">Admin</span>' : ''}
                        </td>
                        <td>
                            <small><i class="fas fa-hashtag" style="color:var(--gold);"></i> ${u.account_number}</small><br>
                            <small><i class="fas fa-globe" style="color:var(--gold);"></i> ${u.currency}</small>
                        </td>
                        <td><strong style="color:var(--gold);">${u.currency} ${(u.totalBalance || 0).toLocaleString()}</strong></td>
                        <td class="${u.is_active ? 'status-active' : 'status-inactive'}">
                            <i class="fas ${u.is_active ? 'fa-check-circle' : 'fa-ban'}"></i> ${u.is_active ? 'Active' : 'Frozen'}
                        </td>
                        <td>
                            <button class="btn-sm" onclick="openSendModal('${u.id}', '${u.full_name}', '${u.account_number}')">
                                <i class="fas fa-paper-plane"></i> Send
                            </button>
                            ${!isAdmin ? `
                            <button class="btn-sm ${u.is_active ? 'btn-danger' : ''}" onclick="toggleUserStatus('${u.id}')">
                                <i class="fas ${u.is_active ? 'fa-snowflake' : 'fa-play'}"></i> ${u.is_active ? 'Freeze' : 'Activate'}
                            </button>` : ''}
                        </td>
                        <td>
                            <button class="btn-sm" onclick="viewBBCodes('${u.id}', '${u.full_name}')">
                                <i class="fas fa-key"></i> Manage (${u.bbcCount || 0})
                            </button>
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats() {
            const totalBalance = users.reduce((s,u) => s + (u.totalBalance || 0), 0);
            const totalBbc = users.reduce((s,u) => s + (u.bbcCount || 0), 0);
            const activeUsers = users.filter(u => u.is_active).length;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="value">${users.length}</div>
                    <div class="label">Total Users</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-wallet"></i>
                    <div class="value">${totalBalance.toLocaleString()}</div>
                    <div class="label">Total Balance (USD)</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-key"></i>
                    <div class="value">${totalBbc}</div>
                    <div class="label">BBC Codes Generated</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-check"></i>
                    <div class="value">${activeUsers}</div>
                    <div class="label">Active Users</div>
                </div>
            `;
        }

        function populateUserSelect() {
            const select = document.getElementById('bbcUserId');
            select.innerHTML = '';
            for (let u of users) {
                if (!u.is_admin) {
                    select.innerHTML += `<option value="${u.id}">${u.full_name} (${u.account_number}) - ${u.currency}</option>`;
                }
            }
            if (select.innerHTML === '') {
                select.innerHTML = '<option value="">No users available</option>';
            }
        }

        function openSendModal(id, name, acc) {
            document.getElementById('sendUserId').value = id;
            document.getElementById('sendUserDisplay').value = `${name} (${acc})`;
            openModal('sendModal');
        }

        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            const user = users.find(u => u.id === userId);

            if (!senderName || !amount || amount <= 0) {
                Swal.fire('Error', 'Please fill all required fields correctly', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        toAccountNumber: user.account_number,
                        amount,
                        currency,
                        senderName,
                        note
                    })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success!', data.message, 'success');
                    closeModal('sendModal');
                    loadUsers();
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Failed to send money', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function toggleUserStatus(userId) {
            const user = users.find(u => u.id === userId);
            Swal.fire({
                title: `${user.is_active ? 'Freeze' : 'Activate'} ${user.full_name}?`,
                text: user.is_active ? 'User will not be able to login or transact.' : 'User will regain full access.',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: user.is_active ? '#EF4444' : '#10B981',
                confirmButtonText: user.is_active ? 'Yes, Freeze' : 'Yes, Activate'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoading(true);
                    try {
                        const res = await fetch(`${apiUrl}/api/admin/toggle-status`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            body: JSON.stringify({ userId })
                        });
                        const data = await res.json();
                        if (data.success) {
                            Swal.fire('Success', `User ${user.is_active ? 'frozen' : 'activated'}`, 'success');
                            loadUsers();
                        } else {
                            Swal.fire('Error', data.error, 'error');
                        }
                    } catch(e) {
                        Swal.fire('Error', 'Failed', 'error');
                    } finally {
                        showLoading(false);
                    }
                }
            });
        }

        async function viewBBCodes(userId, userName) {
            currentBbcUserId = userId;
            document.getElementById('bbcUserName').innerHTML = userName;
            await loadBBCodes(userId);
            openModal('bbcModal');
        }

        async function loadBBCodes(userId) {
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/bbc/${userId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                allBbcCodes = await res.json();
                filterBBCodes();
            } catch(e) { console.error(e); } finally { showLoading(false); }
        }

        function filterBBCodes() {
            const stepFilter = document.getElementById('bbcStepFilter').value;
            let filtered = allBbcCodes;
            if (stepFilter !== 'all') filtered = allBbcCodes.filter(c => c.step == stepFilter);

            const container = document.getElementById('bbcCodesList');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:60px; color:var(--text-secondary);"><i class="fas fa-key" style="font-size: 48px; margin-bottom: 16px; display: block;"></i>No BBC codes found. Generate some codes for this user.</div>';
                return;
            }

            container.innerHTML = '';
            for (let code of filtered) {
                const expiryDate = code.expires_at ? new Date(code.expires_at).toLocaleDateString() : 'No expiry';
                const stepName = code.step == 1 ? 'Currency Exchange' : code.step == 2 ? 'Transfer Auth' : 'Final Security';
                const stepIcon = code.step == 1 ? '🔑' : code.step == 2 ? '🔒' : '🛡️';
                const statusClass = code.is_used ? 'status-used' : 'status-unused';
                const statusText = code.is_used ? 'USED' : 'ACTIVE';
                const statusIcon = code.is_used ? '❌' : '✅';

                container.innerHTML += `
                    <div class="bbc-code-item">
                        <div class="bbc-code-number">${code.code}</div>
                        <div class="bbc-step">${stepIcon} Step ${code.step} - ${stepName}</div>
                        <div class="bbc-expiry"><i class="fas fa-calendar"></i> ${expiryDate}</div>
                        <div class="bbc-status ${statusClass}">${statusIcon} ${statusText}</div>
                    </div>
                `;
            }
        }

        function openGenerateBBCModal() {
            populateUserSelect();
            openModal('generateBBCModal');
        }

        function openGenerateForUser() {
            const select = document.getElementById('bbcUserId');
            select.innerHTML = `<option value="${currentBbcUserId}">Current User (${document.getElementById('bbcUserName').innerText})</option>`;
            closeModal('bbcModal');
            openModal('generateBBCModal');
        }

        async function generateBBCodes() {
            const userId = document.getElementById('bbcUserId').value;
            const step = document.getElementById('bbcStep').value;
            const quantity = parseInt(document.getElementById('bbcQuantity').value);
            const expiryDays = parseInt(document.getElementById('bbcExpiryDays').value);

            if (!userId) {
                Swal.fire('Error', 'Select a user', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/generate-bbc`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ userId, step, quantity, expiryDays })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Generated!',
                        html: `${data.codes.length} BBC codes generated for Step ${step}<br><small>Expires in ${expiryDays} days</small>`,
                        confirmButtonColor: '#C6A43F'
                    });
                    closeModal('generateBBCModal');
                    if (currentBbcUserId === userId) await loadBBCodes(userId);
                    loadUsers();
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function loadUsers() {
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.status === 403) {
                    Swal.fire('Error', 'Admin access only', 'error');
                    logout();
                    return;
                }
                users = await res.json();

                for (let u of users) {
                    try {
                        const bbcRes = await fetch(`${apiUrl}/api/admin/bbc/${u.id}`, {
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                        });
                        const bbcCodes = await bbcRes.json();
                        u.bbcCount = bbcCodes.length;
                    } catch(e) {
                        u.bbcCount = 0;
                    }
                }
                renderUsers();
                updateStats();
                populateUserSelect();
            } catch(e) {
                console.error(e);
            } finally {
                showLoading(false);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        loadUsers();
    </script>
</body>
</html>
