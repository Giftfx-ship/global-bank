<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Heritage Bank - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A1A2F; }
        .admin-header {
            background: rgba(10,26,47,0.95); padding: 20px 32px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(212,175,55,0.2);
        }
        .logo h1 { color: #D4AF37; font-size: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 24px; text-align: center; border: 1px solid rgba(212,175,55,0.1); }
        .stat-value { font-size: 32px; font-weight: 700; color: #D4AF37; }
        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }
        .section-card { background: rgba(255,255,255,0.05); border-radius: 24px; padding: 24px; margin-bottom: 24px; border: 1px solid rgba(212,175,55,0.1); }
        .section-title { font-size: 20px; font-weight: 700; color: #D4AF37; margin-bottom: 20px; display: flex; justify-content: space-between; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #D4AF37; }
        .btn-sm { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; margin: 2px; font-weight: 600; }
        .btn-primary { background: #D4AF37; color: #0A1A2F; }
        .btn-danger { background: #FF5A5F; color: white; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000;
            align-items: center; justify-content: center;
        }
        .modal-content { background: #0F1629; border-radius: 24px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid rgba(212,175,55,0.3); }
        .form-input { width: 100%; padding: 12px; margin-bottom: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; color: white; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #D4AF37, #B8860B); color: #0A1A2F; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; }
        .status-active { color: #00D4AA; }
        .status-inactive { color: #FF5A5F; }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo"><h1><i class="fas fa-crown"></i> Prime Heritage Bank - Admin</h1></div>
        <button onclick="logout()" style="background:rgba(255,255,255,0.1); border:none; color:#D4AF37; padding:10px 20px; border-radius:12px; cursor:pointer;">Logout</button>
    </div>
    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="section-card">
            <div class="section-title"><span><i class="fas fa-users"></i> User Management</span><button class="btn-sm btn-primary" onclick="generateBBCodes()"><i class="fas fa-key"></i> Generate BBC Codes</button></div>
            <div style="overflow-x:auto;"><table id="usersTable"><thead><tr><th>Name</th><th>Account</th><th>Currency</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead><tbody id="usersBody"></tbody></table></div>
        </div>
    </div>

    <div id="sendModal" class="modal">
        <div class="modal-content">
            <h3 style="color:#D4AF37; margin-bottom:20px;">Send Money to User</h3>
            <input type="hidden" id="sendUserId">
            <input type="text" id="sendUserDisplay" class="form-input" placeholder="User" readonly>
            <input type="text" id="senderName" class="form-input" placeholder="Sender Name (What user sees)">
            <input type="number" id="sendAmount" class="form-input" placeholder="Amount">
            <select id="sendCurrency" class="form-input"><option>USD</option><option>EUR</option><option>GBP</option></select>
            <input type="text" id="sendNote" class="form-input" placeholder="Note">
            <button class="btn" onclick="sendMoney()">Send Money</button>
            <button class="btn" style="margin-top:10px; background:#333;" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://global-bank-n6c3.onrender.com';
        let users = [];

        async function loadUsers() {
            try {
                const res = await fetch(`${apiUrl}/api/admin/users`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if(res.status === 403) { alert('Admin only'); logout(); return; }
                users = await res.json();
                renderUsers();
                updateStats();
            } catch(e) { console.error(e); }
        }

        function renderUsers() {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            for(let u of users) {
                tbody.innerHTML += `<tr><td>${u.firstName} ${u.lastName}<br><small>${u.email}</small></td><td>${u.accountNumber}</td><td>${u.currency}</td><td>${u.currency} ${(u.totalBalance || 0).toLocaleString()}</td><td class="${u.isActive ? 'status-active' : 'status-inactive'}">${u.isActive ? 'Active' : 'Frozen'}</td>
                <td><button class="btn-sm btn-primary" onclick="openSendModal('${u._id}', '${u.fullName}', '${u.accountNumber}')">Send $</button>
                <button class="btn-sm btn-danger" onclick="toggleStatus('${u._id}')">${u.isActive ? 'Freeze' : 'Activate'}</button></td></tr>`;
            }
        }

        function updateStats() {
            const total = users.reduce((s,u) => s + (u.totalBalance || 0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${users.length}</div><div>Total Users</div></div>
                <div class="stat-card"><div class="stat-value">$${total.toLocaleString()}</div><div>Total Balance</div></div>
                <div class="stat-card"><div class="stat-value">👑</div><div>Heritage Bank</div></div>
                <div class="stat-card"><div class="stat-value">24/7</div><div>Support Active</div></div>
            `;
        }

        function openSendModal(id, name, acc) {
            document.getElementById('sendUserId').value = id;
            document.getElementById('sendUserDisplay').value = `${name} (${acc})`;
            openModal('sendModal');
        }

        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            const user = users.find(u => u._id === userId);
            if(!senderName || !amount) { alert('Fill all fields'); return; }
            try {
                const res = await fetch(`${apiUrl}/api/admin/send`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ toAccountNumber: user.accountNumber, amount, currency, senderName, note })
                });
                const data = await res.json();
                if(data.success) { Swal.fire('Success', data.message, 'success'); closeModal('sendModal'); loadUsers(); }
                else { alert(data.error); }
            } catch(e) { alert('Failed'); }
        }

        async function toggleStatus(userId) {
            const user = users.find(u => u._id === userId);
            if(!confirm(`Toggle status for ${user.fullName}?`)) return;
            try {
                const res = await fetch(`${apiUrl}/api/admin/toggle-status`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ userId })
                });
                if(res.ok) loadUsers();
            } catch(e) { alert('Failed'); }
        }

        async function generateBBCodes() {
            const qty = prompt('How many BBC codes to generate?', '50');
            if(!qty) return;
            try {
                const res = await fetch(`${apiUrl}/api/admin/generate-codes`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ quantity: parseInt(qty) })
                });
                const data = await res.json();
                if(data.success) Swal.fire('Success', `${data.codes.length} codes generated!`, 'success');
            } catch(e) { alert('Failed'); }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/'; }

        loadUsers();
    </script>
</body>
</html>
