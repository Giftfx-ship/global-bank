<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prime Heritage Bank - Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0E1A; }
        :root { --gold: #C6A43F; --gold-dark: #9E8032; --bg-card: #111827; --border: #1F2937; --text-primary: #FFFFFF; --text-secondary: #9CA3AF; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .admin-header { background: var(--bg-card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .admin-header h1 { color: var(--gold); font-size: 22px; }
        .admin-header h1 i { margin-right: 10px; }
        .logout-btn { background: rgba(198,164,63,0.1); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 30px; color: var(--gold); cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { background: var(--gold); color: #0A0E1A; }
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
        .stat-card { background: var(--bg-card); border-radius: 20px; padding: 24px; border: 1px solid var(--border); text-align: center; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: var(--gold); }
        .stat-card .label { color: var(--text-secondary); margin-top: 8px; font-size: 13px; }
        
        .section-card { background: var(--bg-card); border-radius: 20px; padding: 24px; border: 1px solid var(--border); margin-bottom: 24px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .section-header h3 { color: var(--text-primary); font-size: 18px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; padding: 10px 20px; border-radius: 30px; color: #0A0E1A; font-weight: 600; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-primary); }
        th { color: var(--gold); font-weight: 600; }
        .btn-sm { background: rgba(198,164,63,0.1); border: 1px solid var(--gold); padding: 6px 12px; border-radius: 20px; color: var(--gold); cursor: pointer; margin: 2px; font-size: 12px; }
        .status-active { color: #10B981; }
        .status-inactive { color: #EF4444; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 24px; padding: 28px; max-width: 500px; width: 90%; border: 1px solid var(--border); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h3 { color: var(--gold); }
        .close-modal { background: none; border: none; font-size: 24px; color: var(--text-secondary); cursor: pointer; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #0F1622; border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; border-radius: 12px; color: #0A0E1A; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .bbc-code { font-family: monospace; font-size: 18px; letter-spacing: 2px; color: var(--gold); background: #0F1622; padding: 8px 12px; border-radius: 8px; display: inline-block; margin: 4px; cursor: pointer; }
        .bbc-code:hover { background: var(--gold); color: #0A0E1A; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,14,26,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .loader { width: 48px; height: 48px; border: 3px solid rgba(198,164,63,0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2,1fr); } table { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> Prime Heritage Bank - Admin</h1>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-users"></i> User Management</h3>
                <button class="btn-gold" onclick="showGenerateBBCModal()"><i class="fas fa-key"></i> Generate BBC Codes</button>
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead><tr><th>Name</th><th>Account</th><th>Currency</th><th>Balance</th><th>Status</th><th>Actions</th></tr></thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Send Money to User</h3><button class="close-modal" onclick="closeModal('sendModal')">&times;</button></div>
            <input type="hidden" id="sendUserId">
            <div class="form-group"><label>User</label><input type="text" id="sendUserDisplay" readonly></div>
            <div class="form-group"><label>Sender Name (What user sees)</label><input type="text" id="senderName" placeholder="e.g., Michael Thompson"></div>
            <div class="form-group"><label>Amount</label><input type="number" id="sendAmount"></div>
            <div class="form-group"><label>Currency</label><select id="sendCurrency"><option>USD</option><option>EUR</option><option>GBP</option></select></div>
            <div class="form-group"><label>Note</label><input type="text" id="sendNote" placeholder="Optional"></div>
            <button class="btn" onclick="sendMoney()">Send Money</button>
            <button class="btn" style="margin-top:10px; background:#333;" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <!-- View BBC Codes Modal -->
    <div id="bbcModal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header"><h3>BBC Authorization Codes</h3><button class="close-modal" onclick="closeModal('bbcModal')">&times;</button></div>
            <p style="color:#9CA3AF; margin-bottom:16px;">Click any code to copy. Share these with the user.</p>
            <div id="bbcCodesList" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;"></div>
            <button class="btn" onclick="generateMoreCodes()">Generate More Codes</button>
        </div>
    </div>

    <!-- Generate BBC Modal -->
    <div id="generateBBCModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Generate BBC Codes</h3><button class="close-modal" onclick="closeModal('generateBBCModal')">&times;</button></div>
            <div class="form-group"><label>Select User</label><select id="bbcUserId" style="width:100%; padding:12px;"></select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="bbcQuantity" value="50" min="1" max="200"></div>
            <button class="btn" onclick="generateBBCodes()">Generate Codes</button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div></div>

    <script>
        const apiUrl = 'https://global-bank-n6c3.onrender.com';
        let users = [];

        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function loadUsers() {
            try {
                const res = await fetch(`${apiUrl}/api/admin/users`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                if(res.status === 403) { Swal.fire('Error', 'Admin access required', 'error'); logout(); return; }
                users = await res.json();
                renderUsers();
                updateStats();
                populateUserSelect();
            } catch(e) { console.error(e); }
        }

        function renderUsers() {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            for(let u of users) {
                tbody.innerHTML += `<tr>
                    <td>${u.firstName} ${u.lastName}<br><small style="color:#9CA3AF">${u.email}</small></td>
                    <td>${u.accountNumber}</td>
                    <td>${u.currency}</td>
                    <td>${u.currency} ${(u.totalBalance || 0).toLocaleString()}</td>
                    <td class="${u.isActive ? 'status-active' : 'status-inactive'}">${u.isActive ? 'Active' : 'Frozen'}</td>
                    <td>
                        <button class="btn-sm" onclick="openSendModal('${u._id}', '${u.fullName}', '${u.accountNumber}')">Send $</button>
                        <button class="btn-sm" onclick="viewBBCodes('${u._id}')">View BBC</button>
                    </td>
                </tr>`;
            }
        }

        function populateUserSelect() {
            const select = document.getElementById('bbcUserId');
            select.innerHTML = '';
            for(let u of users) {
                select.innerHTML += `<option value="${u._id}">${u.fullName} (${u.accountNumber})</option>`;
            }
        }

        function updateStats() {
            const total = users.reduce((s,u) => s + (u.totalBalance || 0), 0);
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="value">${users.length}</div><div class="label">Total Users</div></div>
                <div class="stat-card"><div class="value">$${total.toLocaleString()}</div><div class="label">Total Balance</div></div>
                <div class="stat-card"><div class="value"><i class="fas fa-crown"></i></div><div class="label">Heritage Bank</div></div>
                <div class="stat-card"><div class="value">24/7</div><div class="label">Support Active</div></div>
            `;
        }

        function openSendModal(id, name, acc) {
            document.getElementById('sendUserId').value = id;
            document.getElementById('sendUserDisplay').value = `${name} (${acc})`;
            openModal('sendModal');
        }

        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value;
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            const user = users.find(u => u._id === userId);
            if(!senderName || !amount) { Swal.fire('Error', 'Fill all fields', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/send`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ toAccountNumber: user.accountNumber, amount, currency, senderName, note })
                });
                const data = await res.json();
                if(data.success) { Swal.fire('Success', data.message, 'success'); closeModal('sendModal'); loadUsers(); }
                else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Failed to send money', 'error'); } finally { showLoading(false); }
        }

        async function viewBBCodes(userId) {
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/bbc/${userId}`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const codes = await res.json();
                const codesDiv = document.getElementById('bbcCodesList');
                codesDiv.innerHTML = '';
                if(codes.length === 0) {
                    codesDiv.innerHTML = '<p style="color:#9CA3AF;">No active BBC codes. Generate some first.</p>';
                } else {
                    for(let c of codes) {
                        codesDiv.innerHTML += `<div class="bbc-code" onclick="copyCode('${c.code}')">${c.code}</div>`;
                    }
                }
                openModal('bbcModal');
            } catch(e) { Swal.fire('Error', 'Failed to load codes', 'error'); } finally { showLoading(false); }
        }

        function copyCode(code) {
            navigator.clipboard.writeText(code);
            Swal.fire('Copied!', `Code ${code} copied to clipboard`, 'success');
        }

        function showGenerateBBCModal() {
            openModal('generateBBCModal');
        }

        async function generateBBCodes() {
            const userId = document.getElementById('bbcUserId').value;
            const quantity = parseInt(document.getElementById('bbcQuantity').value);
            if(!userId) { Swal.fire('Error', 'Select a user', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/generate-bbc`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ userId, quantity })
                });
                const data = await res.json();
                if(data.success) {
                    Swal.fire('Success', `${data.codes.length} BBC codes generated`, 'success');
                    closeModal('generateBBCModal');
                } else { Swal.fire('Error', 'Failed to generate codes', 'error'); }
            } catch(e) { Swal.fire('Error', 'Failed to generate codes', 'error'); } finally { showLoading(false); }
        }

        async function generateMoreCodes() {
            const userId = document.getElementById('bbcUserId')?.value || users[0]?._id;
            if(!userId) return;
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/admin/generate-bbc`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ userId, quantity: 10 })
                });
                const data = await res.json();
                if(data.success) {
                    viewBBCodes(userId);
                }
            } catch(e) { Swal.fire('Error', 'Failed', 'error'); } finally { showLoading(false); }
        }

        function logout() { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/'; }
        loadUsers();
    </script>
</body>
</html>
