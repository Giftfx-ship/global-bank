<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Portal | Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
        }

        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --input-bg: #0F1622;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --glass-bg: rgba(17, 24, 39, 0.8);
            --table-hover: rgba(198,164,63,0.05);
        }

        [data-theme="light"] {
            --bg-body: #F3F4F6;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --input-bg: #F9FAFB;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --glass-bg: rgba(255, 255, 255, 0.8);
            --table-hover: rgba(198,164,63,0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            overflow-x: auto;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .admin-header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .admin-header h1 i { -webkit-text-fill-color: var(--gold); margin-right: 10px; }

        .theme-toggle {
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            cursor: pointer;
            margin-right: 15px;
        }
        .theme-option {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .theme-option.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 8px; }

        .logout-btn {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.1));
            border: 1px solid var(--gold);
            padding: 10px 24px;
            border-radius: 40px;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
            transform: translateY(-2px);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
            animation: fadeIn 0.6s ease;
        }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid var(--border);
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(198,164,63,0.1), transparent);
            transition: left 0.5s;
        }
        .stat-card:hover::before { left: 100%; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .stat-card i { font-size: 40px; color: var(--gold); margin-bottom: 12px; display: block; }
        .stat-card .value { font-size: 36px; font-weight: 800; color: var(--gold); }
        .stat-card .label { color: var(--text-secondary); margin-top: 8px; font-size: 13px; font-weight: 500; }

        .section-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid var(--border);
            margin-bottom: 28px;
            animation: fadeIn 0.6s ease 0.2s backwards;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
        }
        .section-header h3 {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
        }
        .section-header h3 i { color: var(--gold); margin-right: 10px; }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }
        .btn-gold i { font-size: 14px; }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .search-bar input {
            flex: 1;
            padding: 14px 20px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
        }
        th {
            color: var(--gold);
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        tr:hover { background: var(--table-hover); transition: background 0.3s; }

        .btn-sm {
            background: linear-gradient(135deg, rgba(198,164,63,0.15), rgba(158,128,50,0.1));
            border: 1px solid var(--gold);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--gold);
            cursor: pointer;
            margin: 2px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-sm:hover {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
            transform: scale(1.05);
        }
        .btn-danger { border-color: var(--error); color: var(--error); }
        .btn-danger:hover { background: var(--error); color: white; }

        .status-active { color: var(--success); font-weight: 600; }
        .status-inactive { color: var(--error); font-weight: 600; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 32px;
            max-width: 550px;
            width: 90%;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 {
            color: var(--gold);
            font-size: 24px;
            font-weight: 700;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }
        .close-modal:hover { color: var(--error); transform: rotate(90deg); }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 16px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.98);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 60px; height: 60px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        .badge {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            color: #0A0E1A;
            margin-left: 8px;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2,1fr); }
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            table { font-size: 12px; }
            th, td { padding: 10px 8px; }
            .btn-sm { padding: 4px 8px; font-size: 10px; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
            .section-header h3 { font-size: 16px; }
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="admin-header">
        <h1><i class="fas fa-crown"></i> Prime Heritage Bank | Admin Portal</h1>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i><span> Dark</span></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i><span> Light</span></div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="stats-grid" id="statsGrid"></div>

        <div class="section-card">
            <div class="section-header">
                <h3><i class="fas fa-users"></i> User Management</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn-gold" onclick="openGenerateBBCModal()"><i class="fas fa-key"></i> Generate BBC Codes</button>
                    <button class="btn-gold" onclick="loadUsers()"><i class="fas fa-sync-alt"></i> Refresh</button>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, email, account number..." onkeyup="filterUsers()">
            </div>
            <div style="overflow-x: auto;">
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Account Details</th>
                            <th>Balance</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Send Money Modal -->
    <div id="sendModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-paper-plane"></i> Send Money to User</h3>
                <button class="close-modal" onclick="closeModal('sendModal')">&times;</button>
            </div>
            <input type="hidden" id="sendUserId">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Recipient</label>
                <input type="text" id="sendUserDisplay" readonly>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tie"></i> Sender Name</label>
                <input type="text" id="senderName" placeholder="e.g., Admin - Prime Heritage Bank" value="System Administrator">
            </div>
            <div class="form-group">
                <label><i class="fas fa-dollar-sign"></i> Amount</label>
                <input type="number" id="sendAmount" placeholder="0.00">
            </div>
            <div class="form-group">
                <label><i class="fas fa-globe"></i> Currency</label>
                <select id="sendCurrency">
                    <option value="USD">💵 USD - US Dollar</option>
                    <option value="EUR">💶 EUR - Euro</option>
                    <option value="GBP">💷 GBP - British Pound</option>
                </select>
            </div>
            <div class="form-group">
                <label><i class="fas fa-pen"></i> Note (Optional)</label>
                <input type="text" id="sendNote" placeholder="Payment for...">
            </div>
            <button class="btn" onclick="sendMoney()"><i class="fas fa-paper-plane"></i> Send Money</button>
            <button class="btn" style="margin-top: 12px; background: rgba(100,100,100,0.3);" onclick="closeModal('sendModal')">Cancel</button>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div style="color: var(--gold); margin-top: 20px;">Processing...</div>
    </div>

    <script>
        const API_URL = 'https://prime-heritage-bank.onrender.com';
        let users = [];

        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('adminTheme', theme);
            document.getElementById('darkOption').classList.remove('active');
            document.getElementById('lightOption').classList.remove('active');
            if (theme === 'dark') document.getElementById('darkOption').classList.add('active');
            else document.getElementById('lightOption').classList.add('active');
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('adminTheme') || 'dark';
        setTheme(savedTheme);

        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function filterUsers() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = users.filter(u => 
                u.full_name?.toLowerCase().includes(search) || 
                u.email?.toLowerCase().includes(search) || 
                u.account_number?.toLowerCase().includes(search)
            );
            renderUsers(filtered);
        }

        function renderUsers(userList = users) {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            for (let u of userList) {
                const isAdmin = u.is_admin;
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <strong>${u.full_name}</strong><br>
                            <small style="color:var(--text-secondary)">${u.email}</small>
                            ${isAdmin ? '<span class="badge">Admin</span>' : ''}
                        </td>
                        <td>
                            <small><i class="fas fa-hashtag" style="color:var(--gold);"></i> ${u.account_number}</small><br>
                            <small><i class="fas fa-globe" style="color:var(--gold);"></i> ${u.currency}</small>
                        </td>
                        <td><strong style="color:var(--gold);">${u.currency} ${(u.totalBalance || 0).toLocaleString()}</strong></td>
                        <td class="${u.is_active ? 'status-active' : 'status-inactive'}">
                            <i class="fas ${u.is_active ? 'fa-check-circle' : 'fa-ban'}"></i> ${u.is_active ? 'Active' : 'Frozen'}
                        </td>
                        <td>
                            <button class="btn-sm" onclick="openSendModal('${u.id}', '${u.full_name}', '${u.account_number}')">
                                <i class="fas fa-paper-plane"></i> Send
                            </button>
                            ${!isAdmin ? `
                            <button class="btn-sm ${u.is_active ? 'btn-danger' : ''}" onclick="toggleUserStatus('${u.id}')">
                                <i class="fas ${u.is_active ? 'fa-snowflake' : 'fa-play'}"></i> ${u.is_active ? 'Freeze' : 'Activate'}
                            </button>` : ''}
                            <button class="btn-sm btn-danger" onclick="deleteUser('${u.id}')">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }
        }

        function updateStats(stats) {
            if (!stats) return;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <div class="value">${stats.totalUsers || 0}</div>
                    <div class="label">Total Users</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-wallet"></i>
                    <div class="value">$${(stats.totalBalance || 0).toLocaleString()}</div>
                    <div class="label">Total Balance</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-key"></i>
                    <div class="value">${stats.totalBBCodes || 0}</div>
                    <div class="label">BBC Codes</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-user-check"></i>
                    <div class="value">${stats.activeUsers || 0}</div>
                    <div class="label">Active Users</div>
                </div>
            `;
        }

        function openSendModal(id, name, acc) {
            document.getElementById('sendUserId').value = id;
            document.getElementById('sendUserDisplay').value = `${name} (${acc})`;
            openModal('sendModal');
        }

        async function sendMoney() {
            const userId = document.getElementById('sendUserId').value;
            const senderName = document.getElementById('senderName').value.trim();
            const amount = parseFloat(document.getElementById('sendAmount').value);
            const currency = document.getElementById('sendCurrency').value;
            const note = document.getElementById('sendNote').value;
            const user = users.find(u => u.id === userId);

            if (!senderName) {
                Swal.fire('Error', 'Please enter sender name', 'error');
                return;
            }
            if (!amount || amount <= 0) {
                Swal.fire('Error', 'Please enter a valid amount', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/admin/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        toAccountNumber: user.account_number,
                        amount,
                        currency,
                        senderName: senderName,
                        note
                    })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success!', data.message, 'success');
                    closeModal('sendModal');
                    loadUsers();
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Failed to send money', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function deleteUser(userId) {
            const user = users.find(u => u.id === userId);
            Swal.fire({
                title: `Delete ${user.full_name}?`,
                text: 'This is permanent! All user data will be lost.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                confirmButtonText: 'Delete'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoading(true);
                    try {
                        const res = await fetch(`${API_URL}/api/admin/users/${userId}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                        });
                        const data = await res.json();
                        if (data.success) {
                            Swal.fire('Deleted!', data.message, 'success');
                            loadUsers();
                        } else {
                            Swal.fire('Error', data.error, 'error');
                        }
                    } catch(e) {
                        Swal.fire('Error', 'Failed to delete user', 'error');
                    } finally {
                        showLoading(false);
                    }
                }
            });
        }

        async function toggleUserStatus(userId) {
            const user = users.find(u => u.id === userId);
            Swal.fire({
                title: `${user.is_active ? 'Freeze' : 'Activate'} ${user.full_name}?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: user.is_active ? '#EF4444' : '#10B981',
                confirmButtonText: user.is_active ? 'Freeze' : 'Activate'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    showLoading(true);
                    try {
                        const res = await fetch(`${API_URL}/api/admin/toggle-status`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${localStorage.getItem('token')}`
                            },
                            body: JSON.stringify({ userId })
                        });
                        const data = await res.json();
                        if (data.success) {
                            Swal.fire('Success', data.message, 'success');
                            loadUsers();
                        } else {
                            Swal.fire('Error', data.error, 'error');
                        }
                    } catch(e) {
                        Swal.fire('Error', 'Failed', 'error');
                    } finally {
                        showLoading(false);
                    }
                }
            });
        }

        function openGenerateBBCModal() {
            Swal.fire('Coming Soon', 'BBC code generation will be available in the next update.', 'info');
        }

        async function loadUsers() {
            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.status === 403) {
                    Swal.fire('Error', 'Admin access only', 'error');
                    logout();
                    return;
                }
                users = await res.json();
                
                // Get stats
                const statsRes = await fetch(`${API_URL}/api/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const stats = await statsRes.json();
                
                renderUsers();
                updateStats(stats);
            } catch(e) {
                console.error(e);
                Swal.fire('Error', 'Failed to load data', 'error');
            } finally {
                showLoading(false);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        if (!localStorage.getItem('token')) {
            window.location.href = '/';
        }

        loadUsers();
    </script>
</body>
</html>
