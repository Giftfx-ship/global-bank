<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pay Bills - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); padding-bottom: 80px; transition: background 0.3s ease; }
        :root { --gold: #C6A43F; --gold-dark: #9E8032; --success: #10B981; }
        [data-theme="dark"] { --bg-body: #0A0E1A; --bg-card: #111827; --border: #1F2937; --text-primary: #FFFFFF; --text-secondary: #9CA3AF; --input-bg: #0F1622; }
        [data-theme="light"] { --bg-body: #F3F4F6; --bg-card: #FFFFFF; --border: #E5E7EB; --text-primary: #111827; --text-secondary: #6B7280; --input-bg: #F9FAFB; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .top-bar { background: var(--bg-card); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { font-size: 20px; color: #0A0E1A; }
        .logo span { color: var(--text-primary); font-size: 18px; font-weight: 600; }
        .user-section { display: flex; align-items: center; gap: 20px; }
        .balance-pill { background: rgba(198,164,63,0.15); padding: 8px 20px; border-radius: 40px; border: 1px solid rgba(198,164,63,0.3); }
        .balance-pill i { color: var(--gold); margin-right: 8px; }
        .balance-pill span { color: var(--gold); font-weight: 600; }
        .theme-toggle { background: rgba(198,164,63,0.1); border: 1px solid var(--border); border-radius: 40px; padding: 5px; display: flex; cursor: pointer; }
        .theme-option { padding: 8px 16px; border-radius: 30px; font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        .theme-option.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #0A0E1A; }
        .avatar { width: 42px; height: 42px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .avatar i { color: #0A0E1A; font-size: 18px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 24px; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 32px; border: 1px solid var(--border); animation: slideUp 0.5s; }
        .title { color: var(--gold); font-size: 24px; font-weight: 600; margin-bottom: 24px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 15px; }
        .pin-inputs, .code-inputs { display: flex; gap: 12px; justify-content: center; margin: 20px 0; }
        .pin-inputs input, .code-inputs input { width: 55px; height: 55px; text-align: center; font-size: 22px; font-weight: 600; background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; color: var(--gold); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border: none; border-radius: 14px; color: #0A0E1A; font-weight: 700; cursor: pointer; font-size: 16px; }
        .info-box { background: rgba(198,164,63,0.05); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid rgba(198,164,63,0.2); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); display: flex; justify-content: space-around; padding: 12px 20px; border-top: 1px solid var(--border); }
        .nav-item { text-align: center; cursor: pointer; padding: 8px 16px; border-radius: 12px; }
        .nav-item i { font-size: 20px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; color: var(--text-secondary); }
        .nav-item.active { background: rgba(198,164,63,0.1); }
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .loader { width: 48px; height: 48px; border: 3px solid rgba(198,164,63,0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="logo" onclick="location.href='/dashboard.html'"><div class="logo-icon"><i class="fas fa-crown"></i></div><span>Prime Heritage</span></div>
        <div class="user-section">
            <div class="theme-toggle" onclick="toggleTheme()"><div class="theme-option" id="darkOption"><i class="fas fa-moon"></i></div><div class="theme-option" id="lightOption"><i class="fas fa-sun"></i></div></div>
            <div class="balance-pill"><i class="fas fa-wallet"></i><span id="headerBalance">$0.00</span></div>
            <div class="avatar" onclick="location.href='/profile.html'"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="title"><i class="fas fa-globe-americas"></i> Pay Bills (International)</div>
            <div class="info-box"><div class="info-row"><span>Available Balance:</span><span id="userBalance" style="color:var(--gold);">$0.00</span></div></div>
            
            <div id="step1Form">
                <div class="form-group">
                    <label>Country / Region</label>
                    <select id="countrySelect">
                        <option value="US">🇺🇸 United States</option>
                        <option value="UK">🇬🇧 United Kingdom</option>
                        <option value="EU">🇪🇺 Europe (Euro)</option>
                        <option value="CA">🇨🇦 Canada</option>
                        <option value="AU">🇦🇺 Australia</option>
                        <option value="JP">🇯🇵 Japan</option>
                        <option value="SG">🇸🇬 Singapore</option>
                        <option value="AE">🇦🇪 UAE</option>
                        <option value="CH">🇨🇭 Switzerland</option>
                        <option value="NZ">🇳🇿 New Zealand</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bill Type</label>
                    <select id="billType">
                        <option value="Electricity">⚡ Electricity Bill</option>
                        <option value="Gas">🔥 Gas Bill</option>
                        <option value="Water">💧 Water Bill</option>
                        <option value="Internet">🌐 Internet/Cable</option>
                        <option value="Phone">📱 Mobile/Phone Bill</option>
                        <option value="Property Tax">🏠 Property Tax</option>
                        <option value="Insurance">🛡️ Insurance Premium</option>
                        <option value="Tuition">📚 Tuition Fee</option>
                        <option value="Credit Card">💳 Credit Card Bill</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Provider / Utility Company</label>
                    <select id="provider"></select>
                </div>
                <div class="form-group">
                    <label>Account / Customer Number</label>
                    <input type="text" id="accountNumber" placeholder="Enter your account or customer number">
                </div>
                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Transaction PIN</label>
                    <div class="pin-inputs">
                        <input type="password" maxlength="1" id="pin1" onkeyup="movePin(this,'pin2')">
                        <input type="password" maxlength="1" id="pin2" onkeyup="movePin(this,'pin3')">
                        <input type="password" maxlength="1" id="pin3" onkeyup="movePin(this,'pin4')">
                        <input type="password" maxlength="1" id="pin4">
                    </div>
                </div>
                <button class="btn" onclick="billStep1()">Continue →</button>
            </div>
            
            <div id="codeForm" style="display: none;">
                <div id="codeStep1">
                    <div class="form-group"><label>Authorization Code</label><div class="code-inputs"><input type="text" maxlength="1" id="c1_1" onkeyup="moveCode(this,'c1_2')"><input type="text" maxlength="1" id="c1_2" onkeyup="moveCode(this,'c1_3')"><input type="text" maxlength="1" id="c1_3" onkeyup="moveCode(this,'c1_4')"><input type="text" maxlength="1" id="c1_4" onkeyup="moveCode(this,'c1_5')"><input type="text" maxlength="1" id="c1_5" onkeyup="moveCode(this,'c1_6')"><input type="text" maxlength="1" id="c1_6"></div></div>
                    <button class="btn" onclick="submitCode1()">Verify</button>
                </div>
                <div id="codeStep2" style="display: none;">
                    <div class="form-group"><label>Security Code</label><div class="code-inputs"><input type="text" maxlength="1" id="c2_1" onkeyup="moveCode(this,'c2_2')"><input type="text" maxlength="1" id="c2_2" onkeyup="moveCode(this,'c2_3')"><input type="text" maxlength="1" id="c2_3" onkeyup="moveCode(this,'c2_4')"><input type="text" maxlength="1" id="c2_4" onkeyup="moveCode(this,'c2_5')"><input type="text" maxlength="1" id="c2_5" onkeyup="moveCode(this,'c2_6')"><input type="text" maxlength="1" id="c2_6"></div></div>
                    <button class="btn" onclick="submitCode2()">Verify</button>
                </div>
                <div id="codeStep3" style="display: none;">
                    <div class="form-group"><label>Verification Code</label><div class="code-inputs"><input type="text" maxlength="1" id="c3_1" onkeyup="moveCode(this,'c3_2')"><input type="text" maxlength="1" id="c3_2" onkeyup="moveCode(this,'c3_3')"><input type="text" maxlength="1" id="c3_3" onkeyup="moveCode(this,'c3_4')"><input type="text" maxlength="1" id="c3_4" onkeyup="moveCode(this,'c3_5')"><input type="text" maxlength="1" id="c3_5" onkeyup="moveCode(this,'c3_6')"><input type="text" maxlength="1" id="c3_6"></div></div>
                    <button class="btn" onclick="submitCode3()">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="location.href='/dashboard.html'"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="location.href='/cards.html'"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item active" onclick="location.href='/bills.html'"><i class="fas fa-bolt"></i><span>Bills</span></div>
        <div class="nav-item" onclick="location.href='/support.html'"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item" onclick="location.href='/profile.html'"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div><div class="loader-text">Processing Payment</div></div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://prime-heritage-bank.onrender.com';
        let currentRef = null;
        
        const PROVIDERS = {
            'US': ['Con Edison', 'PG&E', 'Duke Energy', 'National Grid', 'Ameren', 'Xcel Energy', 'Entergy'],
            'UK': ['British Gas', 'EDF Energy', 'E.ON', 'SSE', 'Octopus Energy', 'Ovo Energy', 'Scottish Power'],
            'EU': ['EON (Germany)', 'EDF (France)', 'Enel (Italy)', 'Iberdrola (Spain)', 'Vattenfall (Sweden)', 'Engie (France)'],
            'CA': ['Hydro One', 'BC Hydro', 'Enmax', 'Toronto Hydro', 'Hydro Quebec', 'Epcor'],
            'AU': ['AGL Energy', 'Origin Energy', 'Energy Australia', 'Red Energy', 'Simply Energy', 'Momentum Energy'],
            'JP': ['Tokyo Electric Power', 'Kansai Electric', 'Chubu Electric', 'Tohoku Electric'],
            'SG': ['Singapore Power', 'Keppel Electric', 'Tuas Power', 'Sembcorp Power'],
            'AE': ['DEWA (Dubai)', 'ADDC (Abu Dhabi)', 'SEWA (Sharjah)', 'FEWA'],
            'CH': ['Axpo', 'Alpiq', 'BKW Energie', 'EWZ (Zurich)', 'CKW'],
            'NZ': ['Mercury Energy', 'Genesis Energy', 'Contact Energy', 'Meridian Energy', 'Trustpower']
        };
        
        function updateProviders() {
            const country = document.getElementById('countrySelect').value;
            const providers = PROVIDERS[country] || ['Local Provider'];
            const select = document.getElementById('provider');
            select.innerHTML = '';
            providers.forEach(p => { select.innerHTML += `<option value="${p}">${p}</option>`; });
        }
        
        function setTheme(t){document.body.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('darkOption').classList.remove('active');document.getElementById('lightOption').classList.remove('active');if(t==='dark')document.getElementById('darkOption').classList.add('active');else document.getElementById('lightOption').classList.add('active');}
        function toggleTheme(){const c=document.body.getAttribute('data-theme');setTheme(c==='dark'?'light':'dark');}
        setTheme(localStorage.getItem('theme')||'dark');
        function movePin(c,n){if(c.value.length===1)document.getElementById(n).focus();}
        function moveCode(c,n){if(c.value.length===1)document.getElementById(n).focus();}
        function showLoading(s){document.getElementById('loadingOverlay').style.display=s?'flex':'none';}
        
        async function billStep1(){
            const country=document.getElementById('countrySelect').value,billType=document.getElementById('billType').value,provider=document.getElementById('provider').value,accountNumber=document.getElementById('accountNumber').value,amount=parseFloat(document.getElementById('amount').value),pin=document.getElementById('pin1').value+document.getElementById('pin2').value+document.getElementById('pin3').value+document.getElementById('pin4').value;
            if(!accountNumber||!amount||pin.length!==4){Swal.fire('Error','Fill all fields','error');return;}
            showLoading(true);
            try{
                const res=await fetch(`${apiUrl}/api/bills/step1`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('token')}`},body:JSON.stringify({billType,provider,accountNumber,amount,transactionPin:pin})});
                const data=await res.json();
                if(data.success){currentRef=data.reference;document.getElementById('step1Form').style.display='none';document.getElementById('codeForm').style.display='block';document.getElementById('codeStep1').style.display='block';document.getElementById('codeStep2').style.display='none';document.getElementById('codeStep3').style.display='none';document.getElementById('c1_1').focus();}
                else{Swal.fire('Error',data.error,'error');}
            }catch(e){Swal.fire('Error','Request failed','error');}finally{showLoading(false);}
        }
        
        async function submitCode1(){
            const code=document.getElementById('c1_1').value+document.getElementById('c1_2').value+document.getElementById('c1_3').value+document.getElementById('c1_4').value+document.getElementById('c1_5').value+document.getElementById('c1_6').value;
            if(code.length!==6){Swal.fire('Error','Enter 6-digit code','error');return;}
            showLoading(true);
            try{
                const res=await fetch(`${apiUrl}/api/bills/step2`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('token')}`},body:JSON.stringify({reference:currentRef,bbcCode:code})});
                const data=await res.json();
                if(data.success){document.getElementById('codeStep1').style.display='none';document.getElementById('codeStep2').style.display='block';document.getElementById('c2_1').focus();}
                else{Swal.fire('Error',data.error,'error');}
            }catch(e){Swal.fire('Error','Verification failed','error');}finally{showLoading(false);}
        }
        
        async function submitCode2(){
            const code=document.getElementById('c2_1').value+document.getElementById('c2_2').value+document.getElementById('c2_3').value+document.getElementById('c2_4').value+document.getElementById('c2_5').value+document.getElementById('c2_6').value;
            if(code.length!==6){Swal.fire('Error','Enter 6-digit code','error');return;}
            showLoading(true);
            try{
                const res=await fetch(`${apiUrl}/api/bills/step3`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('token')}`},body:JSON.stringify({reference:currentRef,bbcCode:code})});
                const data=await res.json();
                if(data.success){document.getElementById('codeStep2').style.display='none';document.getElementById('codeStep3').style.display='block';document.getElementById('c3_1').focus();}
                else{Swal.fire('Error',data.error,'error');}
            }catch(e){Swal.fire('Error','Verification failed','error');}finally{showLoading(false);}
        }
        
        async function submitCode3(){
            const code=document.getElementById('c3_1').value+document.getElementById('c3_2').value+document.getElementById('c3_3').value+document.getElementById('c3_4').value+document.getElementById('c3_5').value+document.getElementById('c3_6').value;
            if(code.length!==6){Swal.fire('Error','Enter 6-digit code','error');return;}
            showLoading(true);
            try{
                const res=await fetch(`${apiUrl}/api/bills/step4`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('token')}`},body:JSON.stringify({reference:currentRef,bbcCode:code})});
                const data=await res.json();
                if(data.success){showLoading(false);Swal.fire({icon:'success',title:'Bill Paid!',html:`${document.getElementById('billType').value} bill of $${document.getElementById('amount').value} paid`,confirmButtonColor:'#C6A43F'}).then(()=>{location.href='/dashboard.html';});}
                else{Swal.fire('Error',data.error,'error');showLoading(false);}
            }catch(e){Swal.fire('Error','Verification failed','error');showLoading(false);}
        }
        
        async function loadBalance(){
            try{const res=await fetch(`${apiUrl}/api/me`,{headers:{'Authorization':`Bearer ${localStorage.getItem('token')}`}});if(res.status===401){location.href='/';return;}const data=await res.json();document.getElementById('userBalance').innerHTML=`${data.user.currency} ${(data.totalBalance||0).toLocaleString()}`;document.getElementById('headerBalance').innerHTML=`${data.user.currency} ${(data.totalBalance||0).toLocaleString()}`;}catch(e){console.error(e);}
        }
        document.getElementById('countrySelect').addEventListener('change', updateProviders);
        updateProviders();
        loadBalance();
    </script>
</body>
</html>
