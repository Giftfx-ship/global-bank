<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Heritage Bank - Premium International Banking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0E1A 0%, #0F1622 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-card: #111827;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --border: #1F2937;
        }
        
        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .bg-animation div {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(198,164,63,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        .bg-animation div:nth-child(1) { top: -150px; left: -150px; animation-delay: 0s; }
        .bg-animation div:nth-child(2) { bottom: -150px; right: -150px; animation-delay: 5s; }
        .bg-animation div:nth-child(3) { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 500px; height: 500px; animation-delay: 10s; }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.2); }
        }
        
        /* Loading Animation */
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0E1A;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: fadeOut 2.5s ease forwards;
            pointer-events: none;
        }
        .cube-loader {
            width: 80px;
            height: 80px;
            perspective: 200px;
        }
        .cube-loader-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 1.5s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #C6A43F, #9E8032);
            opacity: 0.9;
        }
        .cube-face-front { transform: translateZ(40px); }
        .cube-face-back { transform: rotateY(180deg) translateZ(40px); }
        .cube-face-right { transform: rotateY(90deg) translateZ(40px); }
        .cube-face-left { transform: rotateY(-90deg) translateZ(40px); }
        .cube-face-top { transform: rotateX(90deg) translateZ(40px); }
        .cube-face-bottom { transform: rotateX(-90deg) translateZ(40px); }
        
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            opacity: 0;
            animation: slideUp 0.5s ease 2.5s forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 40px rgba(198,164,63,0.3);
        }
        .logo-icon i { font-size: 35px; color: #0A0E1A; }
        .logo h1 { color: var(--gold); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .logo p { color: var(--text-secondary); font-size: 12px; margin-top: 5px; }
        
        .card {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 35px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            background: #0F1622;
            padding: 5px;
            border-radius: 18px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 14px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0A0E1A;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(198,164,63,0.3);
        }
        
        .verification-box {
            background: #0F1622;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--border);
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,14,26,0.95);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        @media (max-width: 500px) {
            .card { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="cube-loader">
            <div class="cube-loader-inner">
                <div class="cube-face cube-face-front"></div>
                <div class="cube-face cube-face-back"></div>
                <div class="cube-face cube-face-right"></div>
                <div class="cube-face cube-face-left"></div>
                <div class="cube-face cube-face-top"></div>
                <div class="cube-face cube-face-bottom"></div>
            </div>
        </div>
        <h2 style="color: #C6A43F; margin-top: 30px; font-size: 18px; letter-spacing: 3px;">PRIME HERITAGE BANK</h2>
    </div>

    <div class="bg-animation">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="container">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <h1>Prime Heritage Bank</h1>
            <p>International Banking System 2026 | Global Excellence</p>
        </div>
        
        <div class="card" id="authCard">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Sign In</button>
                <button class="tab" onclick="showTab('register')">Open Account</button>
            </div>
            
            <div id="loginPanel">
                <div class="form-group">
                    <label>Email or Account Number</label>
                    <input type="text" id="loginIdentifier" placeholder="Enter email or account number">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <button class="btn" onclick="handleLogin()">Sign In</button>
                <div style="text-align: center; margin-top: 20px;">
                    <a href="#" onclick="showForgotPassword()" style="color: var(--gold); text-decoration: none; font-size: 13px;">Forgot Password?</a>
                </div>
            </div>
            
            <div id="registerPanel" style="display: none;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="John"></div>
                    <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Doe"></div>
                </div>
                <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="john@example.com"></div>
                <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+1 234 567 8900"></div>
                <div class="form-group">
                    <label>Currency</label>
                    <select id="currency">
                        <option value="USD">USD - US Dollar</option>
                        <option value="EUR">EUR - Euro</option>
                        <option value="GBP">GBP - British Pound</option>
                    </select>
                </div>
                <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Create password"></div>
                <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" placeholder="Confirm password"></div>
                <div class="form-group"><label>4-Digit Transaction PIN</label><input type="password" id="transactionPin" maxlength="4" placeholder="****"></div>
                <button class="btn" onclick="handleRegister()">Open Account</button>
            </div>
            
            <div id="verificationPanel" style="display: none;">
                <div class="verification-box">
                    <h3 style="color: var(--gold); margin-bottom: 20px; text-align: center;">Verify Your Email</h3>
                    <p style="color: var(--text-secondary); text-align: center; margin-bottom: 20px;">We've sent a verification code to <strong id="verifyEmail"></strong></p>
                    <div class="form-group">
                        <label>Verification Code</label>
                        <input type="text" id="verificationCode" placeholder="Enter 6-digit code" maxlength="6">
                    </div>
                    <button class="btn" onclick="verifyEmail()">Verify Account</button>
                    <div style="text-align: center; margin-top: 15px;">
                        <a href="#" onclick="resendVerification()" style="color: var(--gold); text-decoration: none; font-size: 12px;">Resend Code</a>
                    </div>
                </div>
            </div>
            
            <div id="forgotPanel" style="display: none;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your email">
                </div>
                <button class="btn" onclick="sendResetCode()">Send Reset Code</button>
                <div style="text-align: center; margin-top: 15px;">
                    <a href="#" onclick="showTab('login')" style="color: var(--gold); text-decoration: none; font-size: 13px;">Back to Login</a>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="cube-loader">
            <div class="cube-loader-inner">
                <div class="cube-face cube-face-front"></div>
                <div class="cube-face cube-face-back"></div>
                <div class="cube-face cube-face-right"></div>
                <div class="cube-face cube-face-left"></div>
                <div class="cube-face cube-face-top"></div>
                <div class="cube-face cube-face-bottom"></div>
            </div>
        </div>
        <p style="color: var(--gold); margin-top: 20px;">Processing...</p>
    </div>

    <script>
        const API_URL = window.location.origin;
        let pendingUserEmail = '';
        let pendingUserToken = '';

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function showTab(tab) {
            document.getElementById('loginPanel').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerPanel').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('verificationPanel').style.display = 'none';
            document.getElementById('forgotPanel').style.display = 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        function showForgotPassword() {
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('registerPanel').style.display = 'none';
            document.getElementById('verificationPanel').style.display = 'none';
            document.getElementById('forgotPanel').style.display = 'block';
        }

        async function handleLogin() {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!identifier || !password) {
                Swal.fire('Error', 'Please enter email/account and password', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    Swal.fire('Success', 'Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        if (data.user.isAdmin) window.location.href = '/admin.html';
                        else window.location.href = '/dashboard.html';
                    }, 1500);
                } else if (data.requiresVerification) {
                    pendingUserEmail = data.email;
                    pendingUserToken = data.token;
                    document.getElementById('verifyEmail').textContent = data.email;
                    document.getElementById('loginPanel').style.display = 'none';
                    document.getElementById('verificationPanel').style.display = 'block';
                } else {
                    Swal.fire('Error', data.error || 'Login failed', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Connection error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function handleRegister() {
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const currency = document.getElementById('currency').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const transactionPin = document.getElementById('transactionPin').value;
            
            if (!firstName || !lastName || !email || !phone || !password || !transactionPin) {
                Swal.fire('Error', 'Please fill all fields', 'error');
                return;
            }
            if (password !== confirm) {
                Swal.fire('Error', 'Passwords do not match', 'error');
                return;
            }
            if (password.length < 6) {
                Swal.fire('Error', 'Password must be at least 6 characters', 'error');
                return;
            }
            if (transactionPin.length !== 4) {
                Swal.fire('Error', 'PIN must be 4 digits', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, password, transactionPin, currency })
                });
                const data = await response.json();
                
                if (data.success) {
                    pendingUserEmail = email;
                    pendingUserToken = data.token;
                    document.getElementById('verifyEmail').textContent = email;
                    document.getElementById('registerPanel').style.display = 'none';
                    document.getElementById('verificationPanel').style.display = 'block';
                    Swal.fire('Success', 'Verification code sent to your email!', 'success');
                } else {
                    Swal.fire('Error', data.error || 'Registration failed', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Connection error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function verifyEmail() {
            const code = document.getElementById('verificationCode').value;
            if (!code) {
                Swal.fire('Error', 'Please enter verification code', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}/api/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingUserEmail, code })
                });
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    Swal.fire('Success', 'Email verified! Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        if (data.user.isAdmin) window.location.href = '/admin.html';
                        else window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    Swal.fire('Error', data.error || 'Invalid verification code', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Verification failed. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function resendVerification() {
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}/api/resend-verification`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingUserEmail })
                });
                const data = await response.json();
                
                if (data.success) {
                    Swal.fire('Success', 'New verification code sent to your email!', 'success');
                } else {
                    Swal.fire('Error', data.error || 'Failed to resend code', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to resend code', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function sendResetCode() {
            const email = document.getElementById('resetEmail').value;
            if (!email) {
                Swal.fire('Error', 'Please enter your email', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(`${API_URL}/api/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                
                if (data.success) {
                    Swal.fire('Success', 'Password reset code sent to your email!', 'success');
                    showTab('login');
                } else {
                    Swal.fire('Error', data.error || 'Failed to send reset code', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Failed to send reset code', 'error');
            } finally {
                showLoading(false);
            }
        }

        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.isAdmin) window.location.href = '/admin.html';
            else if (user.id) window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
