<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prime Heritage Bank - Premium Banking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0E1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-dark: #0A0E1A;
            --bg-card: #111827;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --border: #1F2937;
        }

        /* ========== 3D CUBE LOADING ANIMATION ========== */
        @keyframes splashFadeOut {
            0% { opacity: 1; visibility: visible; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        @keyframes cubeRotate {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        
        @keyframes cubeGlow {
            0% { box-shadow: 0 0 0px rgba(198,164,63,0); }
            50% { box-shadow: 0 0 30px rgba(198,164,63,0.5); }
            100% { box-shadow: 0 0 0px rgba(198,164,63,0); }
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0E1A;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: splashFadeOut 2.5s ease forwards;
            pointer-events: none;
        }
        
        /* 3D Cube Container */
        .cube-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            perspective: 400px;
        }
        
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cubeRotate 2s linear infinite;
        }
        
        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #0A0E1A;
            animation: cubeGlow 2s infinite;
        }
        
        .cube-face-front { transform: translateZ(50px); }
        .cube-face-back { transform: rotateY(180deg) translateZ(50px); }
        .cube-face-right { transform: rotateY(90deg) translateZ(50px); }
        .cube-face-left { transform: rotateY(-90deg) translateZ(50px); }
        .cube-face-top { transform: rotateX(90deg) translateZ(50px); }
        .cube-face-bottom { transform: rotateX(-90deg) translateZ(50px); }
        
        .loading-text {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 3px;
            margin-top: 20px;
            animation: pulseText 1.5s ease infinite;
            text-transform: uppercase;
        }
        
        .loading-dots {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulseText 1s ease infinite;
        }
        
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        .main-content { opacity: 0; animation: fadeIn 0.5s ease 2.5s forwards; width: 100%; display: flex; justify-content: center; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.05) 0%, transparent 50%);
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: slideUp 0.5s ease;
        }
        
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .logo-icon i { font-size: 32px; color: var(--bg-dark); }
        .logo h1 { color: var(--gold); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .logo p { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }
        
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 28px;
            background: #0F1622;
            padding: 4px;
            border-radius: 16px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }
        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--bg-dark);
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(198,164,63,0.1);
        }
        
        .pin-inputs { display: flex; gap: 12px; justify-content: center; }
        .pin-inputs input {
            width: 56px;
            height: 56px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--gold);
        }
        
        .currency-selector { display: flex; gap: 12px; margin-top: 10px; }
        .currency-option {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #0F1622;
        }
        .currency-option.selected {
            border-color: var(--gold);
            background: rgba(198,164,63,0.1);
        }
        .currency-option i { font-size: 22px; display: block; margin-bottom: 6px; color: var(--text-secondary); }
        .currency-option .symbol { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .currency-option.selected i, .currency-option.selected .symbol { color: var(--gold); }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
        }
        
        .error-message, .success-message {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid #EF4444; color: #EF4444; }
        .success-message { background: rgba(16,185,129,0.1); border: 1px solid #10B981; color: #10B981; }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader-cube {
            width: 60px;
            height: 60px;
            perspective: 200px;
            margin-bottom: 20px;
        }
        .loader-cube-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cubeRotate 1s linear infinite;
        }
        .loader-cube-face {
            position: absolute;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            opacity: 0.8;
        }
        .loader-cube-face-front { transform: translateZ(30px); }
        .loader-cube-face-back { transform: rotateY(180deg) translateZ(30px); }
        .loader-cube-face-right { transform: rotateY(90deg) translateZ(30px); }
        .loader-cube-face-left { transform: rotateY(-90deg) translateZ(30px); }
        .loader-cube-face-top { transform: rotateX(90deg) translateZ(30px); }
        .loader-cube-face-bottom { transform: rotateX(-90deg) translateZ(30px); }
        
        .loader-text {
            color: var(--gold);
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        @media (max-width: 500px) {
            .card { padding: 24px; }
            .pin-inputs input { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <!-- 3D CUBE SPLASH SCREEN -->
    <div class="splash-screen" id="splashScreen">
        <div class="cube-container">
            <div class="cube">
                <div class="cube-face cube-face-front"><i class="fas fa-crown"></i></div>
                <div class="cube-face cube-face-back"><i class="fas fa-building"></i></div>
                <div class="cube-face cube-face-right"><i class="fas fa-coins"></i></div>
                <div class="cube-face cube-face-left"><i class="fas fa-globe"></i></div>
                <div class="cube-face cube-face-top"><i class="fas fa-chart-line"></i></div>
                <div class="cube-face cube-face-bottom"><i class="fas fa-shield-alt"></i></div>
            </div>
        </div>
        <div class="loading-text">PRIME HERITAGE BANK</div>
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <div class="main-content">
        <div class="bg-pattern"></div>
        <div class="container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h1>Prime Heritage Bank</h1>
                <p>Est. 2025 | Global Excellence</p>
            </div>
            <div class="card">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Sign In</button>
                    <button class="tab" onclick="switchTab('register')">Open Account</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email or Account Number</label>
                        <input type="text" id="loginIdentifier" placeholder="Enter email or account number">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button class="btn" onclick="handleLogin()">Sign In</button>
                </div>
                
                <div id="registerForm" style="display: none;">
                    <div class="row-2">
                        <div class="form-group"><label>First Name</label><input type="text" id="regFirstName" placeholder="John"></div>
                        <div class="form-group"><label>Last Name</label><input type="text" id="regLastName" placeholder="Doe"></div>
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="john@example.com"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+1 234 567 8900"></div>
                    <div class="form-group">
                        <label>Primary Currency</label>
                        <div class="currency-selector">
                            <div class="currency-option selected" data-currency="USD" onclick="selectCurrency('USD')"><i class="fas fa-dollar-sign"></i><div class="symbol">USD</div></div>
                            <div class="currency-option" data-currency="EUR" onclick="selectCurrency('EUR')"><i class="fas fa-euro-sign"></i><div class="symbol">EUR</div></div>
                            <div class="currency-option" data-currency="GBP" onclick="selectCurrency('GBP')"><i class="fas fa-pound-sign"></i><div class="symbol">GBP</div></div>
                        </div>
                    </div>
                    <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Create password"></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirmPassword" placeholder="Confirm password"></div>
                    <div class="form-group">
                        <label>4-Digit PIN</label>
                        <div class="pin-inputs">
                            <input type="password" maxlength="1" id="pin1" onkeyup="moveToNext(this,'pin2')">
                            <input type="password" maxlength="1" id="pin2" onkeyup="moveToNext(this,'pin3')">
                            <input type="password" maxlength="1" id="pin3" onkeyup="moveToNext(this,'pin4')">
                            <input type="password" maxlength="1" id="pin4">
                        </div>
                    </div>
                    <button class="btn" onclick="handleRegister()">Open Account</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader-cube">
            <div class="loader-cube-inner">
                <div class="loader-cube-face loader-cube-face-front"></div>
                <div class="loader-cube-face loader-cube-face-back"></div>
                <div class="loader-cube-face loader-cube-face-right"></div>
                <div class="loader-cube-face loader-cube-face-left"></div>
                <div class="loader-cube-face loader-cube-face-top"></div>
                <div class="loader-cube-face loader-cube-face-bottom"></div>
            </div>
        </div>
        <div class="loader-text">Processing</div>
    </div>

    <script>
        // AUTO-DETECT API URL - FIXES CONNECTION ERROR
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://global-bank-n6c3.onrender.com';
        let selectedCurrency = 'USD';

        function selectCurrency(currency) {
            selectedCurrency = currency;
            document.querySelectorAll('.currency-option').forEach(opt => {
                opt.classList.remove('selected');
                if(opt.getAttribute('data-currency') === currency) opt.classList.add('selected');
            });
        }

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        function moveToNext(current, nextId) {
            if(current.value.length === 1) document.getElementById(nextId).focus();
        }

        function showError(msg) {
            let el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            let el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        async function handleLogin() {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            if(!identifier || !password) { showError('Please enter email/account and password'); return; }
            showLoading(true);
            try {
                const response = await fetch(`${apiUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if(data.user.isAdmin) window.location.href = '/admin.html';
                    else window.location.href = '/dashboard.html';
                } else { showError(data.error); }
            } catch(error) { showError('Connection error. Make sure server is running.'); }
            finally { showLoading(false); }
        }

        async function handleRegister() {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const pin = document.getElementById('pin1').value + document.getElementById('pin2').value + document.getElementById('pin3').value + document.getElementById('pin4').value;
            
            if(!firstName || !lastName || !email || !phone || !password || pin.length !== 4) { showError('Please fill all fields'); return; }
            if(password !== confirm) { showError('Passwords do not match'); return; }
            if(password.length < 6) { showError('Password must be at least 6 characters'); return; }
            
            showLoading(true);
            try {
                const response = await fetch(`${apiUrl}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, password, transactionPin: pin, currency: selectedCurrency })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    Swal.fire({
                        icon: 'success',
                        title: 'Account Created!',
                        html: 'Welcome to Prime Heritage Bank.<br>Check your email or spam email message for more details.',
                        confirmButtonColor: '#C6A43F',
                        background: '#111827',
                        color: '#FFFFFF'
                    });
                    setTimeout(() => {
                        if(data.user.isAdmin) window.location.href = '/admin.html';
                        else window.location.href = '/dashboard.html';
                    }, 2000);
                } else { showError(data.error); }
            } catch(error) { showError('Connection error'); }
            finally { showLoading(false); }
        }

        // Remove splash screen after animation
        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            if(splash) splash.style.display = 'none';
        }, 2500);

        // Check if already logged in
        const token = localStorage.getItem('token');
        if(token && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if(user.isAdmin) window.location.href = '/admin.html';
            else if(user.id) window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
