<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prime Heritage Bank - Premium Banking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0E1A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-dark: #0A0E1A;
            --bg-card: #111827;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --border: #1F2937;
        }
        @keyframes splashFadeOut {
            0% { opacity: 1; visibility: visible; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        
        /* Splash Screen */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0A0E1A;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            animation: splashFadeOut 2.2s ease forwards;
            pointer-events: none;
        }
        .splash-logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 1s ease-out;
        }
        .splash-logo-icon i { font-size: 40px; color: var(--bg-dark); }
        .splash-logo h1 { color: var(--gold); font-size: 28px; font-weight: 700; text-align: center; }
        .splash-progress { width: 200px; height: 2px; background: rgba(198,164,63,0.2); border-radius: 2px; margin-top: 30px; overflow: hidden; }
        .splash-progress-bar { width: 100%; height: 100%; background: var(--gold); animation: spin 1s linear infinite; }
        
        .main-content { opacity: 0; animation: slideUp 0.5s ease 2.2s forwards; width: 100%; display: flex; justify-content: center; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.05) 0%, transparent 50%); z-index: 0; }
        .container { position: relative; z-index: 1; width: 100%; max-width: 460px; padding: 20px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .logo-icon i { font-size: 32px; color: var(--bg-dark); }
        .logo h1 { color: var(--gold); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        .logo p { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 32px; border: 1px solid var(--border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; background: #0F1622; padding: 4px; border-radius: 16px; }
        .tab { flex: 1; text-align: center; padding: 12px; border: none; background: transparent; font-size: 15px; font-weight: 600; cursor: pointer; border-radius: 12px; color: var(--text-secondary); }
        .tab.active { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--bg-dark); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 14px 16px; background: #0F1622; border: 1px solid var(--border); border-radius: 12px; font-size: 15px; color: var(--text-primary); font-family: 'Inter', sans-serif; }
        .form-group input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(198,164,63,0.1); }
        .pin-inputs { display: flex; gap: 12px; justify-content: center; }
        .pin-inputs input { width: 56px; height: 56px; text-align: center; font-size: 24px; font-weight: 600; background: #0F1622; border: 1px solid var(--border); border-radius: 12px; color: var(--gold); }
        .currency-selector { display: flex; gap: 12px; margin-top: 10px; }
        .currency-option { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 12px; text-align: center; cursor: pointer; background: #0F1622; }
        .currency-option.selected { border-color: var(--gold); background: rgba(198,164,63,0.1); }
        .currency-option i { font-size: 22px; display: block; margin-bottom: 6px; color: var(--text-secondary); }
        .currency-option .symbol { font-size: 15px; font-weight: 600; color: var(--text-primary); }
        .currency-option.selected i, .currency-option.selected .symbol { color: var(--gold); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: var(--bg-dark); border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
        .error-message, .success-message { padding: 12px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; display: none; }
        .error-message { background: rgba(239,68,68,0.1); border: 1px solid #EF4444; color: #EF4444; }
        .success-message { background: rgba(16,185,129,0.1); border: 1px solid #10B981; color: #10B981; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,14,26,0.95); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .loader { width: 48px; height: 48px; border: 3px solid rgba(198,164,63,0.2); border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        @media (max-width: 500px) { .card { padding: 24px; } .pin-inputs input { width: 48px; height: 48px; } }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">
            <div class="splash-logo-icon"><i class="fas fa-building"></i></div>
            <h1>Prime Heritage Bank</h1>
            <div class="splash-progress"><div class="splash-progress-bar"></div></div>
        </div>
    </div>

    <div class="main-content">
        <div class="bg-pattern"></div>
        <div class="container">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-crown"></i></div>
                <h1>Prime Heritage Bank</h1>
                <p>Est. 2025 | Global Excellence</p>
            </div>
            <div class="card">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Sign In</button>
                    <button class="tab" onclick="switchTab('register')">Open Account</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <div id="loginForm">
                    <div class="form-group"><label>Email or Account Number</label><input type="text" id="loginIdentifier" placeholder="Enter email or account number"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Enter your password"></div>
                    <button class="btn" onclick="handleLogin()">Sign In</button>
                </div>
                
                <div id="registerForm" style="display: none;">
                    <div class="row-2">
                        <div class="form-group"><label>First Name</label><input type="text" id="regFirstName" placeholder="John"></div>
                        <div class="form-group"><label>Last Name</label><input type="text" id="regLastName" placeholder="Doe"></div>
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="john@example.com"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="regPhone" placeholder="+1 234 567 8900"></div>
                    <div class="form-group">
                        <label>Primary Currency</label>
                        <div class="currency-selector">
                            <div class="currency-option selected" data-currency="USD" onclick="selectCurrency('USD')"><i class="fas fa-dollar-sign"></i><div class="symbol">USD</div></div>
                            <div class="currency-option" data-currency="EUR" onclick="selectCurrency('EUR')"><i class="fas fa-euro-sign"></i><div class="symbol">EUR</div></div>
                            <div class="currency-option" data-currency="GBP" onclick="selectCurrency('GBP')"><i class="fas fa-pound-sign"></i><div class="symbol">GBP</div></div>
                        </div>
                    </div>
                    <div class="form-group"><label>Password</label><input type="password" id="regPassword" placeholder="Create password"></div>
                    <div class="form-group"><label>Confirm Password</label><input type="password" id="regConfirmPassword" placeholder="Confirm password"></div>
                    <div class="form-group"><label>4-Digit PIN</label><div class="pin-inputs"><input type="password" maxlength="1" id="pin1" onkeyup="moveToNext(this,'pin2')"><input type="password" maxlength="1" id="pin2" onkeyup="moveToNext(this,'pin3')"><input type="password" maxlength="1" id="pin3" onkeyup="moveToNext(this,'pin4')"><input type="password" maxlength="1" id="pin4"></div></div>
                    <button class="btn" onclick="handleRegister()">Open Account</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Verification Modal -->
    <div id="verifyModal" class="modal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(4px); z-index:3000; align-items:center; justify-content:center;">
        <div style="background:#111827; border-radius:24px; padding:32px; max-width:400px; width:90%; border:1px solid #C6A43F;">
            <h3 style="color:#C6A43F; margin-bottom:20px;">Verify Your Email</h3>
            <p style="color:#9CA3AF; margin-bottom:20px;">Please enter the 6-digit verification code sent to your email.</p>
            <div class="pin-inputs" style="margin-bottom:20px;">
                <input type="text" maxlength="1" id="v1" onkeyup="moveToNextVerify(this,'v2')" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
                <input type="text" maxlength="1" id="v2" onkeyup="moveToNextVerify(this,'v3')" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
                <input type="text" maxlength="1" id="v3" onkeyup="moveToNextVerify(this,'v4')" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
                <input type="text" maxlength="1" id="v4" onkeyup="moveToNextVerify(this,'v5')" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
                <input type="text" maxlength="1" id="v5" onkeyup="moveToNextVerify(this,'v6')" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
                <input type="text" maxlength="1" id="v6" style="width:50px;height:50px;text-align:center;font-size:24px;background:#0F1622;border:1px solid #1F2937;border-radius:12px;color:#C6A43F;">
            </div>
            <button class="btn" onclick="verifyCode()" style="width:100%;">Verify Account</button>
            <p style="text-align:center; margin-top:16px; font-size:12px; color:#9CA3AF;">Check your spam/junk folder if you don't see the email.</p>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div><div class="loader-text">Processing</div></div>

    <script>
        const apiUrl = 'https://global-bank-n6c3.onrender.com';
        let selectedCurrency = 'USD';
        let pendingUserId = null;

        function selectCurrency(currency) {
            selectedCurrency = currency;
            document.querySelectorAll('.currency-option').forEach(opt => {
                opt.classList.remove('selected');
                if(opt.getAttribute('data-currency') === currency) opt.classList.add('selected');
            });
        }

        function switchTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
        }

        function moveToNext(current, nextId) {
            if(current.value.length === 1) document.getElementById(nextId).focus();
        }

        function moveToNextVerify(current, nextId) {
            if(current.value.length === 1) document.getElementById(nextId).focus();
        }

        function showError(msg) {
            let el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showSuccess(msg) {
            let el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function openVerifyModal(userId) {
            pendingUserId = userId;
            document.getElementById('verifyModal').style.display = 'flex';
            document.querySelectorAll('#verifyModal input').forEach(i => i.value = '');
            document.getElementById('v1').focus();
        }

        async function verifyCode() {
            const code = document.getElementById('v1').value + document.getElementById('v2').value + document.getElementById('v3').value + 
                         document.getElementById('v4').value + document.getElementById('v5').value + document.getElementById('v6').value;
            
            if(code.length !== 6) {
                Swal.fire('Error', 'Please enter the 6-digit verification code', 'error');
                return;
            }
            
            showLoading(true);
            try {
                const response = await fetch(`${apiUrl}/api/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: pendingUserId, code })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    document.getElementById('verifyModal').style.display = 'none';
                    Swal.fire({
                        icon: 'success',
                        title: 'Email Verified!',
                        html: 'Your account has been activated.<br>Check your email for welcome message.',
                        confirmButtonColor: '#C6A43F'
                    });
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    Swal.fire('Error', data.error, 'error');
                }
            } catch(error) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        async function handleLogin() {
            const identifier = document.getElementById('loginIdentifier').value;
            const password = document.getElementById('loginPassword').value;
            if(!identifier || !password) { showError('Please enter email/account and password'); return; }
            showLoading(true);
            try {
                const response = await fetch(`${apiUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier, password })
                });
                const data = await response.json();
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if(data.user.isAdmin) window.location.href = '/admin.html';
                    else window.location.href = '/dashboard.html';
                } else { showError(data.error); }
            } catch(error) { showError('Connection error'); } finally { showLoading(false); }
        }

        async function handleRegister() {
            const firstName = document.getElementById('regFirstName').value;
            const lastName = document.getElementById('regLastName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const pin = document.getElementById('pin1').value + document.getElementById('pin2').value + document.getElementById('pin3').value + document.getElementById('pin4').value;
            
            if(!firstName || !lastName || !email || !phone || !password || pin.length !== 4) { showError('Please fill all fields'); return; }
            if(password !== confirm) { showError('Passwords do not match'); return; }
            
            showLoading(true);
            try {
                const response = await fetch(`${apiUrl}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, phone, password, transactionPin: pin, currency: selectedCurrency })
                });
                const data = await response.json();
                if(data.success) {
                    showSuccess('Verification code sent! Check your email (and spam folder)');
                    openVerifyModal(data.userId);
                    document.getElementById('registerForm').querySelectorAll('input').forEach(i => i.value = '');
                } else { showError(data.error); }
            } catch(error) { showError('Connection error'); } finally { showLoading(false); }
        }

        setTimeout(() => {
            const splash = document.getElementById('splashScreen');
            if(splash) splash.style.display = 'none';
        }, 2200);

        const token = localStorage.getItem('token');
        if(token && (window.location.pathname === '/' || window.location.pathname === '/index.html')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if(user.isAdmin) window.location.href = '/admin.html';
            else if(user.id) window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
