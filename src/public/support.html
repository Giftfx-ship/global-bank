<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Support - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0A0E1A; padding-bottom: 80px; }
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --bg-card: #111827;
            --border: #1F2937;
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .top-bar {
            background: var(--bg-card); padding: 16px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon i { font-size: 20px; color: #0A0E1A; }
        .logo span { color: var(--text-primary); font-size: 18px; font-weight: 600; }
        .avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        
        .container { max-width: 600px; margin: 0 auto; padding: 24px; }
        .support-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--border);
            margin-bottom: 24px;
            animation: slideUp 0.5s;
        }
        .support-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .support-icon {
            width: 70px; height: 70px;
            background: rgba(198,164,63,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }
        .support-icon i { font-size: 35px; color: var(--gold); }
        .support-header h2 { color: var(--text-primary); font-size: 24px; }
        .support-header p { color: var(--text-secondary); margin-top: 8px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: #0F1622;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 12px;
            color: #0A0E1A;
            font-weight: 700;
            cursor: pointer;
        }
        .ticket-item {
            background: #0F1622;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .ticket-subject { color: var(--gold); font-weight: 600; margin-bottom: 5px; }
        .ticket-message { color: var(--text-secondary); font-size: 13px; margin-bottom: 8px; }
        .ticket-status { font-size: 11px; color: var(--success); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
        }
        .nav-item { text-align: center; cursor: pointer; padding: 8px 16px; border-radius: 12px; }
        .nav-item i { font-size: 20px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; color: var(--text-secondary); }
        .nav-item.active { background: rgba(198,164,63,0.1); }
        .nav-item.active i, .nav-item.active span { color: var(--gold); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10,14,26,0.95);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .loader {
            width: 48px; height: 48px;
            border: 3px solid rgba(198,164,63,0.2);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo" onclick="goToDashboard()">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span>Prime Heritage</span>
        </div>
        <div class="avatar" onclick="goToDashboard()"><i class="fas fa-arrow-left"></i></div>
    </div>

    <div class="container">
        <div class="support-card">
            <div class="support-header">
                <div class="support-icon"><i class="fas fa-headset"></i></div>
                <h2>Customer Support</h2>
                <p>We're here to help 24/7</p>
            </div>
            <div class="form-group"><label>Subject</label><input type="text" id="ticketSubject" placeholder="What is your issue about?"></div>
            <div class="form-group"><label>Message</label><textarea id="ticketMessage" rows="5" placeholder="Describe your issue in detail..."></textarea></div>
            <button class="btn" onclick="submitTicket()">Submit Ticket</button>
        </div>

        <div class="support-card">
            <div class="support-header"><h2 style="font-size:18px;">Your Tickets</h2></div>
            <div id="ticketsList">Loading...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goToDashboard()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="goToCards()"><i class="fas fa-credit-card"></i><span>Cards</span></div>
        <div class="nav-item" onclick="goToDashboard()"><i class="fas fa-paper-plane"></i><span>Send</span></div>
        <div class="nav-item active" onclick="goToSupport()"><i class="fas fa-headset"></i><span>Support</span></div>
        <div class="nav-item" onclick="goToProfile()"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>

    <div id="loadingOverlay" class="loading-overlay"><div class="loader"></div></div>

    <script>
        const apiUrl = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://global-bank-n6c3.onrender.com';
        
        function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
        function goToDashboard() { window.location.href = '/dashboard.html'; }
        function goToCards() { window.location.href = '/cards.html'; }
        function goToSupport() { window.location.href = '/support.html'; }
        function goToProfile() { window.location.href = '/profile.html'; }
        
        async function submitTicket() {
            const subject = document.getElementById('ticketSubject').value;
            const message = document.getElementById('ticketMessage').value;
            if (!subject || !message) { Swal.fire('Error', 'Please fill all fields', 'error'); return; }
            showLoading(true);
            try {
                const res = await fetch(`${apiUrl}/api/support`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ subject, message })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire('Success', 'Ticket submitted! We will respond within 24 hours.', 'success');
                    document.getElementById('ticketSubject').value = '';
                    document.getElementById('ticketMessage').value = '';
                    loadTickets();
                } else { Swal.fire('Error', data.error, 'error'); }
            } catch(e) { Swal.fire('Error', 'Submission failed', 'error'); } finally { showLoading(false); }
        }
        
        async function loadTickets() {
            try {
                const res = await fetch(`${apiUrl}/api/support/tickets`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const tickets = await res.json();
                const container = document.getElementById('ticketsList');
                if (tickets.length === 0) { container.innerHTML = '<div style="text-align:center; color:#9CA3AF;">No tickets yet</div>'; return; }
                container.innerHTML = '';
                for (let t of tickets) {
                    container.innerHTML += `<div class="ticket-item"><div class="ticket-subject">${t.subject}</div><div class="ticket-message">${t.message.substring(0, 100)}...</div><div class="ticket-status">${t.status} • ${new Date(t.createdAt).toLocaleDateString()}</div></div>`;
                }
            } catch(e) { console.error(e); }
        }
        
        loadTickets();
    </script>
</body>
</html>
