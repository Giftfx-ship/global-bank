<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Send Money - Prime Heritage Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #C6A43F;
            --gold-dark: #9E8032;
            --gold-light: #D4B85A;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --gradient-gold: linear-gradient(135deg, #C6A43F, #9E8032);
        }
        
        [data-theme="dark"] {
            --bg-body: #0A0E1A;
            --bg-card: rgba(17, 24, 39, 0.95);
            --border: rgba(31, 41, 55, 0.5);
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --input-bg: #0F1622;
            --glass-bg: rgba(17, 24, 39, 0.8);
        }
        
        [data-theme="light"] {
            --bg-body: #F0F2F8;
            --bg-card: rgba(255, 255, 255, 0.95);
            --border: rgba(229, 231, 235, 0.5);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --input-bg: #F9FAFB;
            --glass-bg: rgba(255, 255, 255, 0.8);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-body);
            padding-bottom: 80px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(198,164,63,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(198,164,63,0.04) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .top-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 40px; height: 40px;
            background: var(--gradient-gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(198,164,63,0.3);
        }
        .logo-icon i { font-size: 18px; color: #0A0E1A; }
        .logo-text {
            font-size: 18px;
            font-weight: 800;
            background: var(--gradient-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-text span { font-weight: 300; opacity: 0.5; }
        
        .user-section { display: flex; align-items: center; gap: 12px; }
        
        .balance-pill {
            background: rgba(198,164,63,0.12);
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid rgba(198,164,63,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .balance-pill i { color: var(--gold); font-size: 12px; }
        .balance-pill span { color: var(--gold); font-weight: 700; font-size: 14px; }
        
        .theme-toggle {
            background: rgba(198,164,63,0.08);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px;
            display: flex;
            cursor: pointer;
        }
        .theme-toggle:hover { border-color: var(--gold); }
        .theme-option {
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .theme-option.active {
            background: var(--gradient-gold);
            color: #0A0E1A;
        }
        .theme-option i { margin-right: 4px; }
        
        .avatar {
            width: 40px; height: 40px;
            background: var(--gradient-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(198,164,63,0.3);
        }
        .avatar:hover { transform: scale(1.08); }
        .avatar i { color: #0A0E1A; font-size: 16px; }
        
        .container { max-width: 500px; margin: 0 auto; padding: 20px 16px; position: relative; z-index: 1; }
        
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 28px 24px;
            border: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }
        
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .title h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        .title h2 .gold { color: var(--gold); }
        .title p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }
        .title .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 14px;
            background: rgba(198,164,63,0.1);
            border: 1px solid var(--gold);
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            color: var(--gold);
        }
        
        .info-box {
            background: var(--input-bg);
            border-radius: 14px;
            padding: 16px 18px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info-row:last-child { margin-top: 8px; }
        
        .info-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
        }
        .info-value {
            color: var(--gold);
            font-size: 18px;
            font-weight: 700;
        }
        
        .form-group { margin-bottom: 18px; }
        
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group label i { margin-right: 6px; color: var(--gold); }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 14px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(198,164,63,0.06);
        }
        
        .pin-inputs, .code-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 12px 0;
        }
        
        .pin-inputs input, .code-inputs input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--gold);
            transition: all 0.2s;
        }
        
        .pin-inputs input:focus, .code-inputs input:focus {
            border-color: var(--gold);
            transform: scale(1.05);
            box-shadow: 0 0 0 4px rgba(198,164,63,0.06);
        }
        
        .security-step {
            text-align: center;
            margin-bottom: 16px;
        }
        .step-badge {
            display: inline-block;
            padding: 4px 14px;
            background: rgba(198,164,63,0.1);
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            color: var(--gold);
        }
        .step-badge i { margin-right: 6px; }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient-gold);
            border: none;
            border-radius: 14px;
            color: #0A0E1A;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(198,164,63,0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(198,164,63,0.3);
        }
        
        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: var(--input-bg);
            transform: none;
            box-shadow: none;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 10px;
            border-top: 1px solid var(--border);
            z-index: 99;
        }
        
        .nav-item {
            text-align: center;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
            transition: all 0.3s;
            text-decoration: none;
            position: relative;
        }
        
        .nav-item i {
            font-size: 18px;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 2px;
            transition: all 0.3s;
        }
        
        .nav-item span {
            font-size: 9px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .nav-item.active i,
        .nav-item.active span { color: var(--gold); }
        .nav-item.active::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--gradient-gold);
            border-radius: 0 0 3px 3px;
        }
        .nav-item:hover { transform: translateY(-2px); }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(198,164,63,0.15);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        
        .loader-text {
            color: var(--gold);
            font-size: 13px;
            letter-spacing: 2px;
        }
        
        @media (max-width: 500px) {
            .container { padding: 12px; }
            .card { padding: 20px 16px; }
            .title h2 { font-size: 20px; }
            .pin-inputs input, .code-inputs input { width: 44px; height: 44px; font-size: 18px; }
            .top-bar { padding: 12px 16px; }
            .logo-text { font-size: 15px; }
            .balance-pill { display: none; }
            .theme-option span { display: none; }
            .theme-option i { margin-right: 0; }
            .bottom-nav { padding: 6px 12px; }
            .nav-item { padding: 4px 8px; }
            .nav-item i { font-size: 16px; }
            .nav-item span { font-size: 8px; }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="top-bar">
        <div class="logo" onclick="location.href='/dashboard.html'">
            <div class="logo-icon"><i class="fas fa-crown"></i></div>
            <span class="logo-text">Prime <span>Bank</span></span>
        </div>
        <div class="user-section">
            <div class="theme-toggle" onclick="toggleTheme()">
                <div class="theme-option" id="darkOption"><i class="fas fa-moon"></i></div>
                <div class="theme-option" id="lightOption"><i class="fas fa-sun"></i></div>
            </div>
            <div class="balance-pill"><i class="fas fa-wallet"></i><span id="headerBalance">$0.00</span></div>
            <div class="avatar" onclick="location.href='/profile.html'"><i class="fas fa-user"></i></div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="title">
                <h2><i class="fas fa-paper-plane gold"></i> Send <span class="gold">Money</span></h2>
                <p>Secure international transfers</p>
                <div class="badge"><i class="fas fa-shield-alt"></i> EASY TRANSACTION</div>
            </div>

            <div class="info-box">
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-wallet"></i> Available Balance</span>
                    <span class="info-value" id="userBalance">$0.00</span>
                </div>
                <div class="info-row">
                    <span class="info-label"><i class="fas fa-shield-alt"></i> SECURED</span>
                    <span class="info-value" style="font-size:14px;">🔐</span>
                </div>
            </div>

            <!-- STEP 1: Form -->
            <div id="step1Form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Recipient Account</label>
                    <input type="text" id="recipientAccount" placeholder="Account number or IBAN">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-dollar-sign"></i> Amount (USD)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-pen"></i> Note (Optional)</label>
                    <input type="text" id="note" placeholder="What's this for?">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-key"></i> Transaction PIN</label>
                    <div class="pin-inputs">
                        <input type="password" maxlength="1" id="pin1" onkeyup="movePin(this,'pin2')">
                        <input type="password" maxlength="1" id="pin2" onkeyup="movePin(this,'pin3')">
                        <input type="password" maxlength="1" id="pin3" onkeyup="movePin(this,'pin4')">
                        <input type="password" maxlength="1" id="pin4">
                    </div>
                </div>
                <button class="btn" onclick="sendStep1()"><i class="fas fa-arrow-right"></i> Continue</button>
            </div>

            <!-- CODE STEPS (3 Steps Only) -->
            <div id="codeForm" style="display: none;">
                <!-- Step 1: Authorization Code -->
                <div id="codeStep1">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-shield-alt"></i> Step 1 of 3 • Authorization</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-key"></i> Enter BBC Authorization Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c1_1" onkeyup="moveCode(this,'c1_2')">
                            <input type="text" maxlength="1" id="c1_2" onkeyup="moveCode(this,'c1_3')">
                            <input type="text" maxlength="1" id="c1_3" onkeyup="moveCode(this,'c1_4')">
                            <input type="text" maxlength="1" id="c1_4" onkeyup="moveCode(this,'c1_5')">
                            <input type="text" maxlength="1" id="c1_5" onkeyup="moveCode(this,'c1_6')">
                            <input type="text" maxlength="1" id="c1_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode1()"><i class="fas fa-check"></i> Verify Code</button>
                    <button class="btn btn-secondary" onclick="cancelTransaction()"><i class="fas fa-times"></i> Cancel</button>
                </div>

                <!-- Step 2: Security Code -->
                <div id="codeStep2" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-lock"></i> Step 2 of 3 • Security Check</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-virus"></i> Enter BBC Security Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c2_1" onkeyup="moveCode(this,'c2_2')">
                            <input type="text" maxlength="1" id="c2_2" onkeyup="moveCode(this,'c2_3')">
                            <input type="text" maxlength="1" id="c2_3" onkeyup="moveCode(this,'c2_4')">
                            <input type="text" maxlength="1" id="c2_4" onkeyup="moveCode(this,'c2_5')">
                            <input type="text" maxlength="1" id="c2_5" onkeyup="moveCode(this,'c2_6')">
                            <input type="text" maxlength="1" id="c2_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode2()"><i class="fas fa-check-double"></i> Verify Code</button>
                    <button class="btn btn-secondary" onclick="cancelTransaction()"><i class="fas fa-times"></i> Cancel</button>
                </div>

                <!-- Step 3: Final Code -->
                <div id="codeStep3" style="display: none;">
                    <div class="security-step">
                        <span class="step-badge"><i class="fas fa-crown"></i> Step 3 of 3 • Final Verification</span>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-gem"></i> Enter BBC Final Code</label>
                        <div class="code-inputs">
                            <input type="text" maxlength="1" id="c3_1" onkeyup="moveCode(this,'c3_2')">
                            <input type="text" maxlength="1" id="c3_2" onkeyup="moveCode(this,'c3_3')">
                            <input type="text" maxlength="1" id="c3_3" onkeyup="moveCode(this,'c3_4')">
                            <input type="text" maxlength="1" id="c3_4" onkeyup="moveCode(this,'c3_5')">
                            <input type="text" maxlength="1" id="c3_5" onkeyup="moveCode(this,'c3_6')">
                            <input type="text" maxlength="1" id="c3_6">
                        </div>
                    </div>
                    <button class="btn" onclick="submitCode3()"><i class="fas fa-check-circle"></i> Complete Transfer</button>
                    <button class="btn btn-secondary" onclick="cancelTransaction()"><i class="fas fa-times"></i> Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <a class="nav-item" href="/dashboard.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a class="nav-item" href="/cards.html"><i class="fas fa-credit-card"></i><span>Cards</span></a>
        <a class="nav-item active" href="/send.html"><i class="fas fa-paper-plane"></i><span>Send</span></a>
        <a class="nav-item" href="/support.html"><i class="fas fa-headset"></i><span>Support</span></a>
        <a class="nav-item" href="/profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader"></div>
        <div class="loader-text">Processing...</div>
    </div>

    <script>
        const API_URL = 'https://primeheritage-bank-intl.onrender.com';
        let currentRef = null;
        let currentStep = 'step1';

        // ============================================================
        // THEME
        // ============================================================
        function setTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            document.getElementById('darkOption').classList.toggle('active', theme === 'dark');
            document.getElementById('lightOption').classList.toggle('active', theme === 'light');
        }

        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // ============================================================
        // UTILITY
        // ============================================================
        function movePin(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }

        function moveCode(current, nextId) {
            if (current.value.length === 1) document.getElementById(nextId).focus();
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // ============================================================
        // CANCEL TRANSACTION
        // ============================================================
        function cancelTransaction() {
            Swal.fire({
                title: 'Cancel Transaction?',
                text: 'Your progress will be lost.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                confirmButtonText: 'Yes, Cancel',
                cancelButtonText: 'No, Continue',
                background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
            }).then((result) => {
                if (result.isConfirmed) {
                    clearProgress();
                    document.getElementById('step1Form').style.display = 'block';
                    document.getElementById('codeForm').style.display = 'none';
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'none';
                    currentRef = null;
                    currentStep = 'step1';
                    Swal.fire({
                        icon: 'info',
                        title: 'Cancelled',
                        text: 'Transaction has been cancelled.',
                        timer: 1500,
                        showConfirmButton: false,
                        background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                        color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                    });
                }
            });
        }

        // ============================================================
        // SAVE PROGRESS
        // ============================================================
        function saveProgress(step, data) {
            localStorage.setItem('sendProgress', JSON.stringify({ step, data, timestamp: Date.now() }));
        }

        function clearProgress() { localStorage.removeItem('sendProgress'); }

        function loadProgress() {
            try {
                const saved = localStorage.getItem('sendProgress');
                if (saved) {
                    const progress = JSON.parse(saved);
                    if (Date.now() - progress.timestamp < 3600000) return progress;
                }
            } catch(e) {}
            return null;
        }

        // ============================================================
        // RESTORE PROGRESS
        // ============================================================
        function restoreProgress() {
            const progress = loadProgress();
            if (!progress) return;

            const data = progress.data;
            const step = progress.step;

            if (data.recipientAccount) document.getElementById('recipientAccount').value = data.recipientAccount;
            if (data.amount) document.getElementById('amount').value = data.amount;
            if (data.note) document.getElementById('note').value = data.note;

            currentRef = data.reference || null;

            if (step === 'step1') {
                document.getElementById('step1Form').style.display = 'block';
                document.getElementById('codeForm').style.display = 'none';
                return;
            }

            document.getElementById('step1Form').style.display = 'none';
            document.getElementById('codeForm').style.display = 'block';

            if (step === 'code1') {
                document.getElementById('codeStep1').style.display = 'block';
                document.getElementById('codeStep2').style.display = 'none';
                document.getElementById('codeStep3').style.display = 'none';
                if (data.code1) {
                    const c1 = data.code1.split('');
                    for (let i = 0; i < c1.length; i++) {
                        const el = document.getElementById('c1_' + (i+1));
                        if (el) el.value = c1[i];
                    }
                }
                document.getElementById('c1_1').focus();
                currentStep = 'code1';
            } else if (step === 'code2') {
                document.getElementById('codeStep1').style.display = 'none';
                document.getElementById('codeStep2').style.display = 'block';
                document.getElementById('codeStep3').style.display = 'none';
                if (data.code2) {
                    const c2 = data.code2.split('');
                    for (let i = 0; i < c2.length; i++) {
                        const el = document.getElementById('c2_' + (i+1));
                        if (el) el.value = c2[i];
                    }
                }
                document.getElementById('c2_1').focus();
                currentStep = 'code2';
            } else if (step === 'code3') {
                document.getElementById('codeStep1').style.display = 'none';
                document.getElementById('codeStep2').style.display = 'none';
                document.getElementById('codeStep3').style.display = 'block';
                if (data.code3) {
                    const c3 = data.code3.split('');
                    for (let i = 0; i < c3.length; i++) {
                        const el = document.getElementById('c3_' + (i+1));
                        if (el) el.value = c3[i];
                    }
                }
                document.getElementById('c3_1').focus();
                currentStep = 'code3';
            }

            Swal.fire({
                icon: 'info',
                title: 'Resuming Transaction',
                text: `Continue from Step ${step}`,
                timer: 1500,
                showConfirmButton: false,
                background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
            });
        }

        // ============================================================
        // CHECK FOR ACTIVE TRANSACTION FLOW
        // ============================================================
        async function checkActiveFlow() {
            try {
                const res = await fetch(`${API_URL}/api/transaction/flow`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await res.json();
                if (data.success && data.flow) {
                    const flow = data.flow;
                    if (flow.transaction_type === 'transfer' && flow.status === 'active') {
                        const tx = flow.transaction;
                        if (tx) {
                            if (tx.to_account_number) document.getElementById('recipientAccount').value = tx.to_account_number;
                            if (tx.amount) document.getElementById('amount').value = tx.amount;
                            if (tx.description) document.getElementById('note').value = tx.description;
                            currentRef = tx.reference;
                            
                            const step = flow.current_step || 1;
                            if (step === 1) {
                                document.getElementById('step1Form').style.display = 'block';
                                document.getElementById('codeForm').style.display = 'none';
                            } else if (step === 2) {
                                document.getElementById('step1Form').style.display = 'none';
                                document.getElementById('codeForm').style.display = 'block';
                                document.getElementById('codeStep1').style.display = 'block';
                                document.getElementById('codeStep2').style.display = 'none';
                                document.getElementById('codeStep3').style.display = 'none';
                                currentStep = 'code1';
                            } else if (step === 3) {
                                document.getElementById('step1Form').style.display = 'none';
                                document.getElementById('codeForm').style.display = 'block';
                                document.getElementById('codeStep1').style.display = 'none';
                                document.getElementById('codeStep2').style.display = 'block';
                                document.getElementById('codeStep3').style.display = 'none';
                                currentStep = 'code2';
                            }
                            
                            Swal.fire({
                                icon: 'info',
                                title: 'Resuming Transaction',
                                text: 'You have an active money transfer. Continue from where you left off.',
                                confirmButtonColor: '#C6A43F',
                                background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                                color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                            });
                        }
                    }
                }
            } catch(e) {
                console.error('Check flow error:', e);
            }
        }

        // ============================================================
        // STEP 1: Create Transaction
        // ============================================================
        async function sendStep1() {
            const recipient = document.getElementById('recipientAccount').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const note = document.getElementById('note').value.trim();
            const pin = document.getElementById('pin1').value + document.getElementById('pin2').value +
                       document.getElementById('pin3').value + document.getElementById('pin4').value;

            if (!recipient) {
                Swal.fire('Error', 'Please enter a recipient account number or IBAN', 'error');
                return;
            }
            if (!amount || amount <= 0) {
                Swal.fire('Error', 'Please enter a valid amount', 'error');
                return;
            }
            if (pin.length !== 4) {
                Swal.fire('Error', 'Please enter your 4-digit transaction PIN', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/send/step1`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({
                        toAccountNumber: recipient,
                        amount: amount,
                        description: note,
                        transactionPin: pin
                    })
                });
                const data = await res.json();
                if (data.success) {
                    currentRef = data.reference;
                    currentStep = 'code1';
                    
                    saveProgress('code1', {
                        recipientAccount: recipient,
                        amount: amount,
                        note: note,
                        reference: currentRef
                    });
                    
                    document.getElementById('step1Form').style.display = 'none';
                    document.getElementById('codeForm').style.display = 'block';
                    document.getElementById('codeStep1').style.display = 'block';
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'none';
                    document.getElementById('c1_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Authorization Required',
                        html: `<p style="color:var(--text-secondary);">${data.message || 'Enter your Authorization Code to continue'}</p><p style="margin-top:8px;font-size:12px;color:var(--gold);"><i class="fas fa-info-circle"></i> Step 1 of 3</p>`,
                        confirmButtonColor: '#C6A43F',
                        background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                        color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Transaction failed', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Network error. Please try again.', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ============================================================
        // STEP 2: Verify Authorization Code
        // ============================================================
        async function submitCode1() {
            const code = document.getElementById('c1_1').value + document.getElementById('c1_2').value +
                        document.getElementById('c1_3').value + document.getElementById('c1_4').value +
                        document.getElementById('c1_5').value + document.getElementById('c1_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit authorization code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/send/step2`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    const progress = loadProgress();
                    if (progress) saveProgress('code2', { ...progress.data, code1: code });
                    currentStep = 'code2';
                    
                    document.getElementById('codeStep1').style.display = 'none';
                    document.getElementById('codeStep2').style.display = 'block';
                    document.getElementById('codeStep3').style.display = 'none';
                    document.getElementById('c2_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Security Check',
                        html: `<p style="color:var(--text-secondary);">${data.message || 'Enter your Security Code to continue'}</p><p style="margin-top:8px;font-size:12px;color:var(--gold);"><i class="fas fa-info-circle"></i> Step 2 of 3</p>`,
                        confirmButtonColor: '#C6A43F',
                        background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                        color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Invalid authorization code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ============================================================
        // STEP 3: Verify Security Code
        // ============================================================
        async function submitCode2() {
            const code = document.getElementById('c2_1').value + document.getElementById('c2_2').value +
                        document.getElementById('c2_3').value + document.getElementById('c2_4').value +
                        document.getElementById('c2_5').value + document.getElementById('c2_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit security code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/send/step3`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    const progress = loadProgress();
                    if (progress) saveProgress('code3', { ...progress.data, code2: code });
                    currentStep = 'code3';
                    
                    document.getElementById('codeStep2').style.display = 'none';
                    document.getElementById('codeStep3').style.display = 'block';
                    document.getElementById('c3_1').focus();
                    Swal.fire({
                        icon: 'info',
                        title: 'Final Verification',
                        html: `<p style="color:var(--text-secondary);">${data.message || 'Enter your Final Code to complete the transfer'}</p><p style="margin-top:8px;font-size:12px;color:var(--gold);"><i class="fas fa-info-circle"></i> Step 3 of 3</p>`,
                        confirmButtonColor: '#C6A43F',
                        background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                        color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827'
                    });
                } else {
                    Swal.fire('Error', data.error || 'Invalid security code', 'error');
                }
            } catch(e) {
                Swal.fire('Error', 'Verification failed', 'error');
            } finally {
                showLoading(false);
            }
        }

        // ============================================================
        // FINAL: Verify Final Code & Complete Transaction
        // ============================================================
        async function submitCode3() {
            const code = document.getElementById('c3_1').value + document.getElementById('c3_2').value +
                        document.getElementById('c3_3').value + document.getElementById('c3_4').value +
                        document.getElementById('c3_5').value + document.getElementById('c3_6').value;

            if (code.length !== 6) {
                Swal.fire('Error', 'Please enter the complete 6-digit final code', 'error');
                return;
            }

            showLoading(true);
            try {
                const res = await fetch(`${API_URL}/api/send/final`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ reference: currentRef, bbcCode: code })
                });
                const data = await res.json();
                if (data.success) {
                    clearProgress();
                    showLoading(false);
                    
                    await Swal.fire({
                        icon: 'success',
                        title: '🎉 Transfer Complete!',
                        html: `
                            <div style="text-align:left;margin-top:10px;">
                                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(198,164,63,0.1);">
                                    <span style="color:var(--text-secondary);">Amount</span>
                                    <span style="font-weight:700;color:var(--gold);">$${parseFloat(document.getElementById('amount').value).toFixed(2)}</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(198,164,63,0.1);">
                                    <span style="color:var(--text-secondary);">Recipient</span>
                                    <span style="font-weight:600;font-family:monospace;font-size:12px;">${document.getElementById('recipientAccount').value}</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(198,164,63,0.1);">
                                    <span style="color:var(--text-secondary);">New Balance</span>
                                    <span style="font-weight:700;color:var(--success);">$${data.newBalance?.toFixed(2) || '0.00'}</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;padding:6px 0;">
                                    <span style="color:var(--text-secondary);">Reference</span>
                                    <span style="font-weight:600;font-family:monospace;font-size:11px;">${currentRef}</span>
                                </div>
                                <div style="text-align:center;margin-top:12px;padding:8px;background:rgba(16,185,129,0.1);border-radius:8px;color:var(--success);font-size:12px;font-weight:600;">
                                    <i class="fas fa-check-circle"></i> Transaction Completed Successfully
                                </div>
                            </div>
                        `,
                        confirmButtonColor: '#C6A43F',
                        confirmButtonText: 'Go to Dashboard',
                        background: document.body.getAttribute('data-theme') === 'dark' ? '#16213E' : '#fff',
                        color: document.body.getAttribute('data-theme') === 'dark' ? '#fff' : '#111827',
                        width: 440
                    }).then(() => {
                        window.location.href = '/dashboard.html';
                    });
                } else {
                    Swal.fire('Error', data.error || 'Transaction failed', 'error');
                    showLoading(false);
                }
            } catch(e) {
                Swal.fire('Error', 'Transaction failed. Please try again.', 'error');
                showLoading(false);
            }
        }

        // ============================================================
        // LOAD BALANCE
        // ============================================================
        async function loadBalance() {
            try {
                const res = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.status === 401) { window.location.href = '/'; return; }
                const data = await res.json();
                const user = data.user;
                const totalBalance = user.totalBalance || 0;
                const currency = user.currency || 'USD';
                document.getElementById('userBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
                document.getElementById('headerBalance').innerHTML = `${currency} ${totalBalance.toLocaleString()}`;
            } catch(e) { console.error(e); }
        }

        // ============================================================
        // INIT
        // ============================================================
        const token = localStorage.getItem('token');
        if (!token && window.location.pathname !== '/') { window.location.href = '/'; }

        loadBalance();
        
        // Check for active flow first, then fallback to local progress
        checkActiveFlow().then(() => {
            const progress = loadProgress();
            if (progress && document.getElementById('step1Form').style.display !== 'none') {
                restoreProgress();
            }
        });
    </script>
</body>
</html>
